                    await fetchTags();
                    return true;
                } catch (e) { console.error('ユーザータグ保存エラー:', e); return false; }
            }, [lineStoreId, fetchTags]);

            // === 分析 ===
            const [analytics, setAnalytics] = useState(null);

            const fetchAnalytics = useCallback(async () => {
                if (!lineStoreId || UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                try {
                    const data = await fetchGAS('?type=lineAnalytics&store=' + lineStoreId);
                    if (data.analytics) setAnalytics(data.analytics);
                } catch (e) { console.error('[LINE] 分析取得エラー:', e); }
            }, [lineStoreId]);

            return {
                lineConfig, threads, profiles, messages, selectedThread,
                lineStoreId, setLineStoreId, loading, sending, configError,
                gasStatus, gasError,
                fetchThreads, openThread, setSelectedThread, sendMessage, sendFlexMessage, fetchMessages,
                broadcasts, broadcastSending, fetchBroadcasts, sendBroadcast,
                templates, fetchTemplates, saveTemplate,
                autoReplies, fetchAutoReplies, saveAutoReply,
                tags, userTags, fetchTags, saveTag, saveUserTag,
                analytics, fetchAnalytics
            };
        };

        // ========================================
        // ダッシュボードメインビュー
        // ========================================

        // 目標プログレスリング
        const GoalRing = ({ value, max, size = 80, strokeWidth = 6, color = "#DCA9A8", label, sublabel }) => {
            const radius = (size - strokeWidth) / 2;
            const circumference = 2 * Math.PI * radius;
            const progress = Math.min(value / (max || 1), 1);
            const offset = circumference * (1 - progress);
            return (
                <div className="flex flex-col items-center">
                    <svg width={size} height={size} className="transform -rotate-90">
                        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(220,169,168,0.08)" strokeWidth={strokeWidth} />
                        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round"
                            strokeDasharray={circumference} strokeDashoffset={offset}
                            className="usage-ring" style={{transition: 'stroke-dashoffset 1.2s cubic-bezier(0.16,1,0.3,1)'}} />
                    </svg>
                    <div className="absolute flex flex-col items-center justify-center" style={{width: size, height: size}}>
                        <span className="text-lg font-extrabold text-slate-900">{Math.round(progress * 100)}%</span>
                    </div>
                    {label && <p className="text-xs font-semibold text-slate-700 mt-1.5">{label}</p>}
                    {sublabel && <p className="text-[10px] text-slate-400">{sublabel}</p>}
                </div>
            );
        };

        const DashboardView = ({ memberData, reportData, selectedStore, setSelectedStore, allowedStoreNames }) => {
            const [dateRange, setDateRange] = useState('month');

            if (!window.Recharts) return <div className="p-8 text-center">チャートを読み込み中...</div>;

            // 日報データの集計
            const aggregatedData = useMemo(() => {
                if (!reportData.reports || reportData.reports.length === 0) {
                    return {
                        totalNewVisits: 0, totalContracts: 0, totalTreatments: 0, conversionRate: 0,
                        byChannel: [], byStore: [], dailyTrend: [],
                        todayReports: [], todayNew: 0, todayContract: 0, todayTreatments: 0,
                        dailyNewTrend: [], dailyContractTrend: [], dailyTreatmentTrend: [],
                        bestChannel: null, topStore: null
                    };
                }

                let filtered = reportData.reports;
                // 権限のある店舗のみに絞り込み（スタッフ・店舗管理者モード）
                if (allowedStoreNames) {
                    filtered = filtered.filter(r => allowedStoreNames.includes(r.store));
                }
                if (selectedStore !== 'all') {
                    filtered = filtered.filter(r => r.store === selectedStore);
                }

                const now = new Date();
                const startDate = new Date();
                switch (dateRange) {
                    case 'week': startDate.setDate(now.getDate() - 7); break;
                    case 'month': startDate.setMonth(now.getMonth() - 1); break;
                    case 'quarter': startDate.setMonth(now.getMonth() - 3); break;
                }
                filtered = filtered.filter(r => new Date(r.timestamp) >= startDate);

                // 本日のレポート（権限のある店舗のみ）
                const todayStr = now.toISOString().slice(0, 10);
                let todayBase = reportData.reports;
                if (allowedStoreNames) {
                    todayBase = todayBase.filter(r => allowedStoreNames.includes(r.store));
                }
                const todayReports = todayBase.filter(r => r.timestamp && r.timestamp.startsWith(todayStr));
                const todayNew = todayReports.reduce((s, r) => s + (r.hpbNew||0) + (r.metaNew||0) + (r.referralNew||0) + (r.discountNew||0), 0);
                const todayContract = todayReports.reduce((s, r) => s + (r.hpbContract||0) + (r.metaContract||0) + (r.referralContract||0) + (r.discountContract||0), 0);
                const todayTreatments = todayReports.reduce((s, r) => s + (r.existingTreatments||0), 0);

                // チャネル別集計
                const channels = [
                    { name: 'HPB', newKey: 'hpbNew', contractKey: 'hpbContract', color: '#f97316', icon: 'globe' },
                    { name: 'Meta', newKey: 'metaNew', contractKey: 'metaContract', color: '#3b82f6', icon: 'facebook' },
                    { name: '紹介', newKey: 'referralNew', contractKey: 'referralContract', color: '#22c55e', icon: 'heart-handshake' },
                    { name: '割引集客', newKey: 'discountNew', contractKey: 'discountContract', color: '#a855f7', icon: 'tag' }
                ];
                const byChannel = channels.map(ch => {
                    const newCount = filtered.reduce((sum, r) => sum + (r[ch.newKey] || 0), 0);
                    const contractCount = filtered.reduce((sum, r) => sum + (r[ch.contractKey] || 0), 0);
                    return { name: ch.name, new: newCount, contract: contractCount,
                        rate: newCount > 0 ? (contractCount / newCount * 100).toFixed(1) : 0,
                        color: ch.color, icon: ch.icon };
                });

                // 店舗別集計
                const storeMap = {};
                filtered.forEach(r => {
                    if (!storeMap[r.store]) storeMap[r.store] = { store: r.store, new: 0, contract: 0, treatments: 0, reports: 0 };
                    storeMap[r.store].new += (r.hpbNew||0) + (r.metaNew||0) + (r.referralNew||0) + (r.discountNew||0);
                    storeMap[r.store].contract += (r.hpbContract||0) + (r.metaContract||0) + (r.referralContract||0) + (r.discountContract||0);
                    storeMap[r.store].treatments += r.existingTreatments || 0;
                    storeMap[r.store].reports++;
                });
                const byStore = Object.values(storeMap).sort((a, b) => (b.new + b.contract) - (a.new + a.contract));

                // 日別推移
                const dailyMap = {};
                filtered.forEach(r => {
                    const dateKey = new Date(r.timestamp).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
                    if (!dailyMap[dateKey]) dailyMap[dateKey] = { date: dateKey, new: 0, contract: 0, treatments: 0 };
                    dailyMap[dateKey].new += (r.hpbNew||0) + (r.metaNew||0) + (r.referralNew||0) + (r.discountNew||0);
                    dailyMap[dateKey].contract += (r.hpbContract||0) + (r.metaContract||0) + (r.referralContract||0) + (r.discountContract||0);
                    dailyMap[dateKey].treatments += r.existingTreatments || 0;
                });
                const dailyTrend = Object.values(dailyMap).slice(-14);

                // スパークライン用データ
                const dailyNewTrend = dailyTrend.map(d => d.new);
                const dailyContractTrend = dailyTrend.map(d => d.contract);
                const dailyTreatmentTrend = dailyTrend.map(d => d.treatments);

                const totalNew = byChannel.reduce((sum, ch) => sum + ch.new, 0);
                const totalContract = byChannel.reduce((sum, ch) => sum + ch.contract, 0);
                const totalTreatments = filtered.reduce((sum, r) => sum + (r.existingTreatments || 0), 0);
                const bestChannel = [...byChannel].sort((a, b) => parseFloat(b.rate) - parseFloat(a.rate))[0];
                const topStore = byStore[0] || null;

                return {
                    totalNewVisits: totalNew, totalContracts: totalContract, totalTreatments: totalTreatments,
                    conversionRate: totalNew > 0 ? (totalContract / totalNew * 100) : 0,
                    byChannel, byStore, dailyTrend,
                    todayReports, todayNew, todayContract, todayTreatments,
                    dailyNewTrend, dailyContractTrend, dailyTreatmentTrend,
                    bestChannel, topStore
                };
            }, [reportData.reports, selectedStore, dateRange, allowedStoreNames]);

            const storeColors = ['#DCA9A8', '#3b82f6', '#f97316', '#a855f7', '#ec4899'];
            const tooltipStyle = { backgroundColor: 'rgba(255,255,255,0.95)', borderColor: '#e2e8f0', borderRadius: '16px', boxShadow: '0 12px 40px -8px rgba(0,0,0,0.1)', padding: '12px 16px' };
            const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;
            const chartHeight = isMobile ? 200 : 260;
            const barChartHeight = isMobile ? 190 : 240;

            return (
                <div className="space-y-4 md:space-y-5">
                    {/* フィルターバー */}
                    <Card className="!p-3 md:!p-4">
                        <div className="flex flex-wrap items-center justify-between gap-3">
                            <div className="flex items-center gap-2">
                                <Icon name="building-2" size={16} className="text-vivie-500 hide-mobile" />
                                <select value={selectedStore} onChange={(e) => setSelectedStore(e.target.value)}
                                    className="px-3 py-2 border border-slate-200 rounded-xl text-sm focus:border-vivie-500 focus:ring-2 focus:ring-vivie-500/20 outline-none bg-white/80">
                                    <option value="all">全店舗</option>
                                    {(currentAccess ? serverStores.filter(s => currentAccess.storeIds.includes(s.id)) : serverStores).map(s =>
                                        <option key={s.id} value={s.name}>{s.name}</option>
                                    )}
                                </select>
                            </div>
                            <div className="flex items-center gap-1.5">
                                {['week', 'month', 'quarter'].map(range => (
                                    <button key={range} onClick={() => setDateRange(range)}
                                        className={`px-3 md:px-4 py-2 rounded-xl text-xs md:text-sm font-semibold transition-all duration-300 ${
                                            dateRange === range ? 'btn-gradient' : 'bg-slate-100/80 text-slate-500 hover:bg-slate-200/80 hover:text-slate-700'
                                        }`}>
                                        {range === 'week' ? '1週間' : range === 'month' ? '1ヶ月' : '3ヶ月'}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </Card>

                    {/* 本日のハイライト */}
                    {aggregatedData.todayReports.length > 0 && (
                        <div className="today-card p-4 md:p-5 animate-slide-up-fade">
                            <div className="flex flex-wrap items-center justify-between gap-3 ml-3">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 text-white flex items-center justify-center shadow-lg">
                                        <Icon name="sun" size={20} />
                                    </div>
                                    <div>
                                        <h3 className="text-base font-bold text-slate-900">本日のサマリー</h3>
                                        <p className="text-[10px] text-slate-500">{new Date().toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' })} ・ {aggregatedData.todayReports.length}件の日報</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4 md:gap-6 ml-3">
                                    <div className="text-center">
                                        <p className="text-xl md:text-2xl font-extrabold text-blue-600">{aggregatedData.todayNew}</p>
                                        <p className="text-[10px] text-slate-500 font-medium">新規</p>
                                    </div>
                                    <div className="text-center">
                                        <p className="text-xl md:text-2xl font-extrabold text-emerald-600">{aggregatedData.todayContract}</p>
                                        <p className="text-[10px] text-slate-500 font-medium">契約</p>
                                    </div>
                                    <div className="text-center">
                                        <p className="text-xl md:text-2xl font-extrabold text-orange-600">{aggregatedData.todayTreatments}</p>
                                        <p className="text-[10px] text-slate-500 font-medium">施術</p>
                                    </div>
                                    {aggregatedData.todayNew > 0 && (
                                        <div className="text-center hide-mobile">
                                            <p className="text-xl md:text-2xl font-extrabold text-teal-600">{(aggregatedData.todayContract / aggregatedData.todayNew * 100).toFixed(0)}%</p>
                                            <p className="text-[10px] text-slate-500 font-medium">成約率</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Square会員データ KPIカード */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-2.5 md:gap-4">
                        <KpiCard title="アクティブ会員" value={formatNumber(memberData.activeMembers)}
                            subValue={`総会員: ${formatNumber(memberData.totalMembers)}人`} trend={null} icon="users"
                            gradientFrom="from-vivie-400" gradientTo="to-vivie-600" accentColor="#DCA9A8" loading={memberData.loading} />
                        <KpiCard title="想定月間売上" value={formatCurrency(memberData.expectedRevenue)}
                            subValue="サブスク収益" trend={null} icon="wallet"
                            gradientFrom="from-emerald-400" gradientTo="to-emerald-600" accentColor="#059669" loading={memberData.loading} />
                        <KpiCard title="新規入会" value={formatNumber(memberData.newMembersThisMonth)}
                            subValue="今月の入会者" trend={null} icon="user-plus"
                            gradientFrom="from-blue-400" gradientTo="to-blue-600" accentColor="#3b82f6" loading={memberData.loading} />
                        <KpiCard title="退会率" value={formatPercent(memberData.churnRate)}
                            subValue={`退会者: ${memberData.churnedMembers}人`} trend={null} icon="user-minus"
                            gradientFrom={memberData.churnRate > 5 ? "from-red-400" : "from-slate-400"}
                            gradientTo={memberData.churnRate > 5 ? "to-red-600" : "to-slate-500"}
                            accentColor={memberData.churnRate > 5 ? "#ef4444" : "#64748b"} loading={memberData.loading} />
                    </div>

                    {/* 日報集計 KPIカード（スパークライン付き） */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-2.5 md:gap-4">
                        <KpiCard title="新規来店数" value={formatNumber(aggregatedData.totalNewVisits)}
                            subValue="全チャネル合計" trend={null} icon="user-check"
                            gradientFrom="from-orange-400" gradientTo="to-orange-600"
                            sparkData={aggregatedData.dailyNewTrend} accentColor="#f97316" loading={reportData.loading} />
                        <KpiCard title="契約数" value={formatNumber(aggregatedData.totalContracts)}
                            subValue="新規契約" trend={null} icon="file-signature"
                            gradientFrom="from-violet-400" gradientTo="to-violet-600"
                            sparkData={aggregatedData.dailyContractTrend} accentColor="#8b5cf6" loading={reportData.loading} />
                        <KpiCard title="成約率" value={formatPercent(aggregatedData.conversionRate)}
                            subValue="新規 → 契約" trend={null} icon="target"
                            gradientFrom="from-teal-400" gradientTo="to-teal-600" accentColor="#14b8a6" loading={reportData.loading} />
                        <KpiCard title="既存施術数" value={formatNumber(aggregatedData.totalTreatments)}
                            subValue="リピーター対応" trend={null} icon="heart-handshake"
                            gradientFrom="from-rose-400" gradientTo="to-rose-600"
                            sparkData={aggregatedData.dailyTreatmentTrend} accentColor="#f43f5e" loading={reportData.loading} />
                    </div>

                    {/* チャート + チャネルカード */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-5">
                        {/* 日別推移チャート */}
                        <Card>
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <h3 className="text-base font-bold text-slate-800">日別推移</h3>
                                    <p className="text-[10px] text-vivie-500 tracking-widest font-semibold">DAILY TREND</p>
                                </div>
                                <div className="flex items-center gap-3 text-[10px]">
                                    <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-sky-500"></span>新規</span>
                                    <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-green-500"></span>契約</span>
                                    <span className="flex items-center gap-1"><span className="w-2.5 h-0.5 bg-orange-500" style={{borderTop:'2px dashed #f97316',width:12}}></span>施術</span>
                                </div>
                            </div>
                            <ResponsiveContainer width="100%" height={chartHeight}>
                                <ComposedChart data={aggregatedData.dailyTrend}>
                                    <CartesianGrid strokeDasharray="3 3" stroke="#e8f0ec" vertical={false} />
                                    <XAxis dataKey="date" tick={{ fontSize: 10, fill: '#94a3b8' }} axisLine={false} tickLine={false} />
                                    <YAxis tick={{ fontSize: 10, fill: '#94a3b8' }} axisLine={false} tickLine={false} width={30} />
                                    <Tooltip contentStyle={tooltipStyle} />
                                    <defs>
                                        <linearGradient id="areaBlue" x1="0" y1="0" x2="0" y2="1">
                                            <stop offset="0%" stopColor="#0ea5e9" stopOpacity={0.25} />
                                            <stop offset="100%" stopColor="#0ea5e9" stopOpacity={0} />
                                        </linearGradient>
                                        <linearGradient id="areaGreen" x1="0" y1="0" x2="0" y2="1">
                                            <stop offset="0%" stopColor="#22c55e" stopOpacity={0.25} />
                                            <stop offset="100%" stopColor="#22c55e" stopOpacity={0} />
                                        </linearGradient>
                                    </defs>
                                    <Area type="monotone" dataKey="new" name="新規" stroke="#0ea5e9" strokeWidth={2.5} fill="url(#areaBlue)" dot={{ r: 3, fill: '#0ea5e9', strokeWidth: 0 }} activeDot={{ r: 5, fill: '#0ea5e9', stroke: '#fff', strokeWidth: 2 }} />
                                    <Area type="monotone" dataKey="contract" name="契約" stroke="#22c55e" strokeWidth={2.5} fill="url(#areaGreen)" dot={{ r: 3, fill: '#22c55e', strokeWidth: 0 }} activeDot={{ r: 5, fill: '#22c55e', stroke: '#fff', strokeWidth: 2 }} />
                                    <Line type="monotone" dataKey="treatments" name="施術" stroke="#f97316" strokeWidth={2} dot={false} strokeDasharray="6 4" />
                                </ComposedChart>
                            </ResponsiveContainer>
                        </Card>

                        {/* チャネル別カード */}
                        <Card>
                            <h3 className="text-base font-bold text-slate-800 mb-1">チャネル別パフォーマンス</h3>
                            <p className="text-[10px] text-vivie-500 mb-4 tracking-widest font-semibold">CHANNEL BREAKDOWN</p>
                            <div className="space-y-3">
                                {aggregatedData.byChannel.map((ch) => {
                                    const rate = parseFloat(ch.rate) || 0;
                                    return (
                                        <div key={ch.name} className="group/ch rounded-xl p-3 hover:bg-slate-50/80 transition-all duration-300">
                                            <div className="flex items-center justify-between mb-2">
                                                <div className="flex items-center gap-2.5">
                                                    <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{backgroundColor: ch.color + '18'}}>
                                                        <Icon name={ch.icon} size={15} color={ch.color} />
                                                    </div>
                                                    <div>
                                                        <span className="font-semibold text-sm text-slate-800">{ch.name}</span>
                                                        <div className="flex items-center gap-2 text-[10px] text-slate-400">
                                                            <span>新規 {ch.new}</span>
                                                            <span>契約 {ch.contract}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <span className={`text-lg font-extrabold ${rate >= 50 ? 'text-emerald-600' : rate >= 30 ? 'text-amber-600' : 'text-slate-400'}`}>
                                                    {ch.rate}%
                                                </span>
                                            </div>
                                            <div className="progress-bar-animated">
                                                <div className="bar" style={{width: `${Math.min(rate, 100)}%`, background: `linear-gradient(90deg, ${ch.color}, ${ch.color}cc)`}}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </Card>
                    </div>

                    {/* チャネル別棒グラフ + 店舗ランキング */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-5">
                        {/* チャネル別棒グラフ */}
                        <Card>
                            <div className="flex items-center justify-between mb-4">
                                <div>
                                    <h3 className="text-base font-bold text-slate-800">新規 vs 契約</h3>
                                    <p className="text-[10px] text-vivie-500 tracking-widest font-semibold">NEW vs CONTRACT</p>
                                </div>
                            </div>
                            <ResponsiveContainer width="100%" height={barChartHeight}>
                                <BarChart data={aggregatedData.byChannel} barGap={6} barCategoryGap="20%">
                                    <CartesianGrid strokeDasharray="3 3" stroke="#e8f0ec" vertical={false} />
                                    <XAxis dataKey="name" tick={{ fontSize: 11, fill: '#64748b' }} axisLine={false} tickLine={false} />
                                    <YAxis tick={{ fontSize: 10, fill: '#94a3b8' }} axisLine={false} tickLine={false} width={25} />
                                    <Tooltip contentStyle={tooltipStyle} formatter={(v, n) => [v + '人', n === 'new' ? '新規' : '契約']} />
                                    <defs>
                                        <linearGradient id="barGradientBlue" x1="0" y1="0" x2="0" y2="1">
                                            <stop offset="0%" stopColor="#38bdf8" /><stop offset="100%" stopColor="#0ea5e9" />
                                        </linearGradient>
                                        <linearGradient id="barGradientGreen" x1="0" y1="0" x2="0" y2="1">
                                            <stop offset="0%" stopColor="#4ade80" /><stop offset="100%" stopColor="#22c55e" />
                                        </linearGradient>
                                    </defs>
                                    <Bar dataKey="new" name="new" fill="url(#barGradientBlue)" radius={[6, 6, 0, 0]} />
                                    <Bar dataKey="contract" name="contract" fill="url(#barGradientGreen)" radius={[6, 6, 0, 0]} />
                                </BarChart>

            const getCurrentMonthPayment = (member) => {

                                                            <input type="text" id={`plan_${member.id}`} defaultValue={member.planName}
                                                                placeholder="新プラン名" className="flex-1 px-2.5 py-2 border border-slate-200 rounded-lg text-sm outline-none" />
                                                            <input type="number" id={`price_${member.id}`} defaultValue={member.monthlyPrice}
                                                                placeholder="金額" className="w-24 px-2.5 py-2 border border-slate-200 rounded-lg text-sm outline-none" />
                                                            <button onClick={() => {
                                                                const plan = document.getElementById(`plan_${member.id}`).value;
                                                                const price = parseInt(document.getElementById(`price_${member.id}`).value) || member.monthlyPrice;
                                                                changePlan(member.id, plan, price);
                                                                setPlanChangeForm(null);
                                                            }} className="px-3 py-2 btn-gradient rounded-lg text-sm font-medium">変更</button>
                                                        </div>
                                                    </div>
                                                )}

                                                {/* 支払履歴 */}
                                                {(member.payments || []).length > 0 && (
                                                    <div>
                                                        <p className="text-xs font-semibold text-slate-600 mb-2 flex items-center">
                                                            <Icon name="receipt" size={13} className="mr-1" /> 支払履歴
                                                        </p>
                                                        <div className="space-y-1">
                                                            {(member.payments || []).slice().reverse().slice(0, 6).map(payment => (
                                                                <div key={payment.id} className="flex items-center justify-between p-2 bg-slate-50/80 rounded-lg text-xs group">
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="text-slate-500">{payment.date}</span>
                                                                        <span className={`font-semibold px-1.5 py-0.5 rounded text-[10px] ${
                                                                            payment.method === 'QR' ? 'bg-blue-100 text-blue-700' :
                                                                            payment.method === 'TRANSFER' ? 'bg-purple-100 text-purple-700' :
                                                                            'bg-amber-100 text-amber-700'
                                                                        }`}>{payment.method === 'QR' ? 'QR' : payment.method === 'TRANSFER' ? '振込' : '現金'}</span>
                                                                    </div>
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="font-bold text-slate-800">{formatCurrency(payment.amount)}</span>
                                                                        <button onClick={(e) => { e.stopPropagation(); if(confirm('この支払記録を削除しますか？')) removePayment(member.id, payment.id); }}
                                                                            className="md:opacity-0 md:group-hover:opacity-100 p-1.5 rounded-lg hover:bg-red-50 text-slate-300 hover:text-red-400 transition-all">
                                                                            <Icon name="x" size={14} />
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}

                                                {/* 変更履歴 */}
                                                {(member.history || []).length > 1 && (
                                                    <div className="mt-2 pt-2 border-t border-slate-100">
                                                        <p className="text-[10px] text-slate-400 font-semibold mb-1">変更履歴</p>
                                                        <div className="space-y-0.5">
                                                            {(member.history || []).slice().reverse().slice(0, 4).map((h, i) => (
                                                                <p key={i} className="text-[10px] text-slate-400">
                                                                    {new Date(h.date).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' })} - {h.note}
                                                                </p>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {viewMode === 'manual' && filteredManual.length === 0 && (
                        <div className="text-center py-8 text-slate-400">
                            <Icon name="wallet" size={28} className="mx-auto mb-3 text-slate-300" />
                            <p className="text-sm font-medium">QR・現金決済の会員がいません</p>
                            <p className="text-xs mt-1 text-slate-400">「入会登録」ボタンから追加できます</p>
                        </div>
                    )}
                </Card>
            );
        };

        // ========================================
        // サブスク契約リンク生成モーダル
        // ========================================
        // activeStoreIdが'all'の場合、最初の店舗IDにフォールバック
        const resolveStoreId = (sid) => {
            if (sid && sid !== 'all') return sid;
            if (serverStores.length > 0) return serverStores[0].id;
            return null; // defaultにフォールバック（ヘッダー送信しない）
        };

        const SubscriptionLinkModal = ({ isOpen, onClose, activeStoreId, memberData }) => {
            const [plans, setPlans] = useState([]);
            const [selectedPlanId, setSelectedPlanId] = useState('');
            const [loading, setLoading] = useState(false);
            const [fetchingPlans, setFetchingPlans] = useState(false);
            const [generatedLink, setGeneratedLink] = useState(null);
            const [qrDataUrl, setQrDataUrl] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            // プラン一覧を取得
            useEffect(() => {
                if (!isOpen) return;
                setGeneratedLink(null);
                setQrDataUrl(null);
                setError(null);
                setSelectedPlanId('');

                const fetchPlans = async () => {
                    setFetchingPlans(true);
                    try {
                        const headers = { 'Content-Type': 'application/json' };
                        { const sid = resolveStoreId(activeStoreId); if (sid) headers['X-Store-Id'] = sid; }
                        const res = await fetch(`${SQUARE_PROXY_BASE}/catalog/list`, {
                            method: 'POST',
                            headers,
                            body: JSON.stringify({ types: ['SUBSCRIPTION_PLAN'] })
                        });
                        if (!res.ok) throw new Error('プラン取得に失敗しました');
                        const data = await res.json();
                        const objects = data.objects || [];

                        // プランとバリエーションを抽出
                        const planList = [];
                        objects.forEach(obj => {
                            if (obj.type === 'SUBSCRIPTION_PLAN' && obj.subscription_plan_data) {
                                const planData = obj.subscription_plan_data;
                                // バリエーションを取得
                                const variations = planData.subscription_plan_variations || [];
                                if (variations.length > 0) {
                                    variations.forEach(v => {
                                        const varData = v.subscription_plan_variation_data;
                                        const phases = varData?.phases || [];
                                        let price = 0;
                                        let currency = 'JPY';
                                        let cadence = 'MONTHLY';
                                        if (phases.length > 0) {
                                            const paidPhase = phases.find(p => p.pricing?.price_money?.amount > 0) || phases[0];
                                            price = paidPhase.pricing?.price_money?.amount || paidPhase.recurring_price_money?.amount || 0;
                                            currency = paidPhase.pricing?.price_money?.currency || paidPhase.recurring_price_money?.currency || 'JPY';
                                            cadence = paidPhase.cadence || 'MONTHLY';
                                        }
                                        planList.push({
                                            id: v.id,
                                            name: `${planData.name} - ${varData?.name || 'デフォルト'}`,
                                            price,
                                            currency,
                                            cadence,
                                        });
                                    });
                                } else {
                                    // バリエーションが直接ない場合（別オブジェクトとして返る場合）
                                    planList.push({
                                        id: obj.id,
                                        name: planData.name,
                                        price: 0,
                                        cadence: 'MONTHLY',
                                    });
                                }
                            }
                            // SUBSCRIPTION_PLAN_VARIATIONが直接返る場合
                            if (obj.type === 'SUBSCRIPTION_PLAN_VARIATION' && obj.subscription_plan_variation_data) {
                                const varData = obj.subscription_plan_variation_data;
                                const phases = varData.phases || [];
                                let price = 0;
                                let currency = 'JPY';
                                let cadence = 'MONTHLY';
                                if (phases.length > 0) {
                                    const paidPhase = phases.find(p => p.pricing?.price_money?.amount > 0) || phases[0];
                                    price = paidPhase.pricing?.price_money?.amount || paidPhase.recurring_price_money?.amount || 0;
                                    currency = paidPhase.pricing?.price_money?.currency || paidPhase.recurring_price_money?.currency || 'JPY';
                                    cadence = paidPhase.cadence || 'MONTHLY';
                                }
                                planList.push({
                                    id: obj.id,
                                    name: varData.name || obj.id,
                                    price,
                                    currency,
                                    cadence,
                                });
                            }
                        });

                        // batch-retrieveでバリエーション取得（catalog/listで取れない場合のフォールバック）
                        if (planList.length === 0 && objects.length > 0) {
                            objects.forEach(obj => {
                                if (obj.subscription_plan_data) {
                                    planList.push({
                                        id: obj.id,
                                        name: obj.subscription_plan_data.name || obj.id,
                                        price: 0,
                                        cadence: 'MONTHLY',
                                    });
                                }
                            });
                        }

                        // memberDataからプランバリエーションIDを使ってフォールバック
                        if (planList.length === 0 && memberData && memberData.members) {
                            const planMap = new Map();
                            memberData.members.forEach(m => {
                                if (m.planVariationId && !planMap.has(m.planVariationId)) {
                                    planMap.set(m.planVariationId, {
                                        id: m.planVariationId,
                                        name: m.planName || 'プラン',
                                        price: m.monthlyPrice || 0,
                                        cadence: m.cadence || 'MONTHLY',
                                    });
                                }
                            });
                            planList.push(...planMap.values());
                        }

                        setPlans(planList);
                        if (planList.length > 0) setSelectedPlanId(planList[0].id);
                    } catch (e) {
                        setError(e.message);
                    } finally {
                        setFetchingPlans(false);
                    }
                };
                fetchPlans();
            }, [isOpen, activeStoreId]);

            // 契約リンク生成
            const generateLink = async () => {
                if (!selectedPlanId) return;
                const selectedPlan = plans.find(p => p.id === selectedPlanId);
                if (!selectedPlan) return;
                setLoading(true);
                setError(null);
                setGeneratedLink(null);
                setQrDataUrl(null);

                try {
                    const headers = { 'Content-Type': 'application/json' };
                    const sid = resolveStoreId(activeStoreId);
                    if (sid) headers['X-Store-Id'] = sid;

                    // location_idを取得
                    const store = serverStores.find(s => s.id === sid);
                    const locationId = store?.locationId || '';
                    if (!locationId) throw new Error('店舗のロケーションIDが設定されていません');

                    const body = {
                        idempotency_key: crypto.randomUUID(),
                        quick_pay: {
                            location_id: locationId,
                            name: selectedPlan.name,
                            price_money: {
                                amount: selectedPlan.price,
                                currency: selectedPlan.currency || 'JPY',
                            },
                        },
                        checkout_options: {
                            subscription_plan_id: selectedPlanId,
                        },
                    };
                    const res = await fetch(`${SQUARE_PROXY_BASE}/online-checkout/payment-links`, {
                        method: 'POST',
                        headers,
                        body: JSON.stringify(body)
                    });

                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        const detail = errData.errors
                            ? errData.errors.map(e => e.detail || e.code).join(', ')
                            : JSON.stringify(errData);
                        throw new Error(detail);
                    }

                    const data = await res.json();
                    const link = data.payment_link;
                    if (!link || !link.url) throw new Error('リンクの生成に失敗しました');

                    setGeneratedLink({
                        url: link.url,
                        longUrl: link.long_url || link.url,
                        id: link.id,
                        createdAt: link.created_at,
                    });

                    // QRコード生成
                    if (window.QRCode) {
                        const qrUrl = await window.QRCode.toDataURL(link.url, {
                            width: 280,
                            margin: 2,
                            color: { dark: '#7a4d4c', light: '#ffffff' },
                            errorCorrectionLevel: 'M',
                        });
                        setQrDataUrl(qrUrl);
                    }
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            // URLコピー
            const copyUrl = async () => {
                if (!generatedLink) return;
                try {
                    await navigator.clipboard.writeText(generatedLink.url);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (e) {
                    // フォールバック
                    const ta = document.createElement('textarea');
                    ta.value = generatedLink.url;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }
            };

            // 頻度ラベル
            const cadenceLabel = (c) => {
                const map = { DAILY: '日次', WEEKLY: '週次', MONTHLY: '月額', QUARTERLY: '四半期', ANNUAL: '年額' };
                return map[c] || c || '月額';
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
                    <div className="bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl max-w-lg w-full p-5 md:p-6 max-h-[90vh] overflow-y-auto animate-scale-in border border-slate-200/50" onClick={(e) => e.stopPropagation()}>
                        {/* ヘッダー */}
                        <div className="flex items-center justify-between mb-5">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-vivie-400 to-vivie-600 rounded-xl flex items-center justify-center">
                                    <Icon name="link" size={20} className="text-white" />
                                </div>
                                <div>
                                    <h3 className="text-lg font-bold text-slate-900">サブスク契約リンク生成</h3>
                                    <p className="text-xs text-slate-400">契約用URL・QRコードを発行</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-lg transition-colors">
                                <Icon name="x" size={20} />
                            </button>
                        </div>

                        {/* プラン選択 */}
                        {fetchingPlans ? (
                            <div className="flex items-center justify-center py-8">
                                <Icon name="loader" size={24} className="animate-spin text-vivie-500 mr-2" />
                                <span className="text-sm text-slate-500">プランを読み込み中...</span>
                            </div>
                        ) : plans.length === 0 ? (
                            <div className="text-center py-8">
                                <div className="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-3">
                                    <Icon name="alert-circle" size={24} className="text-slate-400" />
                                </div>
                                <p className="text-sm font-medium text-slate-600 mb-1">サブスクリプションプランが見つかりません</p>
                                <p className="text-xs text-slate-400">Squareダッシュボードでプランを作成してください</p>
                            </div>
                        ) : (
                            <>
                                {!generatedLink && (
                                    <div className="mb-5">
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">プランを選択</label>
                                        <div className="space-y-2">
                                            {plans.map(plan => (
                                                <label
                                                    key={plan.id}
                                                    className={`flex items-center justify-between p-3 rounded-xl border-2 cursor-pointer transition-all ${
                                                        selectedPlanId === plan.id
                                                            ? 'border-vivie-400 bg-vivie-50/50'
                                                            : 'border-slate-200 hover:border-slate-300 bg-white'
                                                    }`}
                                                >
                                                    <div className="flex items-center gap-3">
                                                        <input
                                                            type="radio"
                                                            name="plan"
                                                            value={plan.id}
                                                            checked={selectedPlanId === plan.id}
                                                            onChange={() => setSelectedPlanId(plan.id)}
                                                            className="accent-vivie-500"
                                                        />
                                                        <div>
                                                            <p className="font-medium text-slate-800 text-sm">{plan.name}</p>
                                                            <p className="text-xs text-slate-400">{cadenceLabel(plan.cadence)}</p>
                                                        </div>
                                                    </div>
                                                    {plan.price > 0 && (
                                                        <span className="font-bold text-vivie-700 text-sm">
                                                            {Number(plan.price).toLocaleString()}円
                                                        </span>
                                                    )}
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* エラー表示 */}
                                {error && (
                                    <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700">
                                        <Icon name="alert-circle" size={14} className="inline mr-1" />
                                        {error}
                                    </div>
                                )}

                                {/* 生成ボタン */}
                                {!generatedLink && (
                                    <button
                                        onClick={generateLink}
                                        disabled={loading || !selectedPlanId}
                                        className="w-full flex items-center justify-center gap-2 px-4 py-3 btn-gradient rounded-xl font-semibold text-sm transition-all disabled:opacity-50"
                                    >
                                        {loading ? (
                                            <>
                                                <Icon name="loader" size={16} className="animate-spin" />
                                                生成中...
                                            </>
                                        ) : (
                                            <>
                                                <Icon name="sparkles" size={16} />
                                                契約リンクを生成
                                            </>
                                        )}
                                    </button>
                                )}

                                {/* 生成結果 */}
                                {generatedLink && (
                                    <div className="space-y-4 animate-fade-in">
                                        {/* QRコード */}
                                        {qrDataUrl && (
                                            <div className="flex flex-col items-center py-4">
                                                <img src={qrDataUrl} alt="QR Code" className="w-56 h-56 rounded-xl shadow-lg border border-slate-100" />
                                                <p className="text-xs text-slate-400 mt-2">お客様にこのQRコードを読み取ってもらってください</p>
                                            </div>
                                        )}

                                        {/* URL表示 */}
                                        <div className="bg-slate-50 rounded-xl p-3 border border-slate-200">
                                            <label className="block text-xs font-semibold text-slate-500 mb-1.5">契約URL</label>
                                            <div className="flex items-center gap-2">
                                                <input
                                                    type="text"
                                                    readOnly
                                                    value={generatedLink.url}
                                                    className="flex-1 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-700 select-all outline-none"
                                                    onClick={(e) => e.target.select()}
                                                />
                                                <button
                                                    onClick={copyUrl}
                                                    className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium transition-all ${
                                                        copied
                                                            ? 'bg-green-100 text-green-700 border border-green-200'
                                                            : 'bg-vivie-50 text-vivie-700 border border-vivie-200 hover:bg-vivie-100'
                                                    }`}
                                                >
                                                    <Icon name={copied ? "check" : "copy"} size={14} />
                                                    {copied ? 'コピー済' : 'コピー'}
                                                </button>
                                            </div>
                                        </div>

                                        {/* アクションボタン */}
                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => { setGeneratedLink(null); setQrDataUrl(null); setError(null); }}
                                                className="flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-sm font-medium transition-colors"
                                            >
                                                <Icon name="refresh-cw" size={14} />
                                                別のリンクを生成
                                            </button>
                                            {qrDataUrl && (
                                                <a
                                                    href={qrDataUrl}
                                                    download="subscription-qr.png"
                                                    className="flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 bg-vivie-50 hover:bg-vivie-100 text-vivie-700 border border-vivie-200 rounded-xl text-sm font-medium transition-colors"
                                                >
                                                    <Icon name="download" size={14} />
                                                    QR画像を保存
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const MemberManagementView = ({ memberData, refreshSquareData, operateSubscription, activeStoreId, manualMembersHook }) => {
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [filterStatus, setFilterStatus] = useState('all'); // all, ACTIVE, CANCELED, PENDING
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedMember, setSelectedMember] = useState(null);
            const [actionLoading, setActionLoading] = useState(null); // 'cancel'|'pause'|'resume'
            const [actionMessage, setActionMessage] = useState(null); // { type, text }
            const [showSubscriptionLink, setShowSubscriptionLink] = useState(false);
            const [currentPage, setCurrentPage] = useState(1);
            const ITEMS_PER_PAGE = 30;
            const ITEMS_PER_PAGE_MOBILE = 20;

            const handleRefresh = async () => {
                setIsRefreshing(true);
                await refreshSquareData();
                setIsRefreshing(false);
            };

            const handleAction = async (member, action) => {
                const labels = { cancel: '解約', pause: '一時停止', resume: '再開' };
                if (!confirm(`${member.name} のサブスクリプションを${labels[action]}しますか？`)) return;

                setActionLoading(action);
                setActionMessage(null);
                try {
                    await operateSubscription(member.id, action, member.storeId);
                    setActionMessage({ type: 'success', text: `${labels[action]}が完了しました` });
                    // データ更新
                    await refreshSquareData();
                    setSelectedMember(null);
                } catch (e) {
                    setActionMessage({ type: 'error', text: `${labels[action]}に失敗: ${e.message}` });
                } finally {
                    setActionLoading(null);
                }
            };

            // 月額単価（設定可能にする）
            const monthlyPrice = 10000;

            // LTV計算（平均継続月数を仮定）
            const avgRetentionMonths = memberData.churnRate > 0 ? Math.round(100 / memberData.churnRate) : 24;
            const estimatedLTV = monthlyPrice * avgRetentionMonths;

            // 会員フィルタリング
            const filteredMembers = useMemo(() => {
                let filtered = memberData.members || [];

                // ステータスフィルタ
                if (filterStatus !== 'all') {
                    filtered = filtered.filter(m => m.status === filterStatus);
                }

                // 検索クエリ
                if (searchQuery) {
                    const query = searchQuery.toLowerCase();
                    filtered = filtered.filter(m =>
                        m.name.toLowerCase().includes(query) ||
                        m.email.toLowerCase().includes(query) ||
                        m.phone.includes(query)
                    );
                }

                return filtered;
            }, [memberData.members, filterStatus, searchQuery]);

            // フィルタ変更時にページリセット
            useEffect(() => { setCurrentPage(1); }, [filterStatus, searchQuery]);

            const totalPages = Math.ceil(filteredMembers.length / ITEMS_PER_PAGE);
            const totalPagesMobile = Math.ceil(filteredMembers.length / ITEMS_PER_PAGE_MOBILE);
            const paginatedMembers = filteredMembers.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);
            const paginatedMembersMobile = filteredMembers.slice((currentPage - 1) * ITEMS_PER_PAGE_MOBILE, currentPage * ITEMS_PER_PAGE_MOBILE);

            // ステータスバッジの色
            const getStatusColor = (status) => {
                switch (status) {
                    case 'ACTIVE': return 'bg-green-100 text-green-700 border-green-200';
                    case 'CANCELED': return 'bg-red-100 text-red-700 border-red-200';
                    case 'PENDING': return 'bg-yellow-100 text-yellow-700 border-yellow-200';
                    case 'PAUSED': return 'bg-slate-100 text-slate-700 border-slate-200';
                    default: return 'bg-slate-100 text-slate-700 border-slate-200';
                }
            };

            // ステータスラベル
            const getStatusLabel = (status) => {
                switch (status) {
                    case 'ACTIVE': return 'アクティブ';

            const [filterStatus, setFilterStatus] = useState('active'); // 'all' | 'active' | 'expiring' | 'expired' | 'completed'

            const [planForm, setPlanForm] = useState({ name: '', sessions: '', price: '', validityDays: '' });

            // 日数計算
            const getDaysUntilExpiration = (expirationDate) => {
                const now = new Date();
                const exp = new Date(expirationDate);
                return Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
            };

            // ステータス判定
            const getTicketStatus = (ticket) => {
                const days = getDaysUntilExpiration(ticket.expirationDate);
                if (ticket.remainingSessions <= 0) return 'completed';
                if (days < 0) return 'expired';
                if (days <= 30) return 'expiring';
                return 'active';
            };

            const getTicketStatusStyle = (status) => {
                switch (status) {
                    case 'active': return 'bg-green-100 text-green-700 border-green-200';
                    case 'expiring': return 'bg-amber-100 text-amber-700 border-amber-200';
                    case 'expired': return 'bg-red-100 text-red-700 border-red-200';
                    case 'completed': return 'bg-slate-100 text-slate-500 border-slate-200';
                    default: return 'bg-slate-100 text-slate-500';
                }
            };

            const getTicketStatusLabel = (status) => {
                switch (status) {
                    case 'active': return '有効';
                    case 'expiring': return '期限間近';
                    case 'expired': return '期限切れ';
                    case 'completed': return '消化済';
                    default: return status;
                }
            };

            // フィルタリング
            const filteredTickets = useMemo(() => {
                let list = customerTickets;
                // 権限のある店舗のみ表示
                if (currentAccess) {
                    list = list.filter(t => !t.storeName || isStoreAllowed(t.storeName));
                }
                if (filterStatus !== 'all') {
                    list = list.filter(t => getTicketStatus(t) === filterStatus);
                }
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    list = list.filter(t => t.customerName.toLowerCase().includes(q) || (t.customerPhone && t.customerPhone.includes(q)));
                }
                return list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }, [customerTickets, filterStatus, searchQuery]);

            // プランが変わったら有効期限を自動計算
            const handlePlanChange = (planId) => {
                const plan = ticketPlans.find(p => p.id === planId);
                const purchase = newTicket.purchaseDate || new Date().toISOString().slice(0, 10);
                let expDate = '';
                if (plan) {
                    const d = new Date(purchase);
                    d.setDate(d.getDate() + plan.validityDays);
                    expDate = d.toISOString().slice(0, 10);
                }
                setNewTicket(prev => ({ ...prev, planId, expirationDate: expDate }));
            };

            // 回数券追加
            const handleAddTicket = () => {
                if (!newTicket.customerName.trim() || !newTicket.planId) return;
                addCustomerTicket(newTicket);
                setNewTicket({ customerName: '', customerPhone: '', planId: '', storeName: '', notes: '', purchaseDate: new Date().toISOString().slice(0, 10), expirationDate: '' });
                setShowAddForm(false);
            };

            // プラン追加/更新
            const handleSavePlan = () => {
                if (!planForm.name.trim() || !planForm.sessions || !planForm.price) return;
                const data = {
                    name: planForm.name.trim(),
                    sessions: parseInt(planForm.sessions),
                    price: parseInt(planForm.price),
                    validityDays: parseInt(planForm.validityDays) || 180,
                    active: true,
                };
                if (editingPlan) {
                    updatePlan(editingPlan.id, data);
                } else {
                    addPlan(data);
                }
                setPlanForm({ name: '', sessions: '', price: '', validityDays: '' });
                setShowPlanForm(false);
                setEditingPlan(null);
            };

            const handleSave = async () => {
                await saveToSheet();
                setShowSaved(true);
                setTimeout(() => setShowSaved(false), 3000);
            };

            // 残セッションの進捗パーセンテージ
            const getProgressPct = (ticket) => {
                if (ticket.totalSessions <= 0) return 0;
                return ((ticket.totalSessions - ticket.remainingSessions) / ticket.totalSessions) * 100;
            };

            return (
                <div className="space-y-5 md:space-y-6 animate-fade-in">
                    <SectionHeader title="回数券管理" subtitle="TICKET MANAGEMENT" icon="ticket">

                            onClick={handleSave}
                            disabled={saving}
                            className="flex items-center px-4 py-2.5 btn-gradient rounded-xl font-medium text-sm transition-all disabled:opacity-50"

                            <Icon name={saving ? "loader" : "save"} size={16} className={`mr-2 ${saving ? 'animate-spin' : ''}`} />

                    {showSaved && (

                    {/* KPIサマリ（権限フィルタ適用済みデータから算出） */}

                        let storeTickets = customerTickets;
                        if (currentAccess) storeTickets = storeTickets.filter(t => !t.storeName || isStoreAllowed(t.storeName));
                        const now = new Date();
                        const fActive = storeTickets.filter(t => t.remainingSessions > 0 && new Date(t.expirationDate) >= now);
                        const fExpiring = storeTickets.filter(t => { const d = (new Date(t.expirationDate) - now) / 86400000; return t.remainingSessions > 0 && d >= 0 && d <= 30; });
                        const fRemaining = fActive.reduce((s, t) => s + t.remainingSessions, 0);
                        const fRevenue = storeTickets.reduce((s, t) => s + (t.price || 0), 0);
                        return (
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-2.5 md:gap-4">
                                <KpiCard title="有効回数券" value={fActive.length} subValue={`全${storeTickets.length}件`} icon="ticket" gradientFrom="from-vivie-400" gradientTo="to-vivie-600" />
                                <KpiCard title="期限間近" value={fExpiring.length} subValue="30日以内" icon="alert-triangle" gradientFrom={fExpiring.length > 0 ? "from-amber-400" : "from-slate-400"} gradientTo={fExpiring.length > 0 ? "to-amber-600" : "to-slate-500"} />
                                <KpiCard title="残セッション" value={fRemaining} subValue="有効分の合計" icon="hash" gradientFrom="from-blue-400" gradientTo="to-blue-600" />
                                <KpiCard title="累計売上" value={formatCurrency(fRevenue)} subValue="回数券販売額" icon="wallet" gradientFrom="from-emerald-400" gradientTo="to-emerald-600" />
                            </div>
                        );
                    })()}

                                        <button onClick={() => setShowAddForm(false)} className="px-4 py-2.5 text-sm text-slate-500 hover:bg-slate-100 rounded-xl">キャンセル</button>

                                        >
                                            発行する
                                        </button>
                                    </div>
                                </Card>
                            )}

                            {/* 回数券カード一覧 */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">
                                {filteredTickets.map((ticket) => {
                                    const status = getTicketStatus(ticket);
                                    const days = getDaysUntilExpiration(ticket.expirationDate);
                                    const pct = getProgressPct(ticket);

                                    return (
                                        <Card key={ticket.id} className={`!p-4 relative overflow-hidden hover:!transform-none ${status === 'expired' ? 'opacity-70' : ''}`}>
                                            {/* トップバー: ステータス */}
                                            <div className="absolute top-0 left-0 right-0 h-1" style={{ background: status === 'active' ? '#22c55e' : status === 'expiring' ? '#f59e0b' : status === 'expired' ? '#ef4444' : '#94a3b8' }}></div>

                                            <div className="flex items-start justify-between mt-1 mb-3">

        // ========================================
        // 利用管理ビュー（利用回数入力 + スプシ保存）
        // ========================================

        const MemberUsageView = ({ memberData, usageHook }) => {
            const {
                usageData, updateUsage, saveToSheet, getUsage, saving, lastSaved, lastSynced, syncFromGAS, currentMonth,
                planLimits, setPlanLimit, getPlanLimit,
                carryoverData, setCarryover, getCarryover
            } = usageHook;
            const [searchQuery, setSearchQuery] = useState('');
            const [showSaved, setShowSaved] = useState(false);
            const [sortBy, setSortBy] = useState('renewal'); // 'renewal' | 'name' | 'usage'
            const [showPlanLimitForm, setShowPlanLimitForm] = useState(false);
            const [editingCarryover, setEditingCarryover] = useState(null); // memberId for inline edit
            const [editingUsageCount, setEditingUsageCount] = useState(null); // memberId for direct input

            // 会員に請求期間情報を付与（残回数・繰越含む）
            const membersWithBilling = useMemo(() => {
                let members = (memberData.members || []).filter(m => m.status === 'ACTIVE');
                return members.map(m => {
                    const billing = getCurrentBillingPeriod(m.startDate);
                    const periodKey = billing ? billing.periodKey : null;
                    const count = getUsage(m.id, periodKey);
                    const planLimit = getPlanLimit(m.planName);
                    const carryover = periodKey ? getCarryover(m.id, periodKey) : 0;
                    const totalAllowed = planLimit + carryover; // 上限 + 繰越
                    const remaining = planLimit > 0 ? Math.max(0, totalAllowed - count) : null; // null = 上限未設定
                    return { ...m, billing, periodKey, count, planLimit, carryover, totalAllowed, remaining };
                });
            }, [memberData.members, getUsage, getPlanLimit, getCarryover]);

            // フィルタ & ソート
            const activeMembers = useMemo(() => {
                let list = membersWithBilling;
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    list = list.filter(m => m.name.toLowerCase().includes(q) || m.planName.toLowerCase().includes(q));
                }
                if (sortBy === 'renewal') {
                    list = [...list].sort((a, b) => ((a.billing && a.billing.daysUntilRenewal != null ? a.billing.daysUntilRenewal : 999)) - ((b.billing && b.billing.daysUntilRenewal != null ? b.billing.daysUntilRenewal : 999)));
                } else if (sortBy === 'name') {
                    list = [...list].sort((a, b) => a.name.localeCompare(b.name, 'ja'));
                } else if (sortBy === 'usage') {
                    list = [...list].sort((a, b) => a.count - b.count);
                }
                return list;
            }, [membersWithBilling, searchQuery, sortBy]);

            const totalUsage = useMemo(() => activeMembers.reduce((sum, m) => sum + m.count, 0), [activeMembers]);
            const avgUsage = activeMembers.length > 0 ? (totalUsage / activeMembers.length).toFixed(1) : 0;
            const zeroUsageCount = activeMembers.filter(m => m.count === 0).length;
            // 7日以内に更新日が来る会員数
            const renewingSoonCount = activeMembers.filter(m => m.billing && m.billing.daysUntilRenewal <= 7).length;

                setShowSaved(true);
                setTimeout(() => setShowSaved(false), 3000);

                    )}

                            gradientFrom="from-vivie-400" gradientTo="to-vivie-600"

                        <KpiCard
                            title="平均利用回数"
                            value={avgUsage}
                            subValue="現在の請求期間"
                            icon="activity"
                            gradientFrom="from-violet-400" gradientTo="to-violet-600"

                        <KpiCard
                            title="未利用会員"
                            value={zeroUsageCount}

                            icon="alert-circle"
                            gradientFrom={zeroUsageCount > 0 ? "from-amber-400" : "from-emerald-400"}
                            gradientTo={zeroUsageCount > 0 ? "to-amber-600" : "to-emerald-600"}
                        />
                        <KpiCard
                            title="更新間近"
                            value={renewingSoonCount}
                            subValue="7日以内に更新"
                            icon="clock"
                            gradientFrom={renewingSoonCount > 0 ? "from-blue-400" : "from-slate-400"}

                            onChange={(e) => setSortBy(e.target.value)}
                            className="px-3 py-2.5 border border-slate-200 rounded-xl text-sm focus:border-vivie-400 outline-none bg-white/80"

                                                <input type="number" min="0" value={planLimits[name] || ''} placeholder="0"

                                                <span className="text-xs text-slate-400">回/月</span>

                                    {planNames.length === 0 && <p className="text-xs text-slate-400 py-2">アクティブな会員のプランがありません</p>}

                    {/* 更新日ルール説明 */}

                            31日登録の場合、28日/30日までの月は月末に課金されます。
                            利用回数は更新日ごとにリセットされます。
                            <br /><span className="font-bold">繰越:</span> 当月使い切れなかった回数は翌月まで繰り越し可能です（各カードの「繰越」から手動設定）。
                        </p>
                    </div>

                    {/* 会員利用回数カード */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">
                        {activeMembers.map((member) => {
                            const { billing, periodKey, count } = member;
                            const isRenewingSoon = billing && billing.daysUntilRenewal <= 7;
                            const usageLevel = count === 0 ? 'zero' : count <= 2 ? 'low' : count <= 5 ? 'mid' : 'high';
                            const cardBorder = isRenewingSoon
                                ? 'border-blue-300 bg-blue-50/20'
