        // Square API 診断テストコンポーネント
        const SquareDiagnostics = ({ stores }) => {
            const [diagResult, setDiagResult] = useState(null);
            const [diagLoading, setDiagLoading] = useState(false);

            const runDiagnostics = async () => {
                setDiagLoading(true);
                const results = {};

                // テスト対象の店舗ID一覧
                const storeIds = (stores && stores.length > 0)
                    ? stores.map(s => s.id)
                    : ['default'];

                for (const sid of storeIds) {
                    const storeResult = { storeId: sid, tests: {} };
                    const headers = { 'Content-Type': 'application/json' };
                    if (sid !== 'default') headers['X-Store-Id'] = sid;

                    // 1. locations テスト（基本接続確認）
                    try {
                        const r = await fetch(`${SQUARE_PROXY_BASE}/locations`, { method: 'POST', headers });
                        const d = await r.json();
                        storeResult.tests.locations = {
                            status: r.status,
                            ok: r.ok,
                            count: d.locations?.length || 0,
                            raw: d
                        };
                    } catch (e) {
                        storeResult.tests.locations = { status: 0, ok: false, error: e.message };
                    }

                    // 2. catalog/list (全タイプ) テスト
                    try {
                        const r = await fetch(`${SQUARE_PROXY_BASE}/catalog/list`, {
                            method: 'POST', headers,
                            body: JSON.stringify({})
                        });
                        const d = await r.json();
                        storeResult.tests.catalogAll = {
                            status: r.status,
                            ok: r.ok,
                            objectCount: d.objects?.length || 0,
                            types: [...new Set((d.objects || []).map(o => o.type))],
                            raw: d
                        };
                    } catch (e) {
                        storeResult.tests.catalogAll = { status: 0, ok: false, error: e.message };
                    }

                    // 3. catalog/list (SUBSCRIPTION_PLAN) テスト
                    try {
                        const r = await fetch(`${SQUARE_PROXY_BASE}/catalog/list`, {
                            method: 'POST', headers,
                            body: JSON.stringify({ types: ['SUBSCRIPTION_PLAN'] })
                        });
                        const d = await r.json();
                        storeResult.tests.catalogSub = {
                            status: r.status,
                            ok: r.ok,
                            objectCount: d.objects?.length || 0,
                            plans: (d.objects || []).map(o => ({
                                id: o.id,
                                type: o.type,
                                name: o.subscription_plan_data?.name || o.subscription_plan_variation_data?.name || o.id,
                                hasVariations: (o.subscription_plan_data?.subscription_plan_variations?.length || 0) > 0,
                                variationCount: o.subscription_plan_data?.subscription_plan_variations?.length || 0,
                            })),
                            raw: d
                        };
                    } catch (e) {
                        storeResult.tests.catalogSub = { status: 0, ok: false, error: e.message };
                    }

                    // 4. subscriptions/search テスト（ITEMS_READ以外の権限確認）
                    try {
                        const r = await fetch(`${SQUARE_PROXY_BASE}/subscriptions/search`, {
                            method: 'POST', headers,
                            body: JSON.stringify({ query: { filter: {} } })
                        });
                        const d = await r.json();
                        storeResult.tests.subscriptions = {
                            status: r.status,
                            ok: r.ok,
                            count: d.subscriptions?.length || 0,
                            raw: d
                        };
                    } catch (e) {
                        storeResult.tests.subscriptions = { status: 0, ok: false, error: e.message };
                    }

                    results[sid] = storeResult;
                }

                setDiagResult(results);
                setDiagLoading(false);
            };

            const StatusBadge = ({ ok, status }) => (
                <span className={`inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded font-medium ${
                    ok ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
                }`}>
                    <Icon name={ok ? 'check' : 'x'} size={12} />
                    {status}
                </span>
            );

            return (
                <div className="bg-blue-50 rounded-lg p-4 border border-blue-200">
                    <div className="flex items-center justify-between mb-3">
                        <h4 className="font-semibold text-slate-900">
                            <Icon name="activity" size={16} className="inline mr-2 text-blue-500" />
                            Square API 診断テスト
                        </h4>
                        <button
                            onClick={runDiagnostics}
                            disabled={diagLoading}
                            className="flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 text-white text-xs font-semibold rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50"
                        >
                            {diagLoading ? (
                                <><Icon name="loader" size={14} className="animate-spin" /> テスト中...</>
                            ) : (
                                <><Icon name="play" size={14} /> 診断実行</>
                            )}
                        </button>
                    </div>
                    <p className="text-xs text-slate-600 mb-3">アクセストークンの権限・API接続を確認します。</p>

                    {diagResult && Object.entries(diagResult).map(([sid, sr]) => (
                        <div key={sid} className="bg-white rounded-lg border border-slate-200 p-4 mb-3 last:mb-0">
                            <h5 className="font-semibold text-sm text-slate-900 mb-3">店舗: {sid}</h5>
                            <div className="space-y-3">
                                {/* locations テスト */}
                                <div className="border-b border-slate-100 pb-2">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-sm font-medium text-slate-700">① 基本接続 (locations)</span>
                                        <StatusBadge ok={sr.tests.locations?.ok} status={sr.tests.locations?.status} />
                                    </div>
                                    {sr.tests.locations?.ok ? (
                                        <p className="text-xs text-green-700">接続成功 — {sr.tests.locations.count}ロケーション検出</p>
                                    ) : (
                                        <p className="text-xs text-red-700">接続失敗: {sr.tests.locations?.error || JSON.stringify(sr.tests.locations?.raw?.errors || sr.tests.locations?.raw)}</p>
                                    )}
                                </div>

                                {/* catalog 全タイプ */}
                                <div className="border-b border-slate-100 pb-2">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-sm font-medium text-slate-700">② カタログ全体 (ITEMS_READ権限)</span>
                                        <StatusBadge ok={sr.tests.catalogAll?.ok} status={sr.tests.catalogAll?.status} />
                                    </div>
                                    {sr.tests.catalogAll?.ok ? (
                                        <div>
                                            <p className="text-xs text-green-700">{sr.tests.catalogAll.objectCount}個のオブジェクト検出</p>
                                            {sr.tests.catalogAll.types.length > 0 ? (
                                                <p className="text-xs text-slate-600 mt-1">含まれるタイプ: {sr.tests.catalogAll.types.join(', ')}</p>
                                            ) : (
                                                <p className="text-xs text-amber-600 mt-1">カタログが空です。ITEMS_READ権限が無い可能性があります。</p>
                                            )}
                                        </div>
                                    ) : (
                                        <p className="text-xs text-red-700">{sr.tests.catalogAll?.error || JSON.stringify(sr.tests.catalogAll?.raw?.errors || sr.tests.catalogAll?.raw)}</p>
                                    )}
                                </div>

                                {/* SUBSCRIPTION_PLAN */}
                                <div className="border-b border-slate-100 pb-2">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-sm font-medium text-slate-700">③ サブスクリプションプラン</span>
                                        <StatusBadge ok={sr.tests.catalogSub?.ok} status={sr.tests.catalogSub?.status} />
                                    </div>
                                    {sr.tests.catalogSub?.ok ? (
                                        <div>
                                            {sr.tests.catalogSub.objectCount > 0 ? (
                                                <div>
                                                    <p className="text-xs text-green-700">{sr.tests.catalogSub.objectCount}個のプランを検出</p>
                                                    <div className="mt-2 space-y-1">
                                                        {sr.tests.catalogSub.plans.map(p => (
                                                            <div key={p.id} className="text-xs bg-slate-50 rounded p-2 border border-slate-100">
                                                                <span className="font-medium text-slate-800">{p.name}</span>
                                                                <span className="text-slate-400 ml-2">({p.type})</span>
                                                                <span className="text-slate-500 ml-2">バリエーション: {p.variationCount}個</span>
                                                                <div className="text-slate-400 mt-0.5 font-mono" style={{fontSize:10}}>ID: {p.id}</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ) : (
                                                <div>
                                                    <p className="text-xs text-amber-600 font-medium">SUBSCRIPTION_PLANタイプのオブジェクトが0件です</p>
                                                    <p className="text-xs text-slate-500 mt-1">考えられる原因:</p>
                                                    <ul className="text-xs text-slate-500 list-disc ml-4 mt-1 space-y-0.5">
                                                        <li>アクセストークンに <strong>ITEMS_READ</strong> 権限が無い</li>
                                                        <li>Squareダッシュボードでサブスクリプションプランが作成されていない</li>
                                                        <li>プランが別のロケーションに紐づいている</li>
                                                    </ul>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <p className="text-xs text-red-700">{sr.tests.catalogSub?.error || JSON.stringify(sr.tests.catalogSub?.raw?.errors || sr.tests.catalogSub?.raw)}</p>
                                    )}
                                </div>

                                {/* subscriptions/search */}
                                <div>
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-sm font-medium text-slate-700">④ サブスクリプション検索 (SUBSCRIPTIONS_READ権限)</span>
                                        <StatusBadge ok={sr.tests.subscriptions?.ok} status={sr.tests.subscriptions?.status} />

                good:      { reason: 'Tゾーンにやや皮脂が多めですが、概ね良好です', risk: '季節の変化で皮脂バランスが崩れやすい状態です' },
                caution:   { reason: 'Tゾーンのテカリとフェイスラインの乾燥が見られます（インナードライ）', risk: '皮脂の過剰分泌が毛穴を詰まらせ、ニキビや吹き出物の原因になります' },
                warning:   { reason: '皮脂バランスの乱れが顕著で、テカリと乾燥が混在しています', risk: 'バリア機能が破壊され、あらゆる肌トラブルが起きやすくなります' },
                courses: [
                    { name: 'ハイドラフェイシャル（毛穴洗浄）', desc: '余分な皮脂を除去しながら保湿成分を導入。皮脂バランスを整えます', icon: 'droplets' },
                    { name: 'よもぎ蒸し', desc: '身体の内側から水分代謝を改善し、皮脂バランスの根本改善へ', icon: 'leaf' },
                ],
            },
        };

        // 指標スコアからグレードキーを取得
        const saScoreToGradeKey = (score) => score >= 80 ? 'excellent' : score >= 65 ? 'good' : score >= 45 ? 'caution' : 'warning';

        const saGetGrade = (score) => {
            if (score >= 80) return SA_GRADE_CONFIG.excellent;
            if (score >= 65) return SA_GRADE_CONFIG.good;
            if (score >= 45) return SA_GRADE_CONFIG.caution;
            return SA_GRADE_CONFIG.warning;
        };

        // ==========================================
        // 色空間ユーティリティ (HSL + Lab)
        // ==========================================

        const saRgbToHsl = (r, g, b) => {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h = 0, s = 0, l = (max + min) / 2;
            if (max !== min) {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        };

        // [D] Lab色空間: 人間の知覚に近い色差計算、a*=赤み/緑み、b*=黄み/青み
        const saRgbToLab = (r, g, b) => {
            // sRGB → linear
            let rl = r / 255, gl = g / 255, bl = b / 255;
            rl = rl > 0.04045 ? Math.pow((rl + 0.055) / 1.055, 2.4) : rl / 12.92;
            gl = gl > 0.04045 ? Math.pow((gl + 0.055) / 1.055, 2.4) : gl / 12.92;
            bl = bl > 0.04045 ? Math.pow((bl + 0.055) / 1.055, 2.4) : bl / 12.92;
            // linear RGB → XYZ (D65)
            let x = (rl * 0.4124564 + gl * 0.3575761 + bl * 0.1804375) / 0.95047;
            let y = (rl * 0.2126729 + gl * 0.7151522 + bl * 0.0721750);
            let z = (rl * 0.0193339 + gl * 0.1191920 + bl * 0.9503041) / 1.08883;
            const f = (t) => t > 0.008856 ? Math.cbrt(t) : 7.787 * t + 16 / 116;
            x = f(x); y = f(y); z = f(z);
            return { L: 116 * y - 16, a: 500 * (x - y), b: 200 * (y - z) };
        };

        // ==========================================
        // [A] 照明・ホワイトバランス補正 (Gray World)
        // ==========================================

        const saWhiteBalance = (imageData) => {
            const data = imageData.data;
            const len = data.length;
            // サンプリング: 全ピクセルの代わりに等間隔でサンプリング（速度UP）
            const step = Math.max(1, Math.floor(len / (4 * 50000))) * 4;
            let sumR = 0, sumG = 0, sumB = 0, count = 0;
            for (let i = 0; i < len; i += step) {
                sumR += data[i]; sumG += data[i + 1]; sumB += data[i + 2];
                count++;
            }
            if (count === 0) return imageData;
            const avgR = sumR / count, avgG = sumG / count, avgB = sumB / count;
            const avgGray = (avgR + avgG + avgB) / 3;
            // 極端な補正を防ぐためクランプ
            const scaleR = Math.min(1.5, Math.max(0.7, avgGray / (avgR || 1)));
            const scaleG = Math.min(1.5, Math.max(0.7, avgGray / (avgG || 1)));
            const scaleB = Math.min(1.5, Math.max(0.7, avgGray / (avgB || 1)));
            // 新しいImageDataを作成して補正適用
            const corrected = new ImageData(new Uint8ClampedArray(data), imageData.width, imageData.height);
            const cd = corrected.data;
            for (let i = 0; i < len; i += 4) {
                cd[i]     = Math.min(255, Math.round(data[i] * scaleR));
                cd[i + 1] = Math.min(255, Math.round(data[i + 1] * scaleG));
                cd[i + 2] = Math.min(255, Math.round(data[i + 2] * scaleB));
                cd[i + 3] = data[i + 3];
            }
            return corrected;
        };

        // ==========================================
        // [F] サンプリング改善: ゾーンピクセル抽出 + 外れ値除去
        // ==========================================

        const saGetPixelsInZone = (imageData, zone, ovalCx, ovalCy, ovalRx, ovalRy) => {
            const pixels = [];
            const zoneX = Math.round(ovalCx - ovalRx + zone.x * 2 * ovalRx);
            const zoneY = Math.round(ovalCy - ovalRy + zone.y * 2 * ovalRy);
            const zoneW = Math.round(zone.w * 2 * ovalRx);
            const zoneH = Math.round(zone.h * 2 * ovalRy);
            const w = imageData.width;
            const data = imageData.data;
            // グリッドサンプリング: 2px間隔で取得（速度2-4倍向上、ノイズ軽減）
            const sampleStep = Math.max(1, Math.min(3, Math.floor(Math.max(zoneW, zoneH) / 60)));
            for (let y = zoneY; y < zoneY + zoneH && y < imageData.height; y += sampleStep) {
                for (let x = zoneX; x < zoneX + zoneW && x < w; x += sampleStep) {
                    if (x < 0 || y < 0) continue;
                    const dx = (x - ovalCx) / ovalRx;
                    const dy = (y - ovalCy) / ovalRy;
                    if (dx * dx + dy * dy <= 1) {
                        const i = (y * w + x) * 4;
                        if (i >= 0 && i < data.length - 2) {
                            pixels.push({ r: data[i], g: data[i + 1], b: data[i + 2] });
                        }
                    }
                }
            }
            return pixels;
        };

        // [F] 2Dグリッドとしてピクセル抽出（テクスチャ解析用）
        const saGetPixelGrid = (imageData, zone, ovalCx, ovalCy, ovalRx, ovalRy) => {
            const zoneX = Math.round(ovalCx - ovalRx + zone.x * 2 * ovalRx);
            const zoneY = Math.round(ovalCy - ovalRy + zone.y * 2 * ovalRy);
            const zoneW = Math.round(zone.w * 2 * ovalRx);
            const zoneH = Math.round(zone.h * 2 * ovalRy);
            const w = imageData.width;
            const data = imageData.data;
            const grid = [];
            for (let y = zoneY; y < zoneY + zoneH && y < imageData.height; y++) {
                const row = [];
                for (let x = zoneX; x < zoneX + zoneW && x < w; x++) {
                    if (x < 0 || y < 0) { row.push(0); continue; }
                    const i = (y * w + x) * 4;
                    row.push(0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2]);
                }
                if (row.length > 0) grid.push(row);
            }
            return grid;
        };

        // [F] トリム平均: 上下p%の外れ値を除去した平均
        const saTrimmedMean = (arr, trimPercent = 0.05) => {
            if (arr.length === 0) return 0;
            const sorted = [...arr].sort((a, b) => a - b);
            const trim = Math.floor(sorted.length * trimPercent);
            const trimmed = sorted.slice(trim, sorted.length - trim);
            if (trimmed.length === 0) return sorted[Math.floor(sorted.length / 2)];
            return trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
        };

        // [F] トリム標準偏差
        const saTrimmedSD = (arr, trimPercent = 0.05) => {
            if (arr.length < 3) return 0;
            const sorted = [...arr].sort((a, b) => a - b);
            const trim = Math.floor(sorted.length * trimPercent);
            const trimmed = sorted.slice(trim, sorted.length - trim);
            if (trimmed.length < 2) return 0;
            const mean = trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
            return Math.sqrt(trimmed.reduce((s, v) => s + (v - mean) ** 2, 0) / trimmed.length);
        };

        // ==========================================
        // [B] 適応的基準値 (肌色パーソナルベースライン)
        // ==========================================

        const saComputeBaseline = (allPixels) => {
            if (allPixels.length === 0) return { meanL: 60, meanA: 10, meanB: 20, sdL: 5 };
            const labs = allPixels.map(p => saRgbToLab(p.r, p.g, p.b));
            const Ls = labs.map(l => l.L);
            const As = labs.map(l => l.a);
            const Bs = labs.map(l => l.b);
            return {
                meanL: saTrimmedMean(Ls),
                meanA: saTrimmedMean(As),
                meanB: saTrimmedMean(Bs),
                sdL: saTrimmedSD(Ls),
                sdA: saTrimmedSD(As),
                sdB: saTrimmedSD(Bs),
            };
        };

        // ==========================================
        // 肌分析ツール: 改善版スコアリングエンジン
        // ==========================================

        // [A+B+D] 色ムラ — Lab色空間 + 適応的閾値 + トリム統計
        const saAnalyzeUniformity = (pixels, baseline) => {
            if (pixels.length === 0) return 50;
            const labs = pixels.map(p => saRgbToLab(p.r, p.g, p.b));
            const Ls = labs.map(l => l.L);
            const As = labs.map(l => l.a);
            const Bs = labs.map(l => l.b);
            // 明度の均一性（トリムSD / 適応的基準）
            const sdL = saTrimmedSD(Ls);
            const refSD = Math.max(3, baseline.sdL); // 本人の基準SD
            const uniformL = Math.max(0, 100 - (sdL / refSD) * 30);
            // a*チャンネル（赤み）の均一性
            const sdA = saTrimmedSD(As);
            const uniformA = Math.max(0, 100 - sdA * 3);
            // b*チャンネル（黄み）の均一性
            const sdB = saTrimmedSD(Bs);
            const uniformB = Math.max(0, 100 - sdB * 2.5);
            return Math.max(0, Math.min(100, uniformL * 0.5 + uniformA * 0.3 + uniformB * 0.2));
        };

        // [A+D] 赤み — Lab a*軸で直接判定 + 適応的閾値
        const saAnalyzeRedness = (pixels, baseline) => {
            if (pixels.length === 0) return 50;
            const labs = pixels.map(p => saRgbToLab(p.r, p.g, p.b));
            const As = labs.map(l => l.a);
            const meanA = saTrimmedMean(As);
            // 基準値からの赤み偏差
            const redShift = Math.max(0, meanA - baseline.meanA);
            // a*が高い（赤い）ピクセルの割合 — 適応的閾値
            const redThreshold = baseline.meanA + Math.max(3, baseline.sdA * 1.5);
            const redCount = As.filter(a => a > redThreshold).length;
            const redRatio = redCount / As.length;
            // ゾーン内のa*値のばらつき（赤みムラ）
            const sdA = saTrimmedSD(As);
            const shiftScore = Math.max(0, 100 - redShift * 6);
            const ratioScore = Math.max(0, 100 - redRatio * 250);
            const varianceScore = Math.max(0, 100 - sdA * 3);
            return Math.max(0, Math.min(100, shiftScore * 0.4 + ratioScore * 0.35 + varianceScore * 0.25));
        };

        // [C] テクスチャ — Sobelフィルタ + 正しい2Dグリッド + GLCM簡易版
        const saAnalyzeTexture = (grid) => {
            if (!grid || grid.length < 5 || !grid[0] || grid[0].length < 5) return 50;
            const rows = grid.length, cols = grid[0].length;

            // Sobelフィルタでエッジ強度
            let sobelSum = 0, sobelCount = 0;
            for (let y = 1; y < rows - 1; y++) {
                for (let x = 1; x < cols - 1; x++) {
                    const gx = -grid[y-1][x-1] + grid[y-1][x+1]
                             - 2*grid[y][x-1] + 2*grid[y][x+1]
                             - grid[y+1][x-1] + grid[y+1][x+1];
                    const gy = -grid[y-1][x-1] - 2*grid[y-1][x] - grid[y-1][x+1]
                             + grid[y+1][x-1] + 2*grid[y+1][x] + grid[y+1][x+1];
                    sobelSum += Math.sqrt(gx * gx + gy * gy);
                    sobelCount++;
                }
            }
            const avgSobel = sobelCount > 0 ? sobelSum / sobelCount : 0;
            // Sobel正規化 (0-255スケール、典型的な肌は5-25程度)
            const sobelScore = Math.max(0, 100 - avgSobel * 2.0);

            // GLCM簡易版: 隣接ピクセルとの差分で「滑らかさ」推定
            let adjDiffSum = 0, adjCount = 0;
            const step = Math.max(1, Math.floor(Math.min(rows, cols) / 40));
            for (let y = 0; y < rows; y += step) {
                for (let x = 0; x < cols - 1; x += step) {
                    adjDiffSum += Math.abs(grid[y][x] - grid[y][x + 1]);
                    adjCount++;
                }
            }
            for (let y = 0; y < rows - 1; y += step) {
                for (let x = 0; x < cols; x += step) {
                    adjDiffSum += Math.abs(grid[y][x] - grid[y + 1][x]);
                    adjCount++;
                }
            }
            const avgAdj = adjCount > 0 ? adjDiffSum / adjCount : 0;
            const smoothScore = Math.max(0, 100 - avgAdj * 3.0);

            return Math.max(0, Math.min(100, sobelScore * 0.55 + smoothScore * 0.45));
        };

        // [B+D] 色素沈着 — Lab L*で暗部検出 + 適応的閾値 + b*で黄ぐすみ
        const saAnalyzePigmentation = (pixels, baseline) => {
            if (pixels.length === 0) return 50;
            const labs = pixels.map(p => saRgbToLab(p.r, p.g, p.b));
            const Ls = labs.map(l => l.L);
            const Bs = labs.map(l => l.b);
            // 暗部検出: 本人の平均明度 - 1.8σ を閾値とする
            const darkThreshold = baseline.meanL - 1.8 * Math.max(2, baseline.sdL);
            const darkPixels = Ls.filter(l => l < darkThreshold);
            const darkRatio = darkPixels.length / Ls.length;
            // 暗部の深さ（どれだけ暗いか）
            const darkDepth = darkPixels.length > 0
                ? darkPixels.reduce((s, l) => s + (darkThreshold - l), 0) / darkPixels.length
                : 0;
            // 黄ぐすみ: b*値の偏りチェック
            const meanB = saTrimmedMean(Bs);
            const yellowShift = Math.max(0, meanB - baseline.meanB - 3);
            const darkScore = Math.max(0, 100 - darkRatio * 350 - darkDepth * 3);
            const yellowScore = Math.max(0, 100 - yellowShift * 8);
            return Math.max(0, Math.min(100, darkScore * 0.65 + yellowScore * 0.35));
        };

        // [E] ハリ — 左右対称性 + 目元/頬の色差 + Lab色差ΔE
        const saAnalyzeFirmness = (leftPixels, rightPixels, underEyeLPixels, underEyeRPixels, baseline) => {
            if (leftPixels.length === 0 || rightPixels.length === 0) return 50;
            const avgLab = (px) => {
                if (px.length === 0) return { L: baseline.meanL, a: baseline.meanA, b: baseline.meanB };
                const labs = px.map(p => saRgbToLab(p.r, p.g, p.b));
                return {
                    L: saTrimmedMean(labs.map(l => l.L)),
                    a: saTrimmedMean(labs.map(l => l.a)),
                    b: saTrimmedMean(labs.map(l => l.b)),
                };
            };
            const leftLab = avgLab(leftPixels);
            const rightLab = avgLab(rightPixels);
            // ΔE (CIE76) で左右の色差を計算
            const deltaE = Math.sqrt(
                (leftLab.L - rightLab.L) ** 2 +
                (leftLab.a - rightLab.a) ** 2 +
                (leftLab.b - rightLab.b) ** 2
            );
            const symmetryScore = Math.max(0, 100 - deltaE * 5);

            // 目元のくすみ（頬より暗い = たるみ/くまの兆候）
            let eyeScore = 100;
            if (underEyeLPixels.length > 0 && underEyeRPixels.length > 0) {
                const eyeL = avgLab(underEyeLPixels);
                const eyeR = avgLab(underEyeRPixels);
                const cheekAvgL = (leftLab.L + rightLab.L) / 2;
                const eyeAvgL = (eyeL.L + eyeR.L) / 2;
                const eyeDarkness = Math.max(0, cheekAvgL - eyeAvgL);
                eyeScore = Math.max(0, 100 - eyeDarkness * 4);
            }

            // 左右の明度分布の均一性
            const leftLs = leftPixels.map(p => saRgbToLab(p.r, p.g, p.b).L);
            const rightLs = rightPixels.map(p => saRgbToLab(p.r, p.g, p.b).L);
            const sdDiff = Math.abs(saTrimmedSD(leftLs) - saTrimmedSD(rightLs));
            const distScore = Math.max(0, 100 - sdDiff * 5);

            return Math.max(0, Math.min(100, symmetryScore * 0.45 + eyeScore * 0.35 + distScore * 0.2));
        };

        // [E+D] 水分バランス — Tゾーン vs Uゾーン油分差 + Lab明度解析
        const saAnalyzeMoisture = (tZonePixels, uZonePixels, baseline) => {
            if (tZonePixels.length === 0 && uZonePixels.length === 0) return 50;
            const allPx = [...tZonePixels, ...uZonePixels];
            const labs = allPx.map(p => saRgbToLab(p.r, p.g, p.b));
            const Ls = labs.map(l => l.L);
            const meanL = saTrimmedMean(Ls);

            // テカリ検出: 基準明度よりかなり明るいピクセル
            const shinyThreshold = baseline.meanL + Math.max(15, baseline.sdL * 2.5);
            const shinyCount = Ls.filter(l => l > shinyThreshold).length;
            const shinyRatio = shinyCount / Ls.length;
            const oilScore = Math.max(0, 100 - shinyRatio * 300);

            // 乾燥検出: 明度の高周波ばらつき
            const sdL = saTrimmedSD(Ls);
            const dryScore = Math.max(0, 100 - Math.max(0, sdL - baseline.sdL) * 5);

            // [E] Tゾーン vs Uゾーン バランス
            let balanceScore = 100;
            if (tZonePixels.length > 0 && uZonePixels.length > 0) {
                const tLabs = tZonePixels.map(p => saRgbToLab(p.r, p.g, p.b));
                const uLabs = uZonePixels.map(p => saRgbToLab(p.r, p.g, p.b));
                const tMeanL = saTrimmedMean(tLabs.map(l => l.L));
                const uMeanL = saTrimmedMean(uLabs.map(l => l.L));
                const zoneDiff = Math.abs(tMeanL - uMeanL);
                balanceScore = Math.max(0, 100 - zoneDiff * 3);
            }

            return Math.max(0, Math.min(100, oilScore * 0.35 + dryScore * 0.30 + balanceScore * 0.35));
        };

        // ==========================================
        // 小顔診断: 分析エンジン
        // ==========================================

        const sfRunAnalysis = (imageData, canvasW, canvasH) => {
            const corrected = saWhiteBalance(imageData);
            const cx = canvasW / 2, cy = canvasH / 2;
            const rx = canvasW * 0.32, ry = canvasH * 0.42;

            const zonePixels = {};
            FACE_ZONES.forEach(z => {
                zonePixels[z.key] = saGetPixelsInZone(corrected, z, cx, cy, rx, ry);
            });
            const allPixels = Object.values(zonePixels).flat();
            const baseline = saComputeBaseline(allPixels);

            const gradeFromScore = (s) => s >= 80 ? 'excellent' : s >= 65 ? 'good' : s >= 45 ? 'caution' : 'warning';

            // 1. 左右バランス: 左右頬のLab色差
            const leftPixels = zonePixels.leftCheek || [];
            const rightPixels = zonePixels.rightCheek || [];
            let symmetryScore = 75;
            if (leftPixels.length > 0 && rightPixels.length > 0) {
                const lLabs = leftPixels.map(p => saRgbToLab(p.r, p.g, p.b));
                const rLabs = rightPixels.map(p => saRgbToLab(p.r, p.g, p.b));
                const lMeanL = saTrimmedMean(lLabs.map(l => l.L));
                const rMeanL = saTrimmedMean(rLabs.map(l => l.L));
                const lMeanA = saTrimmedMean(lLabs.map(l => l.a));
                const rMeanA = saTrimmedMean(rLabs.map(l => l.a));
                const lMeanB = saTrimmedMean(lLabs.map(l => l.b));
                const rMeanB = saTrimmedMean(rLabs.map(l => l.b));
                const deltaE = Math.sqrt((lMeanL - rMeanL) ** 2 + (lMeanA - rMeanA) ** 2 + (lMeanB - rMeanB) ** 2);
                symmetryScore = Math.max(0, Math.min(100, 100 - deltaE * 4));
            }

            // 2. むくみ度: 頬の明度均一性（高均一=膨張感）+ 顎の明度差
            let swellingScore = 70;
            const bothCheeks = [...leftPixels, ...rightPixels];
            if (bothCheeks.length > 0) {
                const cheekLabs = bothCheeks.map(p => saRgbToLab(p.r, p.g, p.b));
                const cheekLs = cheekLabs.map(l => l.L);
                const sdL = saTrimmedSD(cheekLs);
                // 低い変動 = むくみの可能性（パンパンに膨らんだ肌は均一に見える）
                const variationScore = Math.min(100, sdL * 8);
                // 頬と顎の明度差（差が小さい = 輪郭がぼやけている）
                const chinPixels = zonePixels.chin || [];
                let contourScore = 70;
                if (chinPixels.length > 0) {
                    const chinLabs = chinPixels.map(p => saRgbToLab(p.r, p.g, p.b));
                    const chinMeanL = saTrimmedMean(chinLabs.map(l => l.L));
                    const cheekMeanL = saTrimmedMean(cheekLs);
                    const diff = Math.abs(cheekMeanL - chinMeanL);
                    contourScore = Math.min(100, diff * 6);
                }
                swellingScore = Math.max(0, Math.min(100, variationScore * 0.5 + contourScore * 0.5));
            }

            // 3. フェイスライン: 顎エリアのコントラスト（エッジが明確=シャープ）
            let jawlineScore = 70;
            const chinPixels = zonePixels.chin || [];
            if (chinPixels.length > 0) {
                const chinGrid = saGetPixelGrid(corrected, FACE_ZONES.find(z => z.key === 'chin'), cx, cy, rx, ry);
                if (chinGrid.length > 3) {
                    let edgeSum = 0, edgeCount = 0;
                    for (let y = 1; y < chinGrid.length - 1; y++) {
                        for (let x = 1; x < (chinGrid[y]?.length || 0) - 1; x++) {
                            const gx = (chinGrid[y][x + 1] || 0) - (chinGrid[y][x - 1] || 0);
                            const gy = (chinGrid[y + 1]?.[x] || 0) - (chinGrid[y - 1]?.[x] || 0);
                            edgeSum += Math.sqrt(gx * gx + gy * gy);
                            edgeCount++;
                        }
                    }
                    const avgEdge = edgeCount > 0 ? edgeSum / edgeCount : 0;
                    jawlineScore = Math.max(0, Math.min(100, avgEdge * 4));
                }
            }

            // 4. たるみ・リフト: 目元の暗さと頬下部の均一性
            let saggingScore = 70;
            const underEyePixels = [...(zonePixels.underEyeL || []), ...(zonePixels.underEyeR || [])];
            if (underEyePixels.length > 0 && bothCheeks.length > 0) {
                const eyeLabs = underEyePixels.map(p => saRgbToLab(p.r, p.g, p.b));
                const cheekLabs = bothCheeks.map(p => saRgbToLab(p.r, p.g, p.b));
                const eyeMeanL = saTrimmedMean(eyeLabs.map(l => l.L));
                const cheekMeanL = saTrimmedMean(cheekLabs.map(l => l.L));
                // 目元が頬より暗い = たるみ・クマ
                const darkDiff = cheekMeanL - eyeMeanL;
                const eyeScore = Math.max(0, 100 - Math.max(0, darkDiff - 3) * 5);
                // 頬の明度勾配（上下）
                const cheekLs = cheekLabs.map(l => l.L);
                const topHalf = cheekLs.slice(0, Math.floor(cheekLs.length / 2));
                const bottomHalf = cheekLs.slice(Math.floor(cheekLs.length / 2));
                const topMean = saTrimmedMean(topHalf);
                const bottomMean = saTrimmedMean(bottomHalf);
                const gradient = Math.abs(topMean - bottomMean);
                const gradientScore = Math.max(0, 100 - gradient * 4);
                saggingScore = Math.max(0, Math.min(100, eyeScore * 0.5 + gradientScore * 0.5));
            }

            // 5. 筋肉の柔軟性: 色ムラの分布パターン（コリ=局所的な赤み）
            let muscleScore = 70;
            if (allPixels.length > 0) {
                const labs = allPixels.map(p => saRgbToLab(p.r, p.g, p.b));
                const As = labs.map(l => l.a);
                const sdA = saTrimmedSD(As);
                const meanA = saTrimmedMean(As);
                // 赤みのばらつきが大きい = 筋肉の偏り
                const redVariation = Math.max(0, 100 - sdA * 4);
                // 全体的な赤み（コリ）
                const redLevel = Math.max(0, 100 - Math.max(0, meanA - baseline.meanA) * 6);
                muscleScore = Math.max(0, Math.min(100, redVariation * 0.6 + redLevel * 0.4));
            }

            const metrics = {
                symmetry: { score: Math.round(symmetryScore), grade: gradeFromScore(symmetryScore), zones: { leftCheek: Math.round(symmetryScore), rightCheek: Math.round(symmetryScore) } },
                swelling: { score: Math.round(swellingScore), grade: gradeFromScore(swellingScore), zones: { leftCheek: Math.round(swellingScore * 0.95), rightCheek: Math.round(swellingScore * 1.02), chin: Math.round(swellingScore * 0.98) } },
                jawline: { score: Math.round(jawlineScore), grade: gradeFromScore(jawlineScore), zones: { chin: Math.round(jawlineScore) } },
                sagging: { score: Math.round(saggingScore), grade: gradeFromScore(saggingScore), zones: { underEyeL: Math.round(saggingScore * 0.97), underEyeR: Math.round(saggingScore * 1.01), leftCheek: Math.round(saggingScore * 0.99), rightCheek: Math.round(saggingScore * 1.0) } },
                muscle: { score: Math.round(muscleScore), grade: gradeFromScore(muscleScore), zones: { forehead: Math.round(muscleScore * 1.02), leftCheek: Math.round(muscleScore * 0.96), rightCheek: Math.round(muscleScore * 0.98) } },
            };

            const totalScore = Math.round(Object.values(metrics).reduce((s, m) => s + m.score, 0) / 5);
            return { metrics, totalScore, baseline, timestamp: new Date().toISOString() };
        };

        // ==========================================
        // 毛穴診断: 分析エンジン
        // ==========================================

        const poreRunAnalysis = (imageData, canvasW, canvasH) => {
            const corrected = saWhiteBalance(imageData);
            const cx = canvasW / 2, cy = canvasH / 2;
            const rx = canvasW * 0.32, ry = canvasH * 0.42;

            const zonePixels = {};
            FACE_ZONES.forEach(z => {
                zonePixels[z.key] = saGetPixelsInZone(corrected, z, cx, cy, rx, ry);
            });
            const allPixels = Object.values(zonePixels).flat();
            const baseline = saComputeBaseline(allPixels);

            const gradeFromScore = (s) => s >= 80 ? 'excellent' : s >= 65 ? 'good' : s >= 45 ? 'caution' : 'warning';

            // 頬のグリッドデータ
            const cheekGrids = ['leftCheek', 'rightCheek'].map(k => {
                const z = FACE_ZONES.find(fz => fz.key === k);
                return z ? saGetPixelGrid(corrected, z, cx, cy, rx, ry) : [];
            });
            const noseZone = FACE_ZONES.find(z => z.key === 'nose');
            const noseGrid = noseZone ? saGetPixelGrid(corrected, noseZone, cx, cy, rx, ry) : [];
            const foreheadZone = FACE_ZONES.find(z => z.key === 'forehead');
            const foreheadGrid = foreheadZone ? saGetPixelGrid(corrected, foreheadZone, cx, cy, rx, ry) : [];

            // テクスチャ粗さ計算（高周波成分）
            const calcTextureRoughness = (grid) => {
                if (grid.length < 3) return 50;
                let diffSum = 0, count = 0;
                for (let y = 1; y < grid.length - 1; y++) {
                    for (let x = 1; x < (grid[y]?.length || 0) - 1; x++) {
                        const center = grid[y][x] || 0;
                        const neighbors = [
                            grid[y - 1]?.[x] || 0, grid[y + 1]?.[x] || 0,
                            grid[y]?.[x - 1] || 0, grid[y]?.[x + 1] || 0,
                        ];
                        const avgNeighbor = neighbors.reduce((a, b) => a + b, 0) / 4;
                        diffSum += Math.abs(center - avgNeighbor);
                        count++;
                    }
                }
                return count > 0 ? diffSum / count : 50;
            };

            // 1. 毛穴の開き: テクスチャの粗さ（頬+鼻の高周波成分）
            const cheekRoughness = cheekGrids.map(g => calcTextureRoughness(g));
            const noseRoughness = calcTextureRoughness(noseGrid);
            const avgRoughness = (cheekRoughness.reduce((a, b) => a + b, 0) / cheekRoughness.length + noseRoughness) / 2;
            const openPoresScore = Math.max(0, Math.min(100, 100 - avgRoughness * 5));

            // 2. 黒ずみ・角栓: 鼻周りの暗点検出
            let blackheadsScore = 75;
            const nosePixels = zonePixels.nose || [];
            if (nosePixels.length > 0) {
                const noseLabs = nosePixels.map(p => saRgbToLab(p.r, p.g, p.b));
                const noseLs = noseLabs.map(l => l.L);
                const noseMeanL = saTrimmedMean(noseLs);
                const noseSDL = saTrimmedSD(noseLs);
                // 暗いピクセルの割合（基準明度より顕著に暗い=角栓/黒ずみ）
                const darkThreshold = noseMeanL - Math.max(8, noseSDL * 1.5);
                const darkRatio = noseLs.filter(l => l < darkThreshold).length / noseLs.length;
                blackheadsScore = Math.max(0, Math.min(100, 100 - darkRatio * 400));
                // 頬の暗点も加味
                const cheekPixels = [...(zonePixels.leftCheek || []), ...(zonePixels.rightCheek || [])];
                if (cheekPixels.length > 0) {
                    const cheekLabs = cheekPixels.map(p => saRgbToLab(p.r, p.g, p.b));
                    const cheekLs = cheekLabs.map(l => l.L);
                    const cheekMeanL = saTrimmedMean(cheekLs);
                    const cheekDarkT = cheekMeanL - Math.max(8, saTrimmedSD(cheekLs) * 1.5);
                    const cheekDarkRatio = cheekLs.filter(l => l < cheekDarkT).length / cheekLs.length;
                    const cheekBlackScore = Math.max(0, Math.min(100, 100 - cheekDarkRatio * 350));
                    blackheadsScore = blackheadsScore * 0.6 + cheekBlackScore * 0.4;
                }
            }

            // 3. たるみ毛穴: 頬のテクスチャ垂直方向パターン
            let saggingPoresScore = 75;
            const mergedCheekGrid = cheekGrids[0].length > 0 ? cheekGrids[0] : cheekGrids[1];
            if (mergedCheekGrid.length > 5) {
                let verticalDiff = 0, horizontalDiff = 0, count = 0;
                for (let y = 1; y < mergedCheekGrid.length - 1; y++) {
                    for (let x = 1; x < (mergedCheekGrid[y]?.length || 0) - 1; x++) {
                        const vDiff = Math.abs((mergedCheekGrid[y + 1]?.[x] || 0) - (mergedCheekGrid[y - 1]?.[x] || 0));
                        const hDiff = Math.abs((mergedCheekGrid[y]?.[x + 1] || 0) - (mergedCheekGrid[y]?.[x - 1] || 0));
                        verticalDiff += vDiff;
                        horizontalDiff += hDiff;
                        count++;
                    }
                }
                if (count > 0) {
                    const vAvg = verticalDiff / count;
                    const hAvg = horizontalDiff / count;
                    // 垂直方向の変化が水平より大きい = たるみ毛穴の傾向
                    const ratio = hAvg > 0 ? vAvg / hAvg : 1;
                    saggingPoresScore = Math.max(0, Math.min(100, 100 - Math.max(0, ratio - 0.8) * 80));
                }
            }

            // 4. キメの細かさ: 全体的なテクスチャ均一性
            const allGrids = [...cheekGrids, noseGrid, foreheadGrid].filter(g => g.length > 0);
            const allRoughness = allGrids.map(g => calcTextureRoughness(g));
            const overallRoughness = allRoughness.length > 0 ? allRoughness.reduce((a, b) => a + b, 0) / allRoughness.length : 10;
            const smoothnessScore = Math.max(0, Math.min(100, 100 - overallRoughness * 4.5));

            // 5. 皮脂バランス: Tゾーン vs Uゾーン
            const tZonePixels = [...(zonePixels.forehead || []), ...(zonePixels.nose || [])];
            const uZonePixels = [...(zonePixels.leftCheek || []), ...(zonePixels.rightCheek || [])];
            let oilBalanceScore = 70;
            if (tZonePixels.length > 0 && uZonePixels.length > 0) {
                const tLabs = tZonePixels.map(p => saRgbToLab(p.r, p.g, p.b));
                const uLabs = uZonePixels.map(p => saRgbToLab(p.r, p.g, p.b));
                const tMeanL = saTrimmedMean(tLabs.map(l => l.L));
                const uMeanL = saTrimmedMean(uLabs.map(l => l.L));
                const zoneDiff = Math.abs(tMeanL - uMeanL);
                const balanceScore = Math.max(0, 100 - zoneDiff * 3);
                // テカリ検出
                const tLs = tLabs.map(l => l.L);
                const shinyThreshold = baseline.meanL + Math.max(15, baseline.sdL * 2.5);
                const shinyRatio = tLs.filter(l => l > shinyThreshold).length / tLs.length;
                const oilScore = Math.max(0, 100 - shinyRatio * 300);
                oilBalanceScore = Math.max(0, Math.min(100, oilScore * 0.4 + balanceScore * 0.6));
            }

            const metrics = {
                openPores: {
                    score: Math.round(openPoresScore), grade: gradeFromScore(openPoresScore),
                    zones: {
                        nose: Math.round(Math.max(0, Math.min(100, 100 - noseRoughness * 5))),
                        leftCheek: Math.round(Math.max(0, Math.min(100, 100 - (cheekRoughness[0] || 10) * 5))),
                        rightCheek: Math.round(Math.max(0, Math.min(100, 100 - (cheekRoughness[1] || 10) * 5))),
                    },
                },
                blackheads: {
                    score: Math.round(blackheadsScore), grade: gradeFromScore(blackheadsScore),
                    zones: { nose: Math.round(blackheadsScore * 0.9), leftCheek: Math.round(blackheadsScore * 1.03), rightCheek: Math.round(blackheadsScore * 1.01) },
                },
                saggingPores: {
                    score: Math.round(saggingPoresScore), grade: gradeFromScore(saggingPoresScore),
                    zones: { leftCheek: Math.round(saggingPoresScore * 0.97), rightCheek: Math.round(saggingPoresScore * 1.01) },
                },
                smoothness: {
                    score: Math.round(smoothnessScore), grade: gradeFromScore(smoothnessScore),
                    zones: {
                        forehead: Math.round(Math.max(0, Math.min(100, 100 - calcTextureRoughness(foreheadGrid) * 4.5))),
                        nose: Math.round(Math.max(0, Math.min(100, 100 - calcTextureRoughness(noseGrid) * 4.5))),
                        leftCheek: Math.round(Math.max(0, Math.min(100, 100 - calcTextureRoughness(cheekGrids[0]) * 4.5))),
                        rightCheek: Math.round(Math.max(0, Math.min(100, 100 - calcTextureRoughness(cheekGrids[1]) * 4.5))),
                    },
                },
                oilBalance: {
                    score: Math.round(oilBalanceScore), grade: gradeFromScore(oilBalanceScore),
                    zones: { tZone: Math.round(oilBalanceScore * 0.93), uZone: Math.round(oilBalanceScore * 1.05) },
                },
            };

            const totalScore = Math.round(Object.values(metrics).reduce((s, m) => s + m.score, 0) / 5);
            return { metrics, totalScore, baseline, timestamp: new Date().toISOString() };
        };

        // ==========================================
        // 統合分析エンジン
        // ==========================================

        const saRunFullAnalysis = (imageData, canvasW, canvasH) => {
            // [A] ホワイトバランス補正
            const corrected = saWhiteBalance(imageData);
            const cx = canvasW / 2, cy = canvasH / 2;
            const rx = canvasW * 0.32, ry = canvasH * 0.42;

            // ゾーン別ピクセル抽出
            const zonePixels = {};
            FACE_ZONES.forEach(z => {
                zonePixels[z.key] = saGetPixelsInZone(corrected, z, cx, cy, rx, ry);
            });
            const allPixels = Object.values(zonePixels).flat();

            // [B] パーソナルベースライン算出
            const baseline = saComputeBaseline(allPixels);

            const bothCheeks = [...(zonePixels.leftCheek || []), ...(zonePixels.rightCheek || [])];
            const tZone = [...(zonePixels.forehead || []), ...(zonePixels.nose || [])];

            // [C] テクスチャ用2Dグリッド抽出
            const cheekGrids = ['leftCheek', 'rightCheek'].map(k => {
                const z = FACE_ZONES.find(fz => fz.key === k);
                return z ? saGetPixelGrid(corrected, z, cx, cy, rx, ry) : [];
            });
            // 頬グリッドを結合（行数が多い方に合わせる）
            const mergedGrid = cheekGrids[0].length > 0 ? cheekGrids[0] : cheekGrids[1];

            const gradeFromScore = (s) => s >= 80 ? 'excellent' : s >= 65 ? 'good' : s >= 45 ? 'caution' : 'warning';

            const analyzePerZone = (fn, keys, extraArgs = []) => {
                const zones = {};
                keys.forEach(k => { zones[k] = Math.round(fn(zonePixels[k] || [], ...extraArgs)); });
                return zones;
            };

            // 各指標のスコア算出
            const uniformityScore = saAnalyzeUniformity(allPixels, baseline);
            const rednessScore = saAnalyzeRedness(allPixels, baseline);
            const textureScore = saAnalyzeTexture(mergedGrid);
            const pigmentScore = saAnalyzePigmentation(allPixels, baseline);
            const firmnessScore = saAnalyzeFirmness(
                zonePixels.leftCheek || [], zonePixels.rightCheek || [],
                zonePixels.underEyeL || [], zonePixels.underEyeR || [],
                baseline
            );
            const moistureScore = saAnalyzeMoisture(tZone, bothCheeks, baseline);

            const metrics = {
                uniformity: {
                    score: Math.round(uniformityScore),
                    grade: gradeFromScore(uniformityScore),
                    zones: analyzePerZone(saAnalyzeUniformity, ['forehead','leftCheek','rightCheek','nose'], [baseline]),
                },
                redness: {
                    score: Math.round(rednessScore),
                    grade: gradeFromScore(rednessScore),
                    zones: analyzePerZone(saAnalyzeRedness, ['forehead','leftCheek','rightCheek','nose'], [baseline]),
                },
                texture: {
                    score: Math.round(textureScore),
                    grade: gradeFromScore(textureScore),
                    zones: (() => {
                        const tz = {};
                        ['leftCheek','rightCheek','forehead'].forEach(k => {
                            const z = FACE_ZONES.find(fz => fz.key === k);
                            const g = z ? saGetPixelGrid(corrected, z, cx, cy, rx, ry) : [];
                            tz[k] = Math.round(saAnalyzeTexture(g));
                        });
                        return tz;
                    })(),
                },
                pigment: {
                    score: Math.round(pigmentScore),
                    grade: gradeFromScore(pigmentScore),
                    zones: analyzePerZone(saAnalyzePigmentation, ['forehead','leftCheek','rightCheek'], [baseline]),
                },
                firmness: {
                    score: Math.round(firmnessScore),
                    grade: gradeFromScore(firmnessScore),
                    zones: {
                        leftCheek: Math.round(saAnalyzeUniformity(zonePixels.leftCheek || [], baseline)),
                        rightCheek: Math.round(saAnalyzeUniformity(zonePixels.rightCheek || [], baseline)),
                        underEyeL: Math.round(saAnalyzeUniformity(zonePixels.underEyeL || [], baseline)),
                        underEyeR: Math.round(saAnalyzeUniformity(zonePixels.underEyeR || [], baseline)),
                    },
                },
                moisture: {
                    score: Math.round(moistureScore),
                    grade: gradeFromScore(moistureScore),
                    zones: {
                        tZone: Math.round(saAnalyzeMoisture(tZone, [], baseline)),
                        uZone: Math.round(saAnalyzeMoisture([], bothCheeks, baseline)),
                    },
                },
            };

            const totalScore = Math.round(Object.values(metrics).reduce((s, m) => s + m.score, 0) / 6);
            return { metrics, totalScore, baseline, timestamp: new Date().toISOString() };
        };

        // ==========================================
        // 肌分析ツール: サブコンポーネント
        // ==========================================

        const SAScoreCircle = ({ score, size = 160, label = '総合スコア' }) => {
            const radius = (size - 16) / 2;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (score / 100) * circumference;
            const grade = saGetGrade(score);
            return (
                <div className="flex flex-col items-center">
                    <div className="relative" style={{width:size,height:size}}>
                        <svg width={size} height={size} className="transform -rotate-90">
                            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="#f0ebe6" strokeWidth="10" />
                            <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={grade.color} strokeWidth="10"
                                strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset}
                                style={{transition:'stroke-dashoffset 1.2s ease-out'}} />
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                            <span className="text-4xl font-light" style={{fontFamily:'"Cormorant Garamond",serif',color:'#2c2420'}}>{score}</span>
                            <span className="text-xs font-bold mt-1" style={{color:grade.color}}>{grade.label}</span>
                        </div>
                    </div>
                    <p className="text-xs mt-2" style={{color:'#a87e5a'}}>{label}</p>
                </div>
            );
        };

        const SAMetricCard = ({ metric, result, isExpanded, onToggle, diagnosisConfig }) => {
            const grade = saGetGrade(result.score);
            const gradeKey = saScoreToGradeKey(result.score);
            const diagSource = diagnosisConfig || SA_DIAGNOSIS;
            const diag = diagSource[metric.key];
            const info = diag ? diag[gradeKey] : null;
            const courses = diag ? diag.courses : [];
            const showCourses = gradeKey !== 'excellent' && courses.length > 0;

            return (
                <div className="border rounded-xl overflow-hidden transition-all cursor-pointer hover:shadow-md" style={{borderColor:'#e8e0d8',background:'#fff'}} onClick={onToggle}>
                    <div className="flex items-center p-4 gap-3">
                        <div className="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style={{background:'#faf7f4'}}>
                            <Icon name={metric.icon} size={18} color="#a87e5a" />
                        </div>
                        <div className="flex-1 min-w-0">
                            <p className="text-sm font-bold" style={{color:'#2c2420'}}>{metric.label}</p>
                            {/* 原因の短い説明 */}
                            {info && <p className="text-[11px] mt-0.5" style={{color: gradeKey === 'excellent' ? '#558B2F' : '#706050'}}>{info.reason}</p>}
                        </div>
                        <div className="flex items-center gap-2 shrink-0">
                            <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:grade.bg,color:grade.color}}>{grade.label}</span>
                            <span className="text-lg font-light" style={{fontFamily:'"Cormorant Garamond",serif',color:'#2c2420'}}>{result.score}</span>
                            <Icon name={isExpanded ? 'chevron-up' : 'chevron-down'} size={14} color="#c0b0a0" />
                        </div>
                    </div>
                    {isExpanded && (
                        <div className="px-4 pb-4 pt-0 border-t" style={{borderColor:'#f0ebe6'}}>
                            {/* リスク警告 */}
                            {info && info.risk && (
                                <div className="flex items-start gap-2 mt-3 p-3 rounded-lg" style={{background:'#FFF8E1',border:'1px solid #FFE082'}}>
                                    <Icon name="alert-triangle" size={14} color="#F9A825" style={{marginTop:1,flexShrink:0}} />
                                    <div>
                                        <p className="text-[10px] font-bold" style={{color:'#E65100'}}>放置した場合のリスク</p>
                                        <p className="text-[11px] mt-0.5" style={{color:'#5D4037',lineHeight:'1.5'}}>{info.risk}</p>
                                    </div>
                                </div>
                            )}
                            {/* おすすめ施術 */}
                            {showCourses && (
                                <div className="mt-3">
                                    <p className="text-[10px] font-bold mb-2" style={{color:'#a87e5a'}}>おすすめ施術</p>
                                    <div className="space-y-2">
                                        {courses.map((c, i) => (
                                            <div key={i} className="flex items-start gap-3 p-3 rounded-lg" style={{background:'linear-gradient(135deg, #faf7f4, #f5ede5)',border:'1px solid #e8e0d8'}}>
                                                <div className="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style={{background:'#a87e5a'}}>
                                                    <Icon name={c.icon} size={14} color="white" />
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <p className="text-xs font-bold" style={{color:'#2c2420'}}>{c.name}</p>
                                                    <p className="text-[10px] mt-0.5" style={{color:'#706050',lineHeight:'1.5'}}>{c.desc}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {/* ゾーン別スコア */}
                            {result.zones && (
                                <div className="mt-3">
                                    <p className="text-[10px] font-bold mb-2" style={{color:'#a09080'}}>部位別スコア</p>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                        {Object.entries(result.zones).map(([zoneKey, zoneScore]) => {
                                            const zone = FACE_ZONES.find(z => z.key === zoneKey);
                                            const zGrade = saGetGrade(Math.round(zoneScore));
                                            return (
                                                <div key={zoneKey} className="text-center p-2 rounded-lg" style={{background:zGrade.bg}}>
                                                    <p className="text-[10px] font-bold" style={{color:'#706050'}}>{zone ? zone.label : zoneKey}</p>
                                                    <p className="text-lg font-light" style={{fontFamily:'"Cormorant Garamond",serif',color:zGrade.color}}>{Math.round(zoneScore)}</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const SAFaceGuideOverlay = ({ width = 100, height = 130, showZones = true }) => {
            const cx = width / 2, cy = height / 2;
            const rx = width * 0.32, ry = height * 0.42;
            return (
                <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet" className="absolute inset-0 w-full h-full pointer-events-none">
                    <defs>
                        <mask id="sa-oval-mask">
                            <rect width={width} height={height} fill="white" />
                            <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill="black" />
                        </mask>
                    </defs>
                    <rect width={width} height={height} fill="rgba(0,0,0,0.45)" mask="url(#sa-oval-mask)" />
                    <ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill="none" stroke="#a87e5a" strokeWidth="2" strokeDasharray="8 4" opacity="0.8" />
                    {showZones && FACE_ZONES.map(z => {
                        const zx = cx - rx + z.x * 2 * rx;
                        const zy = cy - ry + z.y * 2 * ry;
                        const zw = z.w * 2 * rx;
                        const zh = z.h * 2 * ry;
                        return (
                            <g key={z.key}>
                                <rect x={zx} y={zy} width={zw} height={zh} rx={4} fill={z.color} opacity={0.25} stroke={z.color} strokeWidth={1} strokeOpacity={0.5} />
                                <text x={zx + zw/2} y={zy + zh/2 + 4} textAnchor="middle" fill="white" fontSize={10} fontWeight="bold" style={{textShadow:'0 1px 2px rgba(0,0,0,0.5)'}}>{z.label}</text>
                            </g>
                        );
                    })}
                    <text x={cx} y={cy - ry - 8} textAnchor="middle" fill="white" fontSize={Math.max(width * 0.04, 10)} fontWeight="bold" style={{textShadow:'0 1px 3px rgba(0,0,0,0.6)'}}>ガイド枠に顔を合わせてください</text>
                </svg>
            );
        };

        const SARadarChart = ({ metrics }) => {
            // RadarChart, PolarGrid, PolarAngleAxis, Radar, ResponsiveContainer, Tooltip are globally destructured from RechartsLib
            const data = SA_METRICS.map(m => ({ subject: m.label.split('・')[0], score: metrics[m.key]?.score || 0, fullMark: 100 }));
            return (
                <ResponsiveContainer width="100%" height={240}>
                    <RadarChart data={data} outerRadius="75%">
                        <PolarGrid stroke="#e8e0d8" />
                        <PolarAngleAxis dataKey="subject" tick={{ fontSize: 10, fill: '#706050' }} />
                        <Radar dataKey="score" stroke="#a87e5a" fill="#c4956a" fillOpacity={0.3} strokeWidth={2} />
                        <Tooltip formatter={(v) => [v + '点', 'スコア']} contentStyle={{fontSize:12,borderRadius:8,border:'1px solid #e8e0d8'}} />
                    </RadarChart>
                </ResponsiveContainer>
            );
        };

        // ==========================================
        // 肌分析ツール: localStorage 保存・読出し
        // ==========================================

        const SA_STORAGE_KEY = 'vivie_skin_analysis_history';

        const saSaveResult = (result, imageDataUrl) => {
            try {
                const history = JSON.parse(localStorage.getItem(SA_STORAGE_KEY) || '[]');
                // 画像はサイズ削減のためサムネイルとして保存
                history.unshift({ result, imageDataUrl, savedAt: new Date().toISOString() });
                // 最大10件保持
                if (history.length > 10) history.length = 10;
                localStorage.setItem(SA_STORAGE_KEY, JSON.stringify(history));
            } catch (e) { console.warn('肌分析データの保存に失敗:', e); }
        };

        const saLoadHistory = () => {
            try { return JSON.parse(localStorage.getItem(SA_STORAGE_KEY) || '[]'); }
            catch { return []; }
        };

        // ==========================================
        // 肌分析ツール: ビフォーアフター比較コンポーネント
        // ==========================================

        const SABeforeAfter = ({ current, currentImage, previous }) => {
            if (!previous || !previous.result) return null;
            const prev = previous.result;
            const diff = current.totalScore - prev.totalScore;
            const diffColor = diff > 0 ? '#2E7D32' : diff < 0 ? '#E65100' : '#706050';
            const diffSign = diff > 0 ? '+' : '';

            return (
                <div className="bg-white rounded-2xl p-4 shadow-sm border mb-6" style={{borderColor:'#e8e0d8'}}>
                    <div className="flex items-center justify-between mb-3">
                        <h3 className="text-sm font-bold flex items-center gap-2" style={{color:'#2c2420'}}>
                            <Icon name="git-compare" size={16} color="#a87e5a" /> ビフォーアフター
                        </h3>
                        <span className="text-[10px]" style={{color:'#a09080'}}>前回: {new Date(prev.timestamp).toLocaleDateString('ja-JP')}</span>
                    </div>

                    {/* 写真比較 */}
                    <div className="grid grid-cols-2 gap-3 mb-4">
                        {previous.imageDataUrl && (
                            <div className="rounded-xl overflow-hidden border" style={{borderColor:'#e8e0d8'}}>
                                <p className="text-center text-[10px] font-bold py-1" style={{background:'#f5f0eb',color:'#a09080'}}>BEFORE</p>
                                <img src={previous.imageDataUrl} alt="前回" className="w-full aspect-[3/4] object-cover" />
                            </div>
                        )}
                        {currentImage && (
                            <div className="rounded-xl overflow-hidden border" style={{borderColor:'#c4956a'}}>
                                <p className="text-center text-[10px] font-bold py-1" style={{background:'linear-gradient(135deg, #faf7f4, #f5ede5)',color:'#a87e5a'}}>AFTER</p>
                                <img src={currentImage} alt="今回" className="w-full aspect-[3/4] object-cover" />
                            </div>
                        )}
                    </div>

                    {/* 総合スコア変化 */}
                    <div className="flex items-center justify-center gap-4 mb-4 p-3 rounded-xl" style={{background:'#faf7f4'}}>
                        <div className="text-center">
                            <p className="text-[10px]" style={{color:'#a09080'}}>前回</p>
                            <p className="text-2xl font-light" style={{fontFamily:'"Cormorant Garamond",serif',color:'#706050'}}>{prev.totalScore}</p>
                        </div>
                        <div className="text-center px-4">
                            <Icon name="arrow-right" size={16} color="#a87e5a" />
                        </div>
                        <div className="text-center">
                            <p className="text-[10px]" style={{color:'#a09080'}}>今回</p>
                            <p className="text-2xl font-light" style={{fontFamily:'"Cormorant Garamond",serif',color:'#2c2420'}}>{current.totalScore}</p>
                        </div>
                        <div className="text-center ml-2 px-3 py-1 rounded-full" style={{background: diff > 0 ? '#E8F5E9' : diff < 0 ? '#FFF3E0' : '#f5f0eb'}}>
                            <p className="text-lg font-bold" style={{color:diffColor}}>{diffSign}{diff}</p>
                        </div>
                    </div>

                    {/* 指標別変化 */}
                    <div className="space-y-2">
                        {SA_METRICS.map(m => {
                            const curScore = current.metrics[m.key]?.score || 0;
                            const prevScore = prev.metrics[m.key]?.score || 0;
                            const d = curScore - prevScore;
                            if (d === 0) return null;
                            const dc = d > 0 ? '#2E7D32' : '#E65100';
                            return (
                                <div key={m.key} className="flex items-center justify-between px-3 py-2 rounded-lg" style={{background: d > 0 ? '#E8F5E9' : '#FFF3E0'}}>
                                    <div className="flex items-center gap-2">
                                        <Icon name={m.icon} size={14} color="#a87e5a" />
                                        <span className="text-xs font-bold" style={{color:'#2c2420'}}>{m.label}</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs" style={{color:'#a09080'}}>{prevScore}</span>
                                        <span className="text-xs" style={{color:'#a09080'}}>→</span>
                                        <span className="text-xs font-bold" style={{color:'#2c2420'}}>{curScore}</span>
                                        <span className="text-xs font-bold px-1.5 py-0.5 rounded" style={{color:dc,background:d > 0 ? '#C8E6C9' : '#FFE0B2'}}>
                                            {d > 0 ? '+' : ''}{d}
                                        </span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 肌分析ツール: おすすめコース提案セクション
        // ==========================================

        const SACourseSuggestion = ({ result }) => {
            // 改善が必要な指標から重複なしでコースを集める
            const courseMap = new Map();
            SA_METRICS.forEach(m => {
                const score = result.metrics[m.key]?.score || 0;
                if (score >= 80) return; // 優秀なら提案不要
                const diag = SA_DIAGNOSIS[m.key];
                if (!diag || !diag.courses) return;
                diag.courses.forEach(c => {
                    if (!courseMap.has(c.name)) {
                        courseMap.set(c.name, { ...c, forMetrics: [] });
                    }
                    courseMap.get(c.name).forMetrics.push(m.label.split('・')[0]);
                });
            });
            const courses = [...courseMap.values()];
            if (courses.length === 0) return null;

            return (
                <div className="rounded-2xl p-4 shadow-sm border mb-6 relative overflow-hidden" style={{background:'linear-gradient(135deg, #2c2420, #4a3830)',borderColor:'#5a4a40'}}>
                    {/* 背景装飾 */}
                    <div className="absolute top-0 right-0 w-32 h-32 rounded-full opacity-10" style={{background:'radial-gradient(circle, #c4956a, transparent)',transform:'translate(30%,-30%)'}}></div>
                    <h3 className="text-sm font-bold flex items-center gap-2 mb-1" style={{color:'#e8d5c4'}}>
                        <Icon name="sparkles" size={16} color="#c4956a" /> あなたにおすすめの施術
                    </h3>
                    <p className="text-[10px] mb-4" style={{color:'#a09080'}}>診断結果に基づき、改善効果が期待できる施術をご提案します</p>
                    <div className="space-y-3">
                        {courses.map((c, i) => (
                            <div key={i} className="rounded-xl p-4 relative" style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(196,149,106,0.3)'}}>
                                <div className="flex items-start gap-3">
                                    <div className="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style={{background:'linear-gradient(135deg, #c4956a, #a87e5a)'}}>
                                        <Icon name={c.icon} size={18} color="white" />
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-sm font-bold" style={{color:'#fff'}}>{c.name}</p>
                                        <p className="text-[11px] mt-1" style={{color:'#d4c4b4',lineHeight:'1.5'}}>{c.desc}</p>
                                        <div className="flex flex-wrap gap-1.5 mt-2">
                                            {c.forMetrics.map((label, j) => (
                                                <span key={j} className="text-[9px] px-2 py-0.5 rounded-full" style={{background:'rgba(196,149,106,0.25)',color:'#e8d5c4',border:'1px solid rgba(196,149,106,0.3)'}}>{label}の改善に</span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <p className="text-[10px] mt-4 text-center" style={{color:'#a09080'}}>
                        詳しくはスタッフまでお気軽にご相談ください
                    </p>
                </div>
            );
        };

        // ==========================================
        // 肌分析ツール: ResultsView
        // ==========================================

        const SAResultsView = ({ result, imageDataUrl, onRetry }) => {
            const [expandedMetric, setExpandedMetric] = useState(null);
            const [showBeforeAfter, setShowBeforeAfter] = useState(false);
            const grade = saGetGrade(result.totalScore);

            // localStorage に保存 & 前回結果を取得
            const history = useMemo(() => saLoadHistory(), []);
            const previousResult = history.length > 0 ? history[0] : null;

            // 初回マウント時に結果を保存
            useEffect(() => {
                saSaveResult(result, imageDataUrl);
            }, []);

            const getAdvice = (score) => {
                if (score >= 80) return '素晴らしい肌状態です。現在のケアを継続しましょう。';
                if (score >= 65) return '良好な状態です。気になるポイントを重点ケアで改善できます。';
                if (score >= 45) return '改善の余地があります。プロのアドバイスを参考にケアを見直しましょう。';
                return '専門的なケアをおすすめします。サロンでのトリートメントが効果的です。';
            };

            return (
                <div className="h-full overflow-y-auto" style={{background:'#faf7f4'}}>
                    <div className="max-w-2xl mx-auto p-4 md:p-6 pb-20">
                        {/* Header */}
                        <div className="text-center mb-6">
                            <h2 className="text-2xl font-light tracking-wider mb-1" style={{fontFamily:'"Cormorant Garamond",serif',color:'#2c2420'}}>Analysis Result</h2>
                            <p className="text-xs" style={{color:'#a09080'}}>{new Date(result.timestamp).toLocaleString('ja-JP')}</p>
                        </div>

                        {/* Image with zone overlay */}
                        {imageDataUrl && (
                            <div className="relative mx-auto mb-6 rounded-2xl overflow-hidden shadow-lg" style={{maxWidth:360}}>
                                <img src={imageDataUrl} alt="分析画像" className="w-full" />
                                <div className="absolute inset-0">
                                    <SAFaceGuideOverlay width={result.imageW || 640} height={result.imageH || 480} showZones={true} />
                                </div>
                            </div>
                        )}

                        {/* Score + Radar side by side */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                            <div className="bg-white rounded-2xl p-6 shadow-sm border flex flex-col items-center justify-center relative" style={{borderColor:'#e8e0d8'}}>
                                <SAScoreCircle score={result.totalScore} />
                                <p className="text-sm mt-3 text-center px-4" style={{color:'#706050',lineHeight:'1.6'}}>{getAdvice(result.totalScore)}</p>
                            </div>
                            <div className="bg-white rounded-2xl p-4 shadow-sm border" style={{borderColor:'#e8e0d8'}}>
                                <p className="text-xs font-bold text-center mb-2" style={{color:'#a87e5a'}}>バランスチャート</p>
                                <SARadarChart metrics={result.metrics} />
                            </div>
                        </div>

                        {/* ビフォーアフター比較 */}
                        {previousResult && (
                            <div className="mb-6">
                                {!showBeforeAfter ? (
                                    <button onClick={() => setShowBeforeAfter(true)} className="w-full py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition hover:shadow-md" style={{background:'#fff',border:'1px dashed #c4956a',color:'#a87e5a'}}>
                                        <Icon name="git-compare" size={16} color="#a87e5a" /> 前回の結果と比較する
                                    </button>
                                ) : (
                                    <SABeforeAfter current={result} currentImage={imageDataUrl} previous={previousResult} />
                                )}
                            </div>
                        )}

                        {/* おすすめコース提案 */}
                        <SACourseSuggestion result={result} />

                        {/* Metric Cards */}
                        <div className="space-y-3 mb-6">
                            <h3 className="text-sm font-bold flex items-center gap-2" style={{color:'#2c2420'}}>
                                <Icon name="list" size={16} color="#a87e5a" /> 項目別スコア
                            </h3>
                            {SA_METRICS.map(m => (
                                <SAMetricCard key={m.key} metric={m} result={result.metrics[m.key]}
                                    isExpanded={expandedMetric === m.key}
                                    onToggle={() => setExpandedMetric(expandedMetric === m.key ? null : m.key)} />
                            ))}
                        </div>

                        {/* Disclaimer */}
                        <div className="rounded-xl p-4 mb-6" style={{background:'#f5f0eb',border:'1px solid #e8e0d8'}}>
                            <p className="text-[10px] leading-relaxed" style={{color:'#a09080'}}>
                                ※ 本分析はカウンセリング補助を目的としており、医療診断ではありません。
                                撮影環境（照明・カメラ）によりスコアが変動する場合があります。
                                施術前後の比較には同一環境での撮影を推奨します。
                            </p>
                        </div>

                        {/* Retry Button */}
                        <div className="text-center">
                            <button onClick={onRetry} className="px-8 py-3 rounded-full text-white text-sm font-bold shadow-lg transition-all hover:shadow-xl active:scale-95" style={{background:'linear-gradient(135deg, #c4956a, #a87e5a)'}}>
                                <Icon name="refresh-cw" size={14} className="inline mr-2" /> もう一度分析する
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 肌分析ツール: SkinAnalyzerView メインコンポーネント
        // ==========================================

        const SkinAnalyzerView = () => {
            const [phase, setPhase] = useState('start'); // start, camera, analyzing, results
            const [result, setResult] = useState(null);
            const [imageDataUrl, setImageDataUrl] = useState(null);
            const [cameraError, setCameraError] = useState('');
            const [videoDimensions, setVideoDimensions] = useState({ w: 640, h: 480 });

            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const streamRef = useRef(null);
            const fileInputRef = useRef(null);
            const containerRef = useRef(null);
