            // Start camera
            const startCamera = async () => {
                setCameraError('');
                setPhase('camera');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                    });
                    streamRef.current = stream;
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        videoRef.current.onloadedmetadata = () => {
                            setVideoDimensions({ w: videoRef.current.videoWidth, h: videoRef.current.videoHeight });
                        };
                    }
                } catch (err) {
                    console.error('Camera error:', err);
                    setCameraError('カメラを起動できませんでした。写真をアップロードしてください。');
                }
            };

            // Stop camera
            const stopCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(t => t.stop());
                    streamRef.current = null;
                }
            };

            // Capture from video (mirror to match preview)
            const capturePhoto = () => {
                if (!videoRef.current || !canvasRef.current) return;
                const video = videoRef.current;
                const canvas = canvasRef.current;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                // Mirror horizontally to match the scaleX(-1) preview the user sees
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0);
                ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset transform
                stopCamera();
                processCanvas(canvas);
            };

            // Process uploaded file
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setPhase('analyzing');
                const img = new Image();
                img.onload = () => {
                    const canvas = canvasRef.current || document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    processCanvas(canvas);
                };
                img.src = URL.createObjectURL(file);
            };

            // Analyze canvas
            const processCanvas = (canvas) => {
                setPhase('analyzing');
                setImageDataUrl(canvas.toDataURL('image/jpeg', 0.8));
                // Use requestAnimationFrame to allow UI to update before heavy computation
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        try {
                            const ctx = canvas.getContext('2d');
                            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            const analysisResult = saRunFullAnalysis(imageData, canvas.width, canvas.height);
                            analysisResult.imageW = canvas.width;
                            analysisResult.imageH = canvas.height;
                            setResult(analysisResult);
                            setPhase('results');
                        } catch (err) {
                            console.error('Analysis error:', err);
                            setCameraError('分析中にエラーが発生しました: ' + err.message);
                            setPhase('start');
                        }
                    }, 500); // Small delay for spinner visibility
                });
            };

            // Reset
            const handleRetry = () => {
                stopCamera();
                setPhase('start');
                setResult(null);
                setImageDataUrl(null);
                setCameraError('');
            };

            // Cleanup on unmount
            useEffect(() => { return () => stopCamera(); }, []);

            // Brand colors
            const brand = { bg: '#faf7f4', text: '#2c2420', accent: '#a87e5a', light: '#c4956a', muted: '#a09080', border: '#e8e0d8', card: '#fff' };

            // ========================
            // START PHASE
            // ========================
            if (phase === 'start') {
                return (
                    <div className="h-full overflow-y-auto" style={{background:brand.bg}}>
                        <div className="max-w-lg mx-auto px-6 py-10 flex flex-col items-center">
                            {/* Face Icon SVG */}
                            <div className="mb-6">
                                <svg width="100" height="120" viewBox="0 0 100 120" fill="none">
                                    <ellipse cx="50" cy="55" rx="35" ry="45" stroke={brand.accent} strokeWidth="2" strokeDasharray="4 3" fill={brand.bg} />
                                    <circle cx="36" cy="44" r="3" fill={brand.accent} />
                                    <circle cx="64" cy="44" r="3" fill={brand.accent} />
                                    <ellipse cx="50" cy="58" rx="4" ry="5" stroke={brand.accent} strokeWidth="1.5" fill="none" />
                                    <path d="M40 72 Q50 80 60 72" stroke={brand.accent} strokeWidth="1.5" fill="none" strokeLinecap="round" />
                                    <path d="M20 35 Q15 20 30 15" stroke={brand.light} strokeWidth="1" fill="none" opacity="0.5" />
                                    <path d="M80 35 Q85 20 70 15" stroke={brand.light} strokeWidth="1" fill="none" opacity="0.5" />
                                </svg>
                            </div>
                            <h1 className="text-3xl font-light tracking-wider mb-2" style={{fontFamily:'"Cormorant Garamond",serif',color:brand.text}}>Skin Analysis</h1>
                            <p className="text-sm mb-1" style={{color:brand.accent}}>肌状態を分析</p>
                            <p className="text-xs text-center mb-8 leading-relaxed" style={{color:brand.muted}}>
                                カメラで撮影した画像をもとに、6項目の肌指標を<br/>スコア化するカウンセリング補助ツールです。
                            </p>

                            {/* Buttons */}
                            <div className="w-full space-y-3 mb-8">
                                <button onClick={startCamera} className="w-full py-3.5 rounded-full text-white text-sm font-bold shadow-lg transition-all hover:shadow-xl active:scale-[0.98] flex items-center justify-center gap-2" style={{background:'linear-gradient(135deg, #c4956a, #a87e5a)'}}>
                                    <Icon name="camera" size={18} /> カメラで撮影
                                </button>
                                <button onClick={() => fileInputRef.current?.click()} className="w-full py-3.5 rounded-full text-sm font-bold border-2 transition-all hover:shadow-md active:scale-[0.98] flex items-center justify-center gap-2" style={{borderColor:brand.accent,color:brand.accent,background:'transparent'}}>
                                    <Icon name="upload" size={18} /> 写真をアップロード
                                </button>
                                <input ref={fileInputRef} type="file" accept="image/*" capture="user" className="hidden" onChange={handleFileUpload} />
                            </div>

                            {cameraError && (
                                <div className="w-full p-3 rounded-xl mb-6 text-xs" style={{background:'#FFF3E0',color:'#E65100',border:'1px solid #FFE0B2'}}>
                                    {cameraError}
                                </div>
                            )}

                            {/* Tips */}
                            <div className="w-full rounded-2xl p-5 shadow-sm" style={{background:brand.card,border:`1px solid ${brand.border}`}}>
                                <p className="text-xs font-bold mb-3 flex items-center gap-2" style={{color:brand.accent}}>
                                    <Icon name="lightbulb" size={14} /> 撮影のコツ
                                </p>
                                <div className="space-y-2.5">
                                    {[
                                        { icon: 'sun', text: '自然光の下で撮影すると、より正確な分析ができます' },
                                        { icon: 'glasses', text: 'メガネを外し、前髪は上げてください' },
                                        { icon: 'scan', text: 'ガイドの楕円に顔を合わせてください' },
                                        { icon: 'smile', text: 'リラックスした表情で正面を向いてください' },
                                    ].map((tip, i) => (
                                        <div key={i} className="flex items-start gap-2.5">
                                            <Icon name={tip.icon} size={14} color={brand.light} style={{marginTop:2,flexShrink:0}} />
                                            <p className="text-xs leading-relaxed" style={{color:brand.muted}}>{tip.text}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ========================
            // CAMERA PHASE
            // ========================
            if (phase === 'camera') {
                return (
                    <div className="h-full flex flex-col" style={{background:'#000'}}>
                        <div className="flex-1 relative flex items-center justify-center overflow-hidden" ref={containerRef}>
                            <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-contain" style={{transform:'scaleX(-1)'}} />
                            {/* Guide overlay with zone boxes — uses actual video aspect ratio */}
                            <div className="absolute inset-0 flex items-center justify-center">
                                <SAFaceGuideOverlay width={videoDimensions.w || 640} height={videoDimensions.h || 480} showZones={true} />
                            </div>
                            {cameraError && (
                                <div className="absolute inset-0 flex items-center justify-center bg-black/80">
                                    <div className="text-center p-6">
                                        <p className="text-white text-sm mb-4">{cameraError}</p>
                                        <button onClick={() => fileInputRef.current?.click()} className="px-6 py-2 rounded-full text-sm font-bold text-white" style={{background:brand.accent}}>
                                            写真をアップロード
                                        </button>
                                        <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handleFileUpload} />
                                    </div>
                                </div>
                            )}
                        </div>
                        {/* Controls */}
                        <div className="shrink-0 py-6 px-4 flex items-center justify-center gap-6" style={{background:'rgba(0,0,0,0.9)'}}>
                            <button onClick={handleRetry} className="w-12 h-12 rounded-full border-2 border-white/30 flex items-center justify-center text-white/70 hover:bg-white/10 transition">
                                <Icon name="arrow-left" size={20} />
                            </button>
                            <button onClick={capturePhoto} className="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center transition hover:scale-105 active:scale-95" style={{background:'linear-gradient(135deg, #c4956a, #a87e5a)'}}>
                                <Icon name="camera" size={28} color="white" />
                            </button>
                            <div className="w-12 h-12"></div>
                        </div>
                        <canvas ref={canvasRef} className="hidden" />
                    </div>
                );
            }

            // ========================
            // ANALYZING PHASE
            // ========================
            if (phase === 'analyzing') {
                return (
                    <div className="h-full flex flex-col items-center justify-center" style={{background:brand.bg}}>
                        <div className="text-center">
                            {/* Spinner */}
                            <div className="relative w-24 h-24 mx-auto mb-6">
                                <div className="absolute inset-0 rounded-full border-4 border-t-transparent animate-spin" style={{borderColor:`${brand.border}`,borderTopColor:'transparent',animationDuration:'0.8s'}}></div>
                                <div className="absolute inset-2 rounded-full border-4 border-b-transparent animate-spin" style={{borderColor:`${brand.accent}`,borderBottomColor:'transparent',animationDuration:'1.2s',animationDirection:'reverse'}}></div>
                                <div className="absolute inset-0 flex items-center justify-center">
                                    <Icon name="scan" size={24} color={brand.accent} />
                                </div>
                            </div>
                            <p className="text-lg font-light tracking-wider mb-2" style={{fontFamily:'"Cormorant Garamond",serif',color:brand.text}}>Analyzing...</p>
                            <p className="text-xs" style={{color:brand.muted}}>肌を分析中です</p>
                        </div>
                        <canvas ref={canvasRef} className="hidden" />
                    </div>
                );
            }

            // ========================
            // RESULTS PHASE
            // ========================
            if (phase === 'results' && result) {
                return <SAResultsView result={result} imageDataUrl={imageDataUrl} onRetry={handleRetry} />;
            }

            return null;
        };

        // ==========================================
        // 診断共通: カメラ・アップロード・分析ラッパー
        // ==========================================

        const DiagnosisCameraWrapper = ({ title, titleEn, subtitle, tips, analysisFn, ResultsComponent, storageKey, iconSvg }) => {
            const [phase, setPhase] = useState('start');
            const [result, setResult] = useState(null);
            const [imageDataUrl, setImageDataUrl] = useState(null);
            const [cameraError, setCameraError] = useState('');
            const [videoDimensions, setVideoDimensions] = useState({ w: 640, h: 480 });

            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const streamRef = useRef(null);
            const fileInputRef = useRef(null);

            const brand = { bg: '#faf7f4', text: '#2c2420', accent: '#a87e5a', light: '#c4956a', muted: '#a09080', border: '#e8e0d8', card: '#fff' };

            const startCamera = async () => {
                setCameraError('');
                setPhase('camera');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                    });
                    streamRef.current = stream;
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        videoRef.current.onloadedmetadata = () => {
                            setVideoDimensions({ w: videoRef.current.videoWidth, h: videoRef.current.videoHeight });
                        };
                    }
                } catch (err) {
                    console.error('Camera error:', err);
                    setCameraError('カメラを起動できませんでした。写真をアップロードしてください。');
                }
            };

            const stopCamera = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(t => t.stop());
                    streamRef.current = null;
                }
            };

            const capturePhoto = () => {
                if (!videoRef.current || !canvasRef.current) return;
                const video = videoRef.current;
                const canvas = canvasRef.current;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                stopCamera();
                processCanvas(canvas);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setPhase('analyzing');
                const img = new Image();
                img.onload = () => {
                    const canvas = canvasRef.current || document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    processCanvas(canvas);
                };
                img.src = URL.createObjectURL(file);
            };

            const processCanvas = (canvas) => {
                setPhase('analyzing');
                setImageDataUrl(canvas.toDataURL('image/jpeg', 0.8));
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        try {
                            const ctx = canvas.getContext('2d');
                            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            const analysisResult = analysisFn(imageData, canvas.width, canvas.height);
                            analysisResult.imageW = canvas.width;
                            analysisResult.imageH = canvas.height;
                            setResult(analysisResult);
                            setPhase('results');
                        } catch (err) {
                            console.error('Analysis error:', err);
                            setCameraError('分析中にエラーが発生しました: ' + err.message);
                            setPhase('start');
                        }
                    }, 500);
                });
            };

            const handleRetry = () => {
                stopCamera();
                setPhase('start');
                setResult(null);
                setImageDataUrl(null);
                setCameraError('');
            };

            useEffect(() => { return () => stopCamera(); }, []);

            // START PHASE
            if (phase === 'start') {
                return (
                    <div className="h-full overflow-y-auto" style={{background:brand.bg}}>
                        <div className="max-w-lg mx-auto px-6 py-10 flex flex-col items-center">
                            <div className="mb-6">{iconSvg}</div>
                            <h1 className="text-3xl font-light tracking-wider mb-2" style={{fontFamily:'"Cormorant Garamond",serif',color:brand.text}}>{titleEn}</h1>
                            <p className="text-sm mb-1" style={{color:brand.accent}}>{title}</p>
                            <p className="text-xs text-center mb-8 leading-relaxed" style={{color:brand.muted}}>{subtitle}</p>
                            <div className="w-full space-y-3 mb-8">
                                <button onClick={startCamera} className="w-full py-3.5 rounded-full text-white text-sm font-bold shadow-lg transition-all hover:shadow-xl active:scale-[0.98] flex items-center justify-center gap-2" style={{background:'linear-gradient(135deg, #c4956a, #a87e5a)'}}>
                                    <Icon name="camera" size={18} /> カメラで撮影
                                </button>
                                <button onClick={() => fileInputRef.current?.click()} className="w-full py-3.5 rounded-full text-sm font-bold border-2 transition-all hover:shadow-md active:scale-[0.98] flex items-center justify-center gap-2" style={{borderColor:brand.accent,color:brand.accent,background:'transparent'}}>
                                    <Icon name="upload" size={18} /> 写真をアップロード
                                </button>
                                <input ref={fileInputRef} type="file" accept="image/*" capture="user" className="hidden" onChange={handleFileUpload} />
                            </div>
                            {cameraError && (
                                <div className="w-full p-3 rounded-xl mb-6 text-xs" style={{background:'#FFF3E0',color:'#E65100',border:'1px solid #FFE0B2'}}>
                                    {cameraError}
                                </div>
                            )}
                            <div className="w-full rounded-2xl p-5 shadow-sm" style={{background:brand.card,border:`1px solid ${brand.border}`}}>
                                <p className="text-xs font-bold mb-3 flex items-center gap-2" style={{color:brand.accent}}>
                                    <Icon name="lightbulb" size={14} /> 撮影のコツ
                                </p>
                                <div className="space-y-2.5">
                                    {tips.map((tip, i) => (
                                        <div key={i} className="flex items-start gap-2.5">
                                            <Icon name={tip.icon} size={14} color={brand.light} style={{marginTop:2,flexShrink:0}} />
                                            <p className="text-xs leading-relaxed" style={{color:brand.muted}}>{tip.text}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // CAMERA PHASE
            if (phase === 'camera') {
                return (
                    <div className="h-full flex flex-col" style={{background:'#000'}}>
                        <div className="flex-1 relative flex items-center justify-center overflow-hidden">
                            <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-contain" style={{transform:'scaleX(-1)'}} />
                            <div className="absolute inset-0 flex items-center justify-center">
                                <SAFaceGuideOverlay width={videoDimensions.w || 640} height={videoDimensions.h || 480} showZones={true} />
                            </div>
                            {cameraError && (
                                <div className="absolute inset-0 flex items-center justify-center bg-black/80">
                                    <div className="text-center p-6">
                                        <p className="text-white text-sm mb-4">{cameraError}</p>
                                        <button onClick={() => fileInputRef.current?.click()} className="px-6 py-2 rounded-full text-sm font-bold text-white" style={{background:brand.accent}}>
                                            写真をアップロード
                                        </button>
                                        <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={handleFileUpload} />
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="shrink-0 py-6 px-4 flex items-center justify-center gap-6" style={{background:'rgba(0,0,0,0.9)'}}>
                            <button onClick={handleRetry} className="w-12 h-12 rounded-full border-2 border-white/30 flex items-center justify-center text-white/70 hover:bg-white/10 transition">
                                <Icon name="arrow-left" size={20} />
                            </button>
                            <button onClick={capturePhoto} className="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center transition hover:scale-105 active:scale-95" style={{background:'linear-gradient(135deg, #c4956a, #a87e5a)'}}>
                                <Icon name="camera" size={28} color="white" />
                            </button>
                            <div className="w-12 h-12"></div>
                        </div>
                        <canvas ref={canvasRef} className="hidden" />
                    </div>
                );
            }

            // ANALYZING PHASE
            if (phase === 'analyzing') {
                return (
                    <div className="h-full flex flex-col items-center justify-center" style={{background:brand.bg}}>
                        <div className="text-center">
                            <div className="relative w-24 h-24 mx-auto mb-6">
                                <div className="absolute inset-0 rounded-full border-4 border-t-transparent animate-spin" style={{borderColor:`${brand.border}`,borderTopColor:'transparent',animationDuration:'0.8s'}}></div>
                                <div className="absolute inset-2 rounded-full border-4 border-b-transparent animate-spin" style={{borderColor:`${brand.accent}`,borderBottomColor:'transparent',animationDuration:'1.2s',animationDirection:'reverse'}}></div>
                                <div className="absolute inset-0 flex items-center justify-center">
                                    <Icon name="scan" size={24} color={brand.accent} />
                                </div>
                            </div>
                            <p className="text-lg font-light tracking-wider mb-2" style={{fontFamily:'"Cormorant Garamond",serif',color:brand.text}}>Analyzing...</p>
                            <p className="text-xs" style={{color:brand.muted}}>分析中です</p>
                        </div>
                        <canvas ref={canvasRef} className="hidden" />
                    </div>
                );
            }

            // RESULTS PHASE
            if (phase === 'results' && result) {
                return <ResultsComponent result={result} imageDataUrl={imageDataUrl} onRetry={handleRetry} storageKey={storageKey} />;
            }

            return null;
        };

        // ==========================================
        // 診断共通: 結果表示ヘルパーコンポーネント
        // ==========================================

        const DiagnosisResultsView = ({ result, imageDataUrl, onRetry, metricsConfig, diagnosisConfig, titleEn, radarLabel }) => {
            const [expandedMetric, setExpandedMetric] = useState(null);
            const grade = saGetGrade(result.totalScore);

            const getAdvice = (score) => {
                if (score >= 80) return '素晴らしい状態です。現在のケアを継続しましょう。';
                if (score >= 65) return '良好な状態です。気になるポイントを重点ケアで改善できます。';
                if (score >= 45) return '改善の余地があります。プロのアドバイスを参考にケアを見直しましょう。';
                return '専門的なケアをおすすめします。サロンでのトリートメントが効果的です。';
            };

            // Radar chart
            const radarData = metricsConfig.map(m => ({ subject: m.label, score: result.metrics[m.key]?.score || 0, fullMark: 100 }));

            // Course suggestions
            const courseMap = new Map();
            metricsConfig.forEach(m => {
                const score = result.metrics[m.key]?.score || 0;
                if (score >= 80) return;
                const diag = diagnosisConfig[m.key];
                if (!diag || !diag.courses) return;
                diag.courses.forEach(c => {
                    if (!courseMap.has(c.name)) {
                        courseMap.set(c.name, { ...c, forMetrics: [] });
                    }
                    courseMap.get(c.name).forMetrics.push(m.label);
                });
            });
            const courses = [...courseMap.values()];

            return (
                <div className="h-full overflow-y-auto" style={{background:'#faf7f4'}}>
                    <div className="max-w-2xl mx-auto p-4 md:p-6 pb-20">
                        {/* Header */}
                        <div className="text-center mb-6">
                            <h2 className="text-2xl font-light tracking-wider mb-1" style={{fontFamily:'"Cormorant Garamond",serif',color:'#2c2420'}}>{titleEn}</h2>
                            <p className="text-xs" style={{color:'#a09080'}}>{new Date(result.timestamp).toLocaleString('ja-JP')}</p>
                        </div>

                        {/* Image */}
                        {imageDataUrl && (
                            <div className="relative mx-auto mb-6 rounded-2xl overflow-hidden shadow-lg" style={{maxWidth:360}}>
                                <img src={imageDataUrl} alt="分析画像" className="w-full" />
                                <div className="absolute inset-0">
                                    <SAFaceGuideOverlay width={result.imageW || 640} height={result.imageH || 480} showZones={true} />
                                </div>
                            </div>
                        )}

                        {/* Score + Radar */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                            <div className="bg-white rounded-2xl p-6 shadow-sm border flex flex-col items-center justify-center" style={{borderColor:'#e8e0d8'}}>
                                <SAScoreCircle score={result.totalScore} />
                                <p className="text-sm mt-3 text-center px-4" style={{color:'#706050',lineHeight:'1.6'}}>{getAdvice(result.totalScore)}</p>
                            </div>
                            <div className="bg-white rounded-2xl p-4 shadow-sm border" style={{borderColor:'#e8e0d8'}}>
                                <p className="text-xs font-bold text-center mb-2" style={{color:'#a87e5a'}}>{radarLabel || 'バランスチャート'}</p>
                                <ResponsiveContainer width="100%" height={240}>
                                    <RadarChart data={radarData} outerRadius="75%">
                                        <PolarGrid stroke="#e8e0d8" />
                                        <PolarAngleAxis dataKey="subject" tick={{ fontSize: 10, fill: '#706050' }} />
                                        <Radar dataKey="score" stroke="#a87e5a" fill="#c4956a" fillOpacity={0.3} strokeWidth={2} />
                                        <Tooltip formatter={(v) => [v + '点', 'スコア']} contentStyle={{fontSize:12,borderRadius:8,border:'1px solid #e8e0d8'}} />
                                    </RadarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Course Suggestions */}
                        {courses.length > 0 && (
                            <div className="rounded-2xl p-4 shadow-sm border mb-6 relative overflow-hidden" style={{background:'linear-gradient(135deg, #2c2420, #4a3830)',borderColor:'#5a4a40'}}>
                                <div className="absolute top-0 right-0 w-32 h-32 rounded-full opacity-10" style={{background:'radial-gradient(circle, #c4956a, transparent)',transform:'translate(30%,-30%)'}}></div>
                                <h3 className="text-sm font-bold flex items-center gap-2 mb-1" style={{color:'#e8d5c4'}}>
                                    <Icon name="sparkles" size={16} color="#c4956a" /> あなたにおすすめの施術
                                </h3>
                                <p className="text-[10px] mb-4" style={{color:'#a09080'}}>診断結果に基づき、改善効果が期待できる施術をご提案します</p>
                                <div className="space-y-3">
                                    {courses.map((c, i) => (
                                        <div key={i} className="rounded-xl p-4 relative" style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(196,149,106,0.3)'}}>
                                            <div className="flex items-start gap-3">
                                                <div className="w-10 h-10 rounded-full flex items-center justify-center shrink-0" style={{background:'linear-gradient(135deg, #c4956a, #a87e5a)'}}>
                                                    <Icon name={c.icon} size={18} color="white" />
                                                </div>
                                                <div className="flex-1">
                                                    <p className="text-sm font-bold" style={{color:'#fff'}}>{c.name}</p>
                                                    <p className="text-[11px] mt-1" style={{color:'#d4c4b4',lineHeight:'1.5'}}>{c.desc}</p>
                                                    <div className="flex flex-wrap gap-1.5 mt-2">
                                                        {c.forMetrics.map((label, j) => (
                                                            <span key={j} className="text-[9px] px-2 py-0.5 rounded-full" style={{background:'rgba(196,149,106,0.25)',color:'#e8d5c4',border:'1px solid rgba(196,149,106,0.3)'}}>{label}の改善に</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-[10px] mt-4 text-center" style={{color:'#a09080'}}>
                                    詳しくはスタッフまでお気軽にご相談ください
                                </p>
                            </div>
                        )}

                        {/* Metric Cards */}
                        <div className="space-y-3 mb-6">
                            <h3 className="text-sm font-bold flex items-center gap-2" style={{color:'#2c2420'}}>
                                <Icon name="list" size={16} color="#a87e5a" /> 項目別スコア
                            </h3>
                            {metricsConfig.map(m => (
                                <SAMetricCard key={m.key} metric={m} result={result.metrics[m.key]}
                                    isExpanded={expandedMetric === m.key}
                                    onToggle={() => setExpandedMetric(expandedMetric === m.key ? null : m.key)}
                                    diagnosisConfig={diagnosisConfig} />
                            ))}
                        </div>

                        {/* Disclaimer */}
                        <div className="rounded-xl p-4 mb-6" style={{background:'#f5f0eb',border:'1px solid #e8e0d8'}}>
                            <p className="text-[10px] leading-relaxed" style={{color:'#a09080'}}>
                                ※ 本分析はカウンセリング補助を目的としており、医療診断ではありません。
                                撮影環境（照明・カメラ）によりスコアが変動する場合があります。
                                施術前後の比較には同一環境での撮影を推奨します。
                            </p>
                        </div>

                        {/* Retry Button */}
                        <div className="text-center">
                            <button onClick={onRetry} className="px-8 py-3 rounded-full text-white text-sm font-bold shadow-lg transition-all hover:shadow-xl active:scale-95" style={{background:'linear-gradient(135deg, #c4956a, #a87e5a)'}}>
                                <Icon name="refresh-cw" size={14} className="inline mr-2" /> もう一度分析する
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 小顔診断: メインビュー
        // ==========================================

        const SmallFaceDiagnosisView = () => {
            const sfIcon = (
                <svg width="100" height="120" viewBox="0 0 100 120" fill="none">
                    <ellipse cx="50" cy="55" rx="32" ry="42" stroke="#a87e5a" strokeWidth="2" fill="#faf7f4" />
                    <ellipse cx="50" cy="55" rx="28" ry="38" stroke="#c4956a" strokeWidth="1" strokeDasharray="4 3" fill="none" opacity="0.5" />
                    <circle cx="36" cy="44" r="2.5" fill="#a87e5a" />
                    <circle cx="64" cy="44" r="2.5" fill="#a87e5a" />
                    <path d="M40 68 Q50 76 60 68" stroke="#a87e5a" strokeWidth="1.5" fill="none" strokeLinecap="round" />
                    {/* 矢印（引き締めイメージ） */}
                    <path d="M15 55 L22 55" stroke="#c4956a" strokeWidth="1.5" markerEnd="url(#sf-arrow)" />
                    <path d="M85 55 L78 55" stroke="#c4956a" strokeWidth="1.5" markerEnd="url(#sf-arrow)" />
                    <path d="M50 100 L50 93" stroke="#c4956a" strokeWidth="1.5" markerEnd="url(#sf-arrow)" />
                    <defs>
                        <marker id="sf-arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
                            <path d="M0,0 L6,3 L0,6 Z" fill="#c4956a" />
                        </marker>
                    </defs>
                </svg>

        };

        // ========================================
        // メインアプリケーション
        // ========================================

        // パスワードロック画面コンポーネント
        const PasswordLockScreen = ({ access, onUnlock }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [checking, setChecking] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!password.trim()) return;
                setChecking(true);
                setError('');
                const result = await verifyStaffPassword(access.staffId, password);
                setChecking(false);
                if (result.ok) {
                    sessionStorage.setItem('vivie_pw_verified', '1');
                    onUnlock();
                } else {
                    setError(result.reason || 'パスワードが正しくありません');
                }
            };

            return (
                <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#f0f7f3 0%,#e8f5ec 50%,#f5f0e8 100%)',padding:20}}>
                    <div style={{width:'100%',maxWidth:380,background:'white',borderRadius:24,boxShadow:'0 20px 60px rgba(0,0,0,.08)',padding:40,textAlign:'center'}}>
                        <div style={{width:64,height:64,background:'linear-gradient(135deg,#935c5b,#7a4d4c)',borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
                            <Icon name="lock" size={28} className="text-white" />
                        </div>
                        <h2 style={{fontSize:20,fontWeight:700,color:'#1a1a1a',marginBottom:4}}>パスワード入力</h2>
                        <p style={{fontSize:13,color:'#6b6b6b',marginBottom:24}}>
                            <strong>{access.name}</strong> さんのアクセスにはパスワードが必要です
                        </p>
                        <form onSubmit={handleSubmit}>
                            <input
                                type="password"
                                value={password}
                                onChange={e => setPassword(e.target.value)}
                                placeholder="パスワードを入力"
                                autoFocus
                                style={{width:'100%',padding:'12px 16px',border:'2px solid #e2e8f0',borderRadius:14,fontSize:15,outline:'none',transition:'border-color .2s',boxSizing:'border-box'}}
                                onFocus={e => e.target.style.borderColor = '#DCA9A8'}
                                onBlur={e => e.target.style.borderColor = '#e2e8f0'}
                            />
                            {error && (
                                <p style={{color:'#dc2626',fontSize:13,marginTop:8,textAlign:'left'}}>
                                    <Icon name="alert-circle" size={13} className="inline mr-1" />{error}
                                </p>
                            )}
                            <button
                                type="submit"
                                disabled={checking || !password.trim()}
                                style={{width:'100%',marginTop:16,padding:'12px',background:checking ? '#94a3b8' : 'linear-gradient(135deg,#935c5b,#7a4d4c)',color:'white',border:'none',borderRadius:14,fontSize:15,fontWeight:600,cursor:checking ? 'wait' : 'pointer',transition:'opacity .2s'}}
                            >
                                {checking ? '確認中...' : 'ログイン'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // パスワードロック付きラッパー（HooksルールのためAppと分離）
        const AppWithAuth = () => {
            const [passwordVerified, setPasswordVerified] = useState(
                !currentAccess || !currentAccess.hasPassword || sessionStorage.getItem('vivie_pw_verified') === '1'
            );

            // パスワードロック画面を表示（Appの前に判定し、Hooks順序を壊さない）
            if (currentAccess && currentAccess.hasPassword && !passwordVerified) {
                return <PasswordLockScreen access={currentAccess} onUnlock={() => setPasswordVerified(true)} />;
            }

            return <App />;
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('dashboard');
            const [selectedStore, setSelectedStore] = useState('all');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(false);

            const isStaffMode = !!currentAccess;
            const [activeStoreId, setActiveStoreId] = useState(
                isStaffMode && currentAccess.storeIds.length === 1 ? currentAccess.storeIds[0] : 'all'
            );
            // Square データ取得（店舗選択に連動、アクセス制限適用）
            const { memberData, refreshSquareData, operateSubscription } = useSquareData(
                activeStoreId,
                isStaffMode ? currentAccess.storeIds : null
            );

            // 権限のある店舗名リスト（レポートのstore名フィルタ用）
            // memberData.storesは全店舗、currentAccess.storeIdsでフィルタして名前リストを作る
            const allowedStoreNames = useMemo(() => {
                if (!isStaffMode) return null; // null = フィルタなし（全店舗表示）
                const allStores = memberData.stores || [];
                if (allStores.length === 0) return currentAccess.storeIds; // フォールバック: IDそのまま
                return currentAccess.storeIds.map(sid => {
                    const s = allStores.find(st => st.id === sid);
                    return s ? s.name : sid;
                });
            }, [isStaffMode, memberData.stores]);

            // 日報データ取得
            const { reportData, refreshReportData } = useDailyReportData();
            // 利用回数管理
            const usageHook = useMemberUsage();
            // 回数券管理
            const ticketHook = useTicketManagement();
            // QR・現金決済会員管理
            const manualMembersHook = useManualMembers();
            // 出納帳
            const cashbookHook = useCashbook();
            // マーケティング管理
            const marketingHook = useMarketingData();
            // カウンセリングデータ管理
            const counselingHook = useCounselingData();
            // LINEチャット管理
            const lineChatHook = useLineChat();

            // ダークモード切り替え
            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            // モバイルナビ: currentView変更時のみアクティブタブにスクロール
            const bottomNavRef = React.useRef(null);
            useEffect(() => {
                const el = bottomNavRef.current;
                if (!el) return;
                // 少し遅延させてDOM反映を待つ
                const timer = setTimeout(() => {
                    const active = el.querySelector('.bottom-nav-item.active');
                    if (active) {
                        const scrollLeft = active.offsetLeft - (el.offsetWidth / 2) + (active.offsetWidth / 2);
                        el.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                    }
                }, 50);
                return () => clearTimeout(timer);
            }, [currentView]);

            // プルトゥリフレッシュ
            const [pullState, setPullState] = useState({ pulling: false, refreshing: false, distance: 0 });
            const pullStartY = React.useRef(0);
            const isPulling = React.useRef(false);

            useEffect(() => {
                const THRESHOLD = 60;
                let startY = 0;

                const onTouchStart = (e) => {
                    if (window.scrollY === 0) {
                        startY = e.touches[0].clientY;
                        isPulling.current = true;
                    }
                };
                const onTouchMove = (e) => {
                    if (!isPulling.current || window.scrollY > 0) return;
                    const dist = Math.max(0, e.touches[0].clientY - startY);
                    if (dist > 10) {
                        setPullState(prev => ({ ...prev, pulling: true, distance: Math.min(dist, THRESHOLD * 1.5) }));
                    }
                };
                const onTouchEnd = () => {
                    if (!isPulling.current) return;
                    isPulling.current = false;
                    if (pullState.distance >= THRESHOLD) {
                        setPullState({ pulling: false, refreshing: true, distance: 0 });
                        Promise.all([refreshReportData(), refreshSquareData()])
                            .finally(() => {
                                setTimeout(() => setPullState({ pulling: false, refreshing: false, distance: 0 }), 600);
                            });
                    } else {
                        setPullState({ pulling: false, refreshing: false, distance: 0 });
                    }
                };

                document.addEventListener('touchstart', onTouchStart, { passive: true });
                document.addEventListener('touchmove', onTouchMove, { passive: true });
                document.addEventListener('touchend', onTouchEnd, { passive: true });
                return () => {
                    document.removeEventListener('touchstart', onTouchStart);
                    document.removeEventListener('touchmove', onTouchMove);
                    document.removeEventListener('touchend', onTouchEnd);
                };
            }, [pullState.distance, refreshReportData, refreshSquareData]);

            const navItems = [
                { id: 'dashboard', label: 'ダッシュボード', icon: 'layout-dashboard', mobileLabel: 'ホーム' },
                { id: 'reports', label: '日報一覧', icon: 'clipboard-list', mobileLabel: '日報' },
                { id: 'members', label: '会員管理', icon: 'users', mobileLabel: '会員' },
                { id: 'cashbook', label: '出納帳', icon: 'book-open', mobileLabel: '出納帳' },
                { id: 'usage', label: '利用管理', icon: 'clipboard-check', mobileLabel: '利用' },
                { id: 'tickets', label: '回数券', icon: 'ticket', mobileLabel: '回数券' },
                { id: 'counseling', label: 'カウンセリング', icon: 'heart-handshake', mobileLabel: '案内' },
                { id: 'treatment-report', label: '施術レポート', icon: 'file-heart', mobileLabel: 'レポ' },
                { id: 'skin-analysis', label: '肌分析', icon: 'scan', mobileLabel: '肌分析' },
                { id: 'small-face', label: '小顔診断', icon: 'hexagon', mobileLabel: '小顔' },
                { id: 'pore-analysis', label: '毛穴診断', icon: 'maximize-2', mobileLabel: '毛穴' },
                { id: 'line', label: 'LINEチャット', icon: 'message-circle', mobileLabel: 'LINE' },
                ...(!isStaffMode || (currentAccess && currentAccess.role === 'headquarter') ? [{ id: 'marketing', label: 'マーケティング', icon: 'megaphone', mobileLabel: '広告' }] : []),
                ...(!isStaffMode ? [{ id: 'settings', label: '設定', icon: 'settings', mobileLabel: '設定' }] : []),
            ];

            const renderView = () => {
                switch (currentView) {
                    case 'dashboard':
                        return <DashboardView
                            memberData={memberData}
                            reportData={reportData}
                            selectedStore={selectedStore}
                            setSelectedStore={setSelectedStore}
                            allowedStoreNames={allowedStoreNames}
                        />;
                    case 'reports':
                        return <DailyReportListView reportData={reportData} allowedStoreNames={allowedStoreNames} />;
                    case 'members':
                        return <MemberManagementView memberData={memberData} refreshSquareData={refreshSquareData} operateSubscription={operateSubscription} activeStoreId={activeStoreId} manualMembersHook={manualMembersHook} />;
                    case 'cashbook':
                        return <CashbookView cashbookHook={cashbookHook} memberData={memberData} manualMembersHook={manualMembersHook} activeStoreId={activeStoreId} squareData={memberData} />;
                    case 'usage':
                        return <MemberUsageView memberData={memberData} usageHook={usageHook} />;
                    case 'tickets':
                        return <TicketManagementView ticketHook={ticketHook} />;
                    case 'counseling':
                        return <ConceptFormView counselingHook={counselingHook} activeStoreId={activeStoreId} memberData={memberData} />;
                    case 'treatment-report':
                        return <TreatmentReportView lineChatHook={lineChatHook} />;
                    case 'skin-analysis':
                        return <SkinAnalyzerView />;
                    case 'small-face':
                        return <SmallFaceDiagnosisView />;
                    case 'pore-analysis':
                        return <PoreDiagnosisView />;
                    case 'line':
                        return <LineChatView lineChatHook={lineChatHook} />;
                    case 'marketing':
                        // マーケティングは本部のみアクセス可
                        if (isStaffMode && (!currentAccess || currentAccess.role !== 'headquarter')) {
                            return <DashboardView memberData={memberData} reportData={reportData} selectedStore={selectedStore} setSelectedStore={setSelectedStore} allowedStoreNames={allowedStoreNames} />;
                        }
                        return <MarketingView marketingHook={marketingHook} />;
                    case 'settings':
                        return isStaffMode
                            ? <DashboardView memberData={memberData} reportData={reportData} selectedStore={selectedStore} setSelectedStore={setSelectedStore} allowedStoreNames={allowedStoreNames} />
                            : <SettingsView onSettingsSaved={() => { refreshReportData(); }} />;
                    default:
                        return <DashboardView
                            memberData={memberData}
                            reportData={reportData}
                            selectedStore={selectedStore}
                            setSelectedStore={setSelectedStore}
                            allowedStoreNames={allowedStoreNames}
                        />;
                }
            };

            const isFullscreenView = currentView === 'counseling' || currentView === 'treatment-report';

            return (
                <div className="min-h-screen bg-slate-50 bg-mesh relative">
                    {/* トースト通知 */}
                    <ToastContainer />
                    {/* トップローディングバー */}
                    <div className={`top-loading-bar ${memberData.loading || reportData.loading ? 'active' : ''}`}></div>
                    {/* 背景装飾オーブ */}
                    <div className="bg-orb bg-orb-1"></div>
                    <div className="bg-orb bg-orb-2"></div>
                    <div className="bg-orb bg-orb-3"></div>

                    {/* Header */}
                    <header className="fixed top-0 left-0 right-0 z-50 glass-panel safe-top">
                        <div className="flex items-center justify-between px-4 md:px-5 h-14 md:h-16">
                            <div className="flex items-center">
                                {isFullscreenView ? (
                                    <button
                                        onClick={() => setCurrentView('dashboard')}
                                        className="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-vivie-100 border border-vivie-300 hover:bg-vivie-200 mr-1 transition-colors active:scale-90 shadow-sm"
                                    >
                                        <Icon name="arrow-left" size={16} className="text-vivie-700" />
                                        <span className="text-sm font-medium text-vivie-700">戻る</span>
                                    </button>
                                ) : (
                                    <button
                                        onClick={() => setIsSidebarOpen(!isSidebarOpen)}
                                        className="lg:hidden p-2.5 rounded-xl hover:bg-vivie-50 mr-1 transition-colors active:scale-90"
                                    >
                                    <Icon name={isSidebarOpen ? "x" : "menu"} size={20} />
                                </button>
                                )}
                                <div className="flex items-center">
                                    <div className="w-8 h-8 md:w-9 md:h-9 rounded-xl overflow-hidden shadow-lg shadow-vivie-500/30 animate-glow-pulse flex-shrink-0">
                                        <img
                                            src="./images/logo.png"
                                            alt="vivie"
                                            className="w-full h-full object-contain"
                                            onError={(e) => {
                                                e.target.style.display = 'none';
                                                e.target.parentElement.classList.add('bg-gradient-to-br', 'from-vivie-400', 'to-vivie-600', 'flex', 'items-center', 'justify-center');
                                                e.target.parentElement.innerHTML = '<span class="text-white font-extrabold text-sm">V</span>';
                                            }}
                                        />
                                    </div>
                                    <div className="ml-2.5">
                                        <h1 className="text-sm md:text-base font-extrabold tracking-wide gradient-text">vivie</h1>
                                        <p className="text-[9px] text-vivie-400 -mt-0.5 font-semibold tracking-[0.2em]">DASHBOARD</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-1">
                                {isFullscreenView ? (
                                    <span className="text-xs font-semibold text-vivie-500 px-3 py-1.5 bg-vivie-50/80 border border-vivie-200 rounded-xl">
                                        {currentView === 'counseling' ? 'カウンセリング中' : '施術レポート作成中'}
                                    </span>
                                ) : null}
                                {/* スタッフ表示 */}
                                {!isFullscreenView && isStaffMode && (
                                    <div className="flex items-center px-2 md:px-3 py-1.5 bg-vivie-50/80 border border-vivie-200 rounded-xl hide-mobile">
                                        <Icon name={currentAccess.role === 'headquarter' ? 'building' : currentAccess.role === 'manager' ? 'shield' : 'user'} size={13} className="text-vivie-500 mr-1" />
                                        <span className="text-xs font-semibold text-vivie-700">{currentAccess.name}</span>
                                    </div>
                                )}
                                {/* 以下はフルスクリーンビュー中は非表示 */}
                                {!isFullscreenView && (
                                    <>
                                        {/* 店舗セレクター */}
                                        {(() => {
                                            const visibleStores = isStaffMode
                                                ? (memberData.stores || []).filter(s => currentAccess.storeIds.includes(s.id))
                                                : (memberData.stores || []);
                                            return visibleStores.length > 1 ? (
                                                <select
                                                    value={activeStoreId}
                                                    onChange={(e) => setActiveStoreId(e.target.value)}
                                                    className="px-2 md:px-3 py-1.5 border border-vivie-200 rounded-xl text-xs font-semibold focus:border-vivie-400 focus:ring-2 focus:ring-vivie-400/20 outline-none bg-vivie-50/60 text-vivie-700"
                                                >
                                                    <option value="all">全店舗</option>
                                                    {visibleStores.map(s => (
                                                        <option key={s.id} value={s.id}>{s.name}</option>
                                                    ))}
                                                </select>
                                            ) : null;
                                        })()}
                                        <button
                                            onClick={(e) => {
                                                const icon = e.currentTarget.querySelector('svg');
                                                if (icon) { icon.style.animation = 'spin 0.6s ease'; setTimeout(() => icon.style.animation = '', 600); }
                                                refreshReportData(); refreshSquareData();
                                                showToast('データを更新中...', 'info', 2000);
                                            }}
                                            className="p-2.5 rounded-xl hover:bg-vivie-50 text-slate-400 hover:text-vivie-600 transition-all active:scale-90"
                                            title="データ更新"
                                        >
                                            <Icon name="refresh-cw" size={18} />
                                        </button>
                                        <button
                                            onClick={() => {
                                                setIsDarkMode(!isDarkMode);
                                                showToast(isDarkMode ? 'ライトモードに切り替えました' : 'ダークモードに切り替えました', 'info', 1500);
                                            }}
                                            className="p-2.5 rounded-xl hover:bg-vivie-50 text-slate-400 hover:text-vivie-600 transition-all active:scale-90 hide-mobile"
                                            title="ダークモード切り替え"
                                        >
                                            <Icon name={isDarkMode ? 'sun' : 'moon'} size={18} />
                                        </button>
                                    </>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* プルトゥリフレッシュ インジケーター */}
                    <div className={`pull-indicator ${pullState.pulling ? 'visible' : ''} ${pullState.refreshing ? 'refreshing' : ''}`}
                        style={pullState.pulling ? {transform: `translateX(-50%) translateY(${Math.min(pullState.distance * 0.3, 18)}px)`, opacity: Math.min(pullState.distance / 60, 1)} : undefined}>
                        <div className={`w-9 h-9 rounded-full bg-white shadow-lg border border-vivie-200 flex items-center justify-center ${pullState.refreshing ? 'animate-spin' : ''}`}>
                            <Icon name={pullState.refreshing ? 'loader' : 'arrow-down'} size={16} className="text-vivie-500"
                                style={!pullState.refreshing ? {transform: `rotate(${Math.min(pullState.distance / 60 * 180, 180)}deg)`, transition: 'transform 0.1s'} : undefined} />
                        </div>
                    </div>

                    {/* Sidebar Overlay (Mobile) */}
                    {isSidebarOpen && !isFullscreenView && (
                        <div
                            className="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 lg:hidden animate-fade-in"
                            onClick={() => setIsSidebarOpen(false)}
                        ></div>
                    )}

                    {/* Sidebar (Desktop) - カウンセリング中は非表示 */}
                    <aside className={`fixed top-14 md:top-16 left-0 bottom-0 w-56 glass-panel z-40 transform transition-transform duration-300 ease-out ${isFullscreenView ? '-translate-x-full' : 'lg:translate-x-0'} ${isSidebarOpen && !isFullscreenView ? 'translate-x-0' : '-translate-x-full'}`}>
                        <nav className="p-3 space-y-0.5 mt-2">
                            {navItems.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => {
                                        setCurrentView(item.id);
                                        setIsSidebarOpen(false);
                                        window.scrollTo({ top: 0, behavior: 'smooth' });
                                    }}
                                    className={`w-full flex items-center px-4 py-2.5 rounded-xl text-left text-sm font-semibold transition-all duration-200 ${
                                        currentView === item.id
                                            ? 'bg-gradient-to-r from-vivie-500 to-vivie-600 text-white shadow-lg shadow-vivie-500/25 scale-[1.02]'
                                            : 'text-slate-500 hover:bg-vivie-50 hover:text-vivie-700 active:scale-[0.97]'
                                    }`}
                                >
                                    <Icon name={item.icon} size={18} className="mr-3" />
                                    {item.label}
                                </button>
                            ))}
                        </nav>

                        <div className="absolute bottom-0 left-0 right-0 p-4 border-t border-slate-200/30">
                            {isStaffMode && (
                                <div className="flex items-center mb-2 px-1">
                                    <div className={`w-7 h-7 rounded-lg flex items-center justify-center ${currentAccess.role === 'headquarter' ? 'bg-violet-50 text-violet-500' : currentAccess.role === 'manager' ? 'bg-amber-50 text-amber-500' : 'bg-vivie-50 text-vivie-500'}`}>
                                        <Icon name={currentAccess.role === 'headquarter' ? 'building' : currentAccess.role === 'manager' ? 'shield' : 'user'} size={14} />
                                    </div>
                                    <div className="ml-2">
                                        <p className="text-xs font-semibold text-slate-700 leading-tight">{currentAccess.name}</p>
                                        <p className="text-[10px] text-slate-400">
                                            {currentAccess.role === 'headquarter' ? '本部' : currentAccess.role === 'manager' ? '店舗責任者' : 'スタッフ'}
                                        </p>
                                    </div>
                                </div>
                            )}
                            <p className="text-[10px] text-slate-400 tracking-wider font-medium">
                                LAST UPDATE: {reportData.lastUpdated
                                    ? reportData.lastUpdated.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
                                    : '--:--'
                                }
                            </p>
                        </div>
                    </aside>

                    {/* Bottom Navigation (Mobile) - カウンセリング中は非表示 */}
                    <nav className="bottom-nav hide-desktop" style={isFullscreenView ? {display:'none'} : undefined}>
                        <div
                            ref={bottomNavRef}
                            className="flex overflow-x-auto"
                            style={{scrollbarWidth: 'none', msOverflowStyle: 'none', WebkitOverflowScrolling: 'touch', scrollSnapType: 'x proximity'}}
                        >
                            <style>{`.bottom-nav div::-webkit-scrollbar { display: none; }`}</style>
                            {navItems.map((item) => (
                                <button
                                    key={item.id}
                                    onClick={() => { setCurrentView(item.id); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                                    className={`bottom-nav-item ${currentView === item.id ? 'active' : ''}`}
                                >
                                    <span className="nav-icon-wrap transition-all duration-300">
                                        <Icon name={item.icon} size={20} />
                                    </span>
                                    <span className="mt-0.5 transition-all duration-200" style={{fontSize: '10px', fontWeight: currentView === item.id ? 700 : 500, letterSpacing: currentView === item.id ? '0.02em' : '0'}}>{item.mobileLabel}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className={`pt-14 md:pt-16 min-h-screen relative z-10 transition-all duration-300 ${isFullscreenView ? '' : 'lg:pl-56'}`}>
                        <div className={`${isFullscreenView ? 'p-0' : 'px-3 py-2 md:p-5 lg:p-8'} max-w-7xl mx-auto ${isFullscreenView ? 'pb-4' : 'pb-24 md:pb-8'}`}>
                            <ViewTransition viewKey={currentView}>
                                {renderView()}
                            </ViewTransition>
                        </div>
                    </main>
                </div>
            );
        };

        // アプリケーションのレンダリング
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppWithAuth />);
    </script>
</body>
</html>
