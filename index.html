                        const categories = ['挨拶', '営業時間', '料金', 'キャンセル', 'お礼', 'その他'];

                        const handleSave = async () => {
                            if (!tmplName.trim() || !tmplContent.trim()) return;
                            const data = editTmpl
                                ? { action: 'update', templateId: editTmpl.templateId, name: tmplName, category: tmplCategory, messageContent: tmplContent }
                                : { action: 'create', name: tmplName, category: tmplCategory, messageContent: tmplContent };
                            const ok = await saveTemplate(data);
                            if (ok) { setShowForm(false); setEditTmpl(null); setTmplName(''); setTmplCategory(''); setTmplContent(''); showToast('保存しました', 'success'); }
                        };
                        const handleEdit = (t) => { setEditTmpl(t); setTmplName(t.name); setTmplCategory(t.category); setTmplContent(t.messageContent); setShowForm(true); };
                        const handleDelete = async (t) => { await saveTemplate({ action: 'delete', templateId: t.templateId }); showToast('削除しました', 'success'); };

                        return (
                            <div>
                                {tabHeader}
                                <div className="flex items-center justify-between mb-3">
                                    <h3 className="text-sm font-bold text-slate-700">テンプレート一覧</h3>
                                    <button onClick={() => { setShowForm(!showForm); setEditTmpl(null); setTmplName(''); setTmplCategory(''); setTmplContent(''); }}
                                        className="px-3 py-1.5 rounded-lg bg-green-500 text-white text-xs font-semibold hover:bg-green-600 transition-all">
                                        {showForm ? 'キャンセル' : '+ 新規作成'}
                                    </button>
                                </div>
                                {showForm && (
                                    <div className="bg-white rounded-2xl border border-slate-100 p-4 mb-4">
                                        <input value={tmplName} onChange={e => setTmplName(e.target.value)} placeholder="テンプレート名"
                                            className="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-green-500/30" />
                                        <select value={tmplCategory} onChange={e => setTmplCategory(e.target.value)}
                                            className="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-green-500/30">
                                            <option value="">カテゴリ選択</option>
                                            {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <textarea value={tmplContent} onChange={e => setTmplContent(e.target.value)} placeholder="メッセージ内容"
                                            rows={4} className="w-full resize-none rounded-xl border border-slate-200 px-3 py-2 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-green-500/30" />
                                        <button onClick={handleSave} disabled={!tmplName.trim() || !tmplContent.trim()}
                                            className="w-full py-2 rounded-xl bg-green-500 text-white text-sm font-semibold hover:bg-green-600 disabled:opacity-40 transition-all">
                                            {editTmpl ? '更新する' : '保存する'}
                                        </button>
                                    </div>
                                )}
                                {templates.length === 0 && !showForm ? (
                                    <p className="text-xs text-slate-400 text-center py-8">テンプレートがありません</p>
                                ) : (
                                    <div className="space-y-2">
                                        {templates.map(t => (
                                            <div key={t.templateId} className="bg-white rounded-xl border border-slate-100 p-3">
                                                <div className="flex items-center justify-between mb-1">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-sm font-semibold text-slate-700">{t.name}</span>
                                                        {t.category && <span className="text-[10px] px-2 py-0.5 rounded-full bg-green-50 text-green-600">{t.category}</span>}
                                                    </div>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => handleEdit(t)} className="p-1 rounded hover:bg-slate-100"><Icon name="edit-2" size={14} className="text-slate-400" /></button>
                                                        <button onClick={() => handleDelete(t)} className="p-1 rounded hover:bg-red-50"><Icon name="trash-2" size={14} className="text-red-400" /></button>
                                                    </div>
                                                </div>
                                                <p className="text-xs text-slate-500 line-clamp-2">{t.messageContent}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        );
                    };
                    return <TemplateTab />;
                }

                // === 自動応答タブ ===
                if (lineTab === 'autoreply') {
                    const AutoReplyTab = () => {
                        const [showForm, setShowForm] = useState(false);
                        const [editRule, setEditRule] = useState(null);
                        const [keyword, setKeyword] = useState('');
                        const [matchMethod, setMatchMethod] = useState('contains');
                        const [replyContent, setReplyContent] = useState('');
                        const [priority, setPriority] = useState(0);

                        const handleSave = async () => {
                            if (!keyword.trim() || !replyContent.trim()) return;
                            const data = editRule
                                ? { action: 'update', ruleId: editRule.ruleId, keyword, matchMethod, replyContent, priority: Number(priority) }
                                : { action: 'create', keyword, matchMethod, replyContent, priority: Number(priority) };
                            const ok = await saveAutoReply(data);
                            if (ok) { setShowForm(false); setEditRule(null); setKeyword(''); setMatchMethod('contains'); setReplyContent(''); setPriority(0); showToast('保存しました', 'success'); }
                        };
                        const handleEdit = (r) => { setEditRule(r); setKeyword(r.keyword); setMatchMethod(r.matchMethod); setReplyContent(r.replyContent); setPriority(r.priority); setShowForm(true); };
                        const handleDelete = async (r) => { await saveAutoReply({ action: 'delete', ruleId: r.ruleId }); showToast('削除しました', 'success'); };
                        const handleToggle = async (r) => { await saveAutoReply({ action: 'update', ruleId: r.ruleId, keyword: r.keyword, matchMethod: r.matchMethod, replyContent: r.replyContent, priority: r.priority, enabled: !r.enabled }); };

                        return (
                            <div>
                                {tabHeader}
                                <div className="flex items-center justify-between mb-3">
                                    <div>
                                        <h3 className="text-sm font-bold text-slate-700">自動応答ルール</h3>
                                        <p className="text-[10px] text-slate-400 mt-0.5">キーワードに一致するメッセージに自動返信します</p>
                                    </div>
                                    <button onClick={() => { setShowForm(!showForm); setEditRule(null); setKeyword(''); setMatchMethod('contains'); setReplyContent(''); setPriority(0); }}
                                        className="px-3 py-1.5 rounded-lg bg-green-500 text-white text-xs font-semibold hover:bg-green-600 transition-all">
                                        {showForm ? 'キャンセル' : '+ 新規作成'}
                                    </button>
                                </div>
                                {showForm && (
                                    <div className="bg-white rounded-2xl border border-slate-100 p-4 mb-4">
                                        <div className="grid grid-cols-2 gap-2 mb-2">
                                            <input value={keyword} onChange={e => setKeyword(e.target.value)} placeholder="キーワード（例: 営業時間）"
                                                className="rounded-xl border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500/30" />
                                            <select value={matchMethod} onChange={e => setMatchMethod(e.target.value)}
                                                className="rounded-xl border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500/30">
                                                <option value="contains">部分一致</option>
                                                <option value="exact">完全一致</option>
                                                <option value="regex">正規表現</option>
                                            </select>
                                        </div>
                                        <textarea value={replyContent} onChange={e => setReplyContent(e.target.value)} placeholder="自動返信メッセージ"
                                            rows={3} className="w-full resize-none rounded-xl border border-slate-200 px-3 py-2 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-green-500/30" />
                                        <div className="flex items-center gap-2 mb-3">
                                            <label className="text-xs text-slate-500">優先度:</label>
                                            <input type="number" value={priority} onChange={e => setPriority(e.target.value)} min={0} max={100}
                                                className="w-20 rounded-lg border border-slate-200 px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-green-500/30" />
                                            <span className="text-[10px] text-slate-400">（数値が大きいほど優先）</span>
                                        </div>
                                        <button onClick={handleSave} disabled={!keyword.trim() || !replyContent.trim()}
                                            className="w-full py-2 rounded-xl bg-green-500 text-white text-sm font-semibold hover:bg-green-600 disabled:opacity-40 transition-all">
                                            {editRule ? '更新する' : '保存する'}
                                        </button>
                                    </div>
                                )}
                                {autoReplies.length === 0 && !showForm ? (
                                    <p className="text-xs text-slate-400 text-center py-8">自動応答ルールがありません</p>
                                ) : (
                                    <div className="space-y-2">
                                        {autoReplies.map(r => (
                                            <div key={r.ruleId} className={`bg-white rounded-xl border p-3 ${r.enabled ? 'border-slate-100' : 'border-slate-100 opacity-50'}`}>
                                                <div className="flex items-center justify-between mb-1">
                                                    <div className="flex items-center gap-2">
                                                        <button onClick={() => handleToggle(r)} className={`w-8 h-5 rounded-full transition-colors ${r.enabled ? 'bg-green-500' : 'bg-slate-300'}`}>
                                                            <div className={`w-3.5 h-3.5 rounded-full bg-white shadow-sm transition-transform ${r.enabled ? 'translate-x-3.5' : 'translate-x-0.5'}`} />
                                                        </button>
                                                        <span className="text-sm font-semibold text-slate-700">「{r.keyword}」</span>
                                                        <span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-500">
                                                            {r.matchMethod === 'exact' ? '完全一致' : r.matchMethod === 'regex' ? '正規表現' : '部分一致'}
                                                        </span>
                                                    </div>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => handleEdit(r)} className="p-1 rounded hover:bg-slate-100"><Icon name="edit-2" size={14} className="text-slate-400" /></button>
                                                        <button onClick={() => handleDelete(r)} className="p-1 rounded hover:bg-red-50"><Icon name="trash-2" size={14} className="text-red-400" /></button>
                                                    </div>
                                                </div>
                                                <p className="text-xs text-slate-500 line-clamp-2 ml-10">{r.replyContent}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        );
                    };
                    return <AutoReplyTab />;
                }

                // === 分析タブ ===
                if (lineTab === 'analytics') {
                    return (
                        <div>
                            {tabHeader}
                            {!analytics ? (
                                <div className="flex items-center justify-center py-12">
                                    <Icon name="loader" size={24} className="text-green-500 animate-spin" />
                                </div>
                            ) : (
                                <div>
                                    {/* 統計カード */}
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                                        {[
                                            { label: '受信メッセージ（7日）', value: analytics.last7Days?.received || 0, icon: 'inbox', color: 'green' },
                                            { label: '送信メッセージ（7日）', value: analytics.last7Days?.sent || 0, icon: 'send', color: 'blue' },
                                            { label: 'ユニークユーザー', value: analytics.uniqueUsers || 0, icon: 'users', color: 'purple' },
                                            { label: '友だち追加', value: analytics.follows || 0, icon: 'user-plus', color: 'green' },
                                        ].map((s, i) => (
                                            <div key={i} className="bg-white rounded-xl border border-slate-100 p-3">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <Icon name={s.icon} size={14} className={`text-${s.color}-500`} />
                                                    <span className="text-[10px] text-slate-400">{s.label}</span>
                                                </div>
                                                <p className="text-xl font-bold text-slate-800">{s.value.toLocaleString()}</p>
                                            </div>
                                        ))}
                                    </div>
                                    {/* 30日メッセージ推移 */}
                                    {analytics.dailyStats && analytics.dailyStats.length > 0 && (
                                        <div className="bg-white rounded-2xl border border-slate-100 p-4 mb-4">
                                            <h3 className="text-sm font-bold text-slate-700 mb-3">過去30日 メッセージ推移</h3>
                                            <div style={{width:'100%',height:200}}>
                                                <Recharts.ResponsiveContainer>
                                                    <Recharts.BarChart data={analytics.dailyStats}>
                                                        <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
                                                        <Recharts.XAxis dataKey="date" tick={{fontSize:10}} tickFormatter={v => v.slice(5)} />
                                                        <Recharts.YAxis tick={{fontSize:10}} />
                                                        <Recharts.Tooltip />
                                                        <Recharts.Bar dataKey="received" name="受信" fill="#06C755" radius={[2,2,0,0]} />
                                                        <Recharts.Bar dataKey="sent" name="送信" fill="#3b82f6" radius={[2,2,0,0]} />
                                                    </Recharts.BarChart>
                                                </Recharts.ResponsiveContainer>
                                            </div>
                                        </div>
                                    )}
                                    {/* 時間帯別 */}
                                    {analytics.hourlyStats && analytics.hourlyStats.length > 0 && (
                                        <div className="bg-white rounded-2xl border border-slate-100 p-4">
                                            <h3 className="text-sm font-bold text-slate-700 mb-3">時間帯別 メッセージ分布</h3>
                                            <div style={{width:'100%',height:180}}>
                                                <Recharts.ResponsiveContainer>
                                                    <Recharts.BarChart data={analytics.hourlyStats}>
                                                        <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" />
                                                        <Recharts.XAxis dataKey="hour" tick={{fontSize:10}} tickFormatter={v => v + '時'} />
                                                        <Recharts.YAxis tick={{fontSize:10}} />
                                                        <Recharts.Tooltip />
                                                        <Recharts.Bar dataKey="received" name="受信" fill="#06C755" radius={[2,2,0,0]} />
                                                    </Recharts.BarChart>
                                                </Recharts.ResponsiveContainer>
                                            </div>
                                        </div>
                                    )}
                                    {/* 累計 */}
                                    <div className="grid grid-cols-3 gap-3 mt-4">
                                        <div className="bg-white rounded-xl border border-slate-100 p-3 text-center">
                                            <p className="text-[10px] text-slate-400">累計受信</p>
                                            <p className="text-lg font-bold text-slate-800">{(analytics.total?.received || 0).toLocaleString()}</p>
                                        </div>
                                        <div className="bg-white rounded-xl border border-slate-100 p-3 text-center">
                                            <p className="text-[10px] text-slate-400">累計送信</p>
                                            <p className="text-lg font-bold text-slate-800">{(analytics.total?.sent || 0).toLocaleString()}</p>
                                        </div>
                                        <div className="bg-white rounded-xl border border-slate-100 p-3 text-center">
                                            <p className="text-[10px] text-slate-400">ブロック</p>
                                            <p className="text-lg font-bold text-red-500">{(analytics.unfollows || 0).toLocaleString()}</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }
            }

            // === チャットタブ ===
            // スレッド選択中 → チャット画面
            if (selectedThread) {
                const profile = profiles[selectedThread.userId] || {};
                const displayName = profile.displayName || selectedThread.userId.slice(0, 8) + '...';

                return (
                    <div className="flex flex-col h-[calc(100vh-8rem)] md:h-[calc(100vh-7rem)]">
                        {/* チャットヘッダー */}
                        <div className="flex items-center gap-3 p-3 border-b border-slate-200 bg-white rounded-t-2xl">
                            <button
                                onClick={() => { setSelectedThread(null); fetchThreads(lineStoreId); }}
                                className="flex items-center gap-1 px-2.5 py-1.5 rounded-xl hover:bg-slate-100 transition-colors active:scale-95 text-slate-600"
                            >
                                <Icon name="arrow-left" size={18} />
                                <span className="text-xs font-semibold">戻る</span>
                            </button>
                            {profile.pictureUrl ? (
                                <img src={profile.pictureUrl} alt="" className="w-10 h-10 rounded-full object-cover" />
                            ) : (
                                <div className="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center">
                                    <Icon name="user" size={20} className="text-green-600" />
                                </div>
                            )}
                            <div className="flex-1 min-w-0">
                                <p className="font-semibold text-slate-800 truncate">{displayName}</p>
                                <p className="text-xs text-slate-400">
                                    {lineConfig.stores.find(s => s.id === lineStoreId)?.name || ''}
                                </p>
                            </div>
                            <button
                                onClick={() => fetchMessages(selectedThread.userId)}
                                className="p-2 rounded-xl hover:bg-slate-100 transition-colors"
                                title="更新"
                            >
                                <Icon name="refresh-cw" size={18} className={`text-slate-400 ${loading ? 'animate-spin' : ''}`} />
                            </button>
                        </div>

                        {/* メッセージ一覧 */}
                        <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                            {messages.length === 0 && !loading && (
                                <p className="text-center text-slate-400 text-sm py-8">メッセージはありません</p>
                            )}
                            {messages.map((msg, idx) => (
                                <div key={idx} className={`flex ${msg.direction === 'sent' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[75%] ${msg.direction === 'sent'
                                        ? 'bg-green-500 text-white rounded-2xl rounded-br-md'
                                        : 'bg-white text-slate-800 rounded-2xl rounded-bl-md shadow-sm border border-slate-100'
                                    } px-4 py-2.5`}>
                                        {msg.messageType === 'follow' || msg.messageType === 'unfollow' ? (
                                            <p className="text-xs text-center italic opacity-70">{msg.messageText}</p>
                                        ) : (
                                            <p className="text-sm whitespace-pre-wrap break-words">{msg.messageText}</p>
                                        )}
                                        <p className={`text-[10px] mt-1 ${msg.direction === 'sent' ? 'text-green-100' : 'text-slate-400'} text-right`}>
                                            {formatTime(msg.timestamp)}
                                        </p>
                                    </div>
                                </div>
                            ))}
                            <div ref={messagesEndRef} />
                        </div>

                        {/* テンプレート選択パネル */}
                        {showTemplatePanel && templates.length > 0 && (
                            <div className="border-t border-slate-100 bg-white p-2 max-h-40 overflow-y-auto">
                                <div className="grid grid-cols-2 gap-1">
                                    {templates.map(t => (
                                        <button key={t.templateId} onClick={() => { setInputText(t.messageContent); setShowTemplatePanel(false); }}
                                            className="text-left p-2 rounded-lg hover:bg-green-50 transition-colors">
                                            <p className="text-xs font-semibold text-slate-700 truncate">{t.name}</p>
                                            <p className="text-[10px] text-slate-400 truncate">{t.messageContent}</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                        {/* 入力エリア */}
                        <div className="p-3 border-t border-slate-200 bg-white rounded-b-2xl">
                            <div className="flex gap-2 items-end">
                                <button onClick={() => { if (!templates.length) fetchTemplates(); setShowTemplatePanel(!showTemplatePanel); }}
                                    className="p-2.5 rounded-xl hover:bg-slate-100 transition-colors" title="テンプレート">
                                    <Icon name="file-text" size={20} className="text-slate-400" />
                                </button>
                                <textarea
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    onKeyDown={handleKeyDown}
                                    placeholder="メッセージを入力..."
                                    rows={1}
                                    className="flex-1 resize-none rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500/30 focus:border-green-400 transition-all"
                                    style={{ maxHeight: '120px' }}
                                    onInput={(e) => {
                                        e.target.style.height = 'auto';
                                        e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
                                    }}
                                />
                                <button
                                    onClick={handleSend}
                                    disabled={!inputText.trim() || sending}
                                    className="p-2.5 rounded-xl bg-green-500 text-white hover:bg-green-600 disabled:opacity-40 disabled:cursor-not-allowed transition-all active:scale-90 shadow-sm"
                                >
                                    <Icon name={sending ? 'loader' : 'send'} size={20} className={sending ? 'animate-spin' : ''} />
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // スレッド一覧（chatタブのデフォルト画面）
            // Note: this is reached when lineTab === 'chat' && !selectedThread
            // tabHeader is already rendered above by the if block
            return (
                <div>
                    {/* ヘッダー */}
                    <div className="flex items-center justify-between mb-3">
                        <div>
                            <h2 className="text-xl font-bold text-slate-800">LINE</h2>
                            <p className="text-xs text-slate-500 mt-0.5">{lineConfig.stores.find(s => s.id === lineStoreId)?.name || ''}</p>
                        </div>
                        <button onClick={() => fetchThreads(lineStoreId)}
                            className="p-2.5 rounded-xl hover:bg-slate-100 transition-colors">
                            <Icon name="refresh-cw" size={18} className={`text-slate-400 ${loading ? 'animate-spin' : ''}`} />
                        </button>
                    </div>
                    {/* タブナビゲーション */}
                    <div className="flex gap-1 overflow-x-auto pb-1 mb-4" style={{scrollbarWidth: 'none'}}>
                        {[
                            { id: 'chat', label: 'チャット', icon: 'message-circle' },
                            { id: 'broadcast', label: '一斉配信', icon: 'send' },
                            { id: 'templates', label: 'テンプレート', icon: 'file-text' },
                            { id: 'autoreply', label: '自動応答', icon: 'zap' },
                            { id: 'analytics', label: '分析', icon: 'bar-chart-2' },
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setLineTab(tab.id)}
                                className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-semibold whitespace-nowrap transition-all ${
                                    lineTab === tab.id ? 'bg-green-500 text-white shadow-md shadow-green-500/20' : 'text-slate-500 hover:bg-green-50'
                                }`}>
                                <Icon name={tab.icon} size={14} />
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    {/* 店舗選択 */}
                    {lineConfig.stores.length > 1 && (
                        <div className="flex gap-2 mb-4 overflow-x-auto pb-1" style={{scrollbarWidth: 'none'}}>
                            {lineConfig.stores.map(store => (
                                <button
                                    key={store.id}
                                    onClick={() => setLineStoreId(store.id)}
                                    className={`px-4 py-2 rounded-xl text-sm font-semibold whitespace-nowrap transition-all ${
                                        lineStoreId === store.id
                                            ? 'bg-green-500 text-white shadow-md shadow-green-500/20'
                                            : 'bg-white text-slate-600 hover:bg-green-50 border border-slate-200'
                                    }`}
                                >
                                    {store.name}
                                </button>
                            ))}
                        </div>
                    )}

                    {/* GAS接続ステータス */}
                    {gasStatus !== 'checking' && (
                        <div className={`flex items-center gap-2 px-3 py-2 rounded-xl mb-3 text-xs ${
                            gasStatus === 'connected'
                                ? 'bg-green-50 text-green-700'
                                : 'bg-red-50 text-red-700'
                        }`}>
                            <span className={`w-2 h-2 rounded-full flex-shrink-0 ${
                                gasStatus === 'connected' ? 'bg-green-500' : 'bg-red-500'
                            }`}></span>
                            {gasStatus === 'connected' ? (
                                <span>GAS接続OK — メッセージ {threads.length} 件</span>
                            ) : (
                                <div>
                                    <span className="font-semibold">GAS接続エラー</span>
                                    {gasError && <span className="ml-1">— {gasError}</span>}
                                    <p className="mt-0.5 text-[10px] opacity-75">GASを最新のunified.gsで再デプロイしてください</p>
                                </div>
                            )}
                        </div>
                    )}
                    {gasStatus === 'checking' && loading && (
                        <div className="flex items-center gap-2 px-3 py-2 rounded-xl mb-3 text-xs bg-slate-50 text-slate-500">
                            <Icon name="loader" size={12} className="animate-spin" />
                            <span>GAS接続を確認中...</span>
                        </div>
                    )}

                    {/* スレッド一覧 */}
                    <div className="space-y-2">
                        {loading && threads.length === 0 && gasStatus !== 'error' && (
                            <div className="flex items-center justify-center py-12">
                                <Icon name="loader" size={24} className="text-green-500 animate-spin" />
                            </div>
                        )}

                        {!loading && threads.length === 0 && gasStatus !== 'error' && (
                            <div className="text-center py-12">
                                <div className="w-14 h-14 rounded-2xl bg-green-50 flex items-center justify-center mx-auto mb-3">
                                    <Icon name="message-circle" size={28} className="text-green-400" />
                                </div>
                                <p className="text-sm text-slate-500">まだメッセージがありません</p>
                                <p className="text-xs text-slate-400 mt-1">LINEからメッセージが届くとここに表示されます</p>
                            </div>
                        )}

                        {threads.map((thread, idx) => {
                            const profile = profiles[thread.userId] || {};
                            const displayName = profile.displayName || thread.userId.slice(0, 8) + '...';
                            const lastMsg = thread.lastMessage;

                            return (
                                <button
                                    key={thread.userId + '-' + idx}
                                    onClick={() => openThread(thread)}
                                    className="w-full flex items-center gap-3 p-3 rounded-2xl bg-white hover:bg-green-50/50 border border-slate-100 hover:border-green-200 transition-all active:scale-[0.98] text-left"
                                >
                                    {profile.pictureUrl ? (
                                        <img src={profile.pictureUrl} alt="" className="w-12 h-12 rounded-full object-cover flex-shrink-0" />
                                    ) : (
                                        <div className="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center flex-shrink-0">
                                            <Icon name="user" size={22} className="text-green-600" />
                                        </div>
                                    )}
                                    <div className="flex-1 min-w-0">
                                        <div className="flex items-center justify-between">
                                            <p className="font-semibold text-slate-800 truncate">{displayName}</p>
                                            <span className="text-[10px] text-slate-400 flex-shrink-0 ml-2">
                                                {lastMsg ? formatTime(lastMsg.timestamp) : ''}
                                            </span>
                                        </div>
                                        <p className="text-xs text-slate-500 truncate mt-0.5">
                                            {lastMsg ? (lastMsg.direction === 'sent' ? '自分: ' : '') + (lastMsg.messageText || `[${lastMsg.messageType}]`) : ''}
                                        </p>
                                    </div>
                                    <Icon name="chevron-right" size={16} className="text-slate-300 flex-shrink-0" />
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const MarketingView = ({ marketingHook }) => {
            const {
                metaConfig, tiktokConfig,
                metaData, tiktokData, hpbData,
                fetchMetaInsights, fetchTiktokInsights,
                upsertHpbMonth, updateHpbSettings, deleteHpbMonth
            } = marketingHook;

            const [activeTab, setActiveTab] = useState('hpb');
            const [metaDatePreset, setMetaDatePreset] = useState('last_30d');

            // HPBフォーム
            const [hpbForm, setHpbForm] = useState({
                yearMonth: new Date().toISOString().slice(0, 7),
                pageViews: '', bookings: '', reviews: '', favorites: '', blogViews: '', coupons: ''
            });
            const [hpbEditingMonth, setHpbEditingMonth] = useState(null);

            // Meta/TikTokデータ自動取得
            useEffect(() => {
                if (activeTab === 'meta' && metaConfig.configured && !metaData.insights && !metaData.loading) {
                    fetchMetaInsights(metaDatePreset);
                }
            }, [activeTab, metaConfig.configured]);

            useEffect(() => {
                if (activeTab === 'tiktok' && tiktokConfig.configured && !tiktokData.insights && !tiktokData.loading) {
                    fetchTiktokInsights();
                }
            }, [activeTab, tiktokConfig.configured]);

            const tabs = [
                { id: 'hpb', label: 'ホットペッパー', icon: 'globe' },
                { id: 'meta', label: 'Meta広告', icon: 'facebook' },
                { id: 'tiktok', label: 'TikTok広告', icon: 'video' },
            ];

            // ====== HPBセクション ======
            const renderHpbSection = () => {
                const settings = hpbData.settings || { avgViews: 300, avgBookingRate: 2.5 };
                const monthlyData = hpbData.monthly || [];

                // 最新月のデータ
                const latestMonth = monthlyData.length > 0 ? monthlyData[monthlyData.length - 1] : null;
                const prevMonth = monthlyData.length > 1 ? monthlyData[monthlyData.length - 2] : null;

                const bookingRate = latestMonth && latestMonth.pageViews > 0
                    ? (latestMonth.bookings / latestMonth.pageViews * 100)
                    : 0;
                const viewsDiff = latestMonth ? latestMonth.pageViews - settings.avgViews : 0;
                const rateDiff = bookingRate - settings.avgBookingRate;

                const handleHpbSubmit = () => {
                    if (!hpbForm.yearMonth) return;
                    upsertHpbMonth({
                        yearMonth: hpbForm.yearMonth,
                        pageViews: parseInt(hpbForm.pageViews) || 0,
                        bookings: parseInt(hpbForm.bookings) || 0,
                        reviews: parseInt(hpbForm.reviews) || 0,
                        favorites: parseInt(hpbForm.favorites) || 0,
                        blogViews: parseInt(hpbForm.blogViews) || 0,
                        coupons: parseInt(hpbForm.coupons) || 0,
                    });
                    setHpbForm({ yearMonth: hpbForm.yearMonth, pageViews: '', bookings: '', reviews: '', favorites: '', blogViews: '', coupons: '' });
                    setHpbEditingMonth(null);
                };

                const startEdit = (m) => {
                    setHpbEditingMonth(m.yearMonth);
                    setHpbForm({
                        yearMonth: m.yearMonth,
                        pageViews: m.pageViews?.toString() || '',
                        bookings: m.bookings?.toString() || '',
                        reviews: m.reviews?.toString() || '',
                        favorites: m.favorites?.toString() || '',
                        blogViews: m.blogViews?.toString() || '',
                        coupons: m.coupons?.toString() || '',
                    });
                };

                return (
                    <div className="space-y-6">
                        {/* KPI概要 */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <KpiCard
                                title="月間PV数"
                                value={latestMonth ? latestMonth.pageViews.toLocaleString() : '-'}
                                subValue={latestMonth ? `業界平均比 ${viewsDiff >= 0 ? '+' : ''}${viewsDiff}` : ''}
                                icon="eye"
                                trend={viewsDiff >= 0 ? 'up' : 'down'}
                            />
                            <KpiCard
                                title="予約獲得数"
                                value={latestMonth ? latestMonth.bookings.toLocaleString() : '-'}
                                subValue={prevMonth ? `前月: ${prevMonth.bookings}件` : ''}
                                icon="calendar-check"
                                trend={latestMonth && prevMonth && latestMonth.bookings >= prevMonth.bookings ? 'up' : 'down'}
                            />
                            <KpiCard
                                title="予約率"
                                value={latestMonth ? `${bookingRate.toFixed(1)}%` : '-'}
                                subValue={`業界平均: ${settings.avgBookingRate}%（差: ${rateDiff >= 0 ? '+' : ''}${rateDiff.toFixed(1)}%）`}
                                icon="target"
                                trend={rateDiff >= 0 ? 'up' : 'down'}
                            />
                            <KpiCard
                                title="口コミ数"
                                value={latestMonth ? latestMonth.reviews?.toLocaleString() || '0' : '-'}
                                subValue={prevMonth ? `前月: ${prevMonth.reviews || 0}件` : ''}
                                icon="message-circle"
                                trend={latestMonth && prevMonth && (latestMonth.reviews || 0) >= (prevMonth.reviews || 0) ? 'up' : 'down'}
                            />
                        </div>

                        {/* 業界平均設定 */}
                        <Card>
                            <div className="flex items-center gap-2 mb-3">
                                <Icon name="settings" size={16} />
                                <h3 className="font-semibold text-sm">比較基準設定（業界平均）</h3>
                            </div>
                            <div className="flex flex-wrap gap-4">
                                <label className="flex items-center gap-2 text-sm">
                                    平均PV数:
                                    <input type="number" value={settings.avgViews}
                                        onChange={(e) => updateHpbSettings({ avgViews: parseInt(e.target.value) || 0 })}
                                        className="w-24 px-2 py-1 border rounded text-sm dark:bg-gray-700 dark:border-gray-600"
                                    />
                                </label>
                                <label className="flex items-center gap-2 text-sm">
                                    平均予約率(%):
                                    <input type="number" step="0.1" value={settings.avgBookingRate}
                                        onChange={(e) => updateHpbSettings({ avgBookingRate: parseFloat(e.target.value) || 0 })}
                                        className="w-24 px-2 py-1 border rounded text-sm dark:bg-gray-700 dark:border-gray-600"
                                    />
                                </label>
                            </div>
                        </Card>

                        {/* データ入力フォーム */}
                        <Card>
                            <div className="flex items-center gap-2 mb-4">
                                <Icon name="plus-circle" size={16} />
                                <h3 className="font-semibold text-sm">{hpbEditingMonth ? `${hpbEditingMonth} を編集` : '月次データ入力'}</h3>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                                <div>
                                    <label className="text-xs text-gray-500 dark:text-gray-400">対象月</label>
                                    <input type="month" value={hpbForm.yearMonth}
                                        onChange={(e) => setHpbForm(prev => ({ ...prev, yearMonth: e.target.value }))}
                                        className="w-full px-2 py-1.5 border rounded text-sm dark:bg-gray-700 dark:border-gray-600"
                                        disabled={!!hpbEditingMonth}
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 dark:text-gray-400">PV数</label>
                                    <input type="number" placeholder="例: 350" value={hpbForm.pageViews}
                                        onChange={(e) => setHpbForm(prev => ({ ...prev, pageViews: e.target.value }))}
                                        className="w-full px-2 py-1.5 border rounded text-sm dark:bg-gray-700 dark:border-gray-600"
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 dark:text-gray-400">予約数</label>
                                    <input type="number" placeholder="例: 12" value={hpbForm.bookings}
                                        onChange={(e) => setHpbForm(prev => ({ ...prev, bookings: e.target.value }))}
                                        className="w-full px-2 py-1.5 border rounded text-sm dark:bg-gray-700 dark:border-gray-600"
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 dark:text-gray-400">口コミ数</label>
                                    <input type="number" placeholder="例: 5" value={hpbForm.reviews}

                                        className="w-full px-2 py-1.5 border rounded text-sm dark:bg-gray-700 dark:border-gray-600"
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 dark:text-gray-400">お気に入り登録数</label>
                                    <input type="number" placeholder="例: 20" value={hpbForm.favorites}
                                        onChange={(e) => setHpbForm(prev => ({ ...prev, favorites: e.target.value }))}
                                        className="w-full px-2 py-1.5 border rounded text-sm dark:bg-gray-700 dark:border-gray-600"
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 dark:text-gray-400">ブログPV</label>
                                    <input type="number" placeholder="例: 100" value={hpbForm.blogViews}
                                        onChange={(e) => setHpbForm(prev => ({ ...prev, blogViews: e.target.value }))}
                                        className="w-full px-2 py-1.5 border rounded text-sm dark:bg-gray-700 dark:border-gray-600"
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-gray-500 dark:text-gray-400">クーポン利用数</label>
                                    <input type="number" placeholder="例: 8" value={hpbForm.coupons}
                                        onChange={(e) => setHpbForm(prev => ({ ...prev, coupons: e.target.value }))}
                                        className="w-full px-2 py-1.5 border rounded text-sm dark:bg-gray-700 dark:border-gray-600"
                                    />
                                </div>
                                <div className="flex items-end gap-2">
                                    <button onClick={handleHpbSubmit}
                                        className="px-4 py-1.5 bg-vivie-600 text-white rounded text-sm hover:bg-vivie-700 transition-colors">
                                        {hpbEditingMonth ? '更新' : '登録'}
                                    </button>
                                    {hpbEditingMonth && (
                                        <button onClick={() => { setHpbEditingMonth(null); setHpbForm({ yearMonth: new Date().toISOString().slice(0, 7), pageViews: '', bookings: '', reviews: '', favorites: '', blogViews: '', coupons: '' }); }}
                                            className="px-4 py-1.5 border rounded text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                            キャンセル
                                        </button>
                                    )}
                                </div>
                            </div>
                        </Card>

                        {/* トレンドテーブル */}
                        {monthlyData.length > 0 && (
                            <Card>
                                <SectionHeader icon="bar-chart-3" title="月次推移" subtitle="ホットペッパービューティー" />
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead>
                                            <tr className="border-b dark:border-gray-700">
                                                <th className="text-left py-2 px-3">月</th>
                                                <th className="text-right py-2 px-3">PV数</th>
                                                <th className="text-right py-2 px-3">予約数</th>
                                                <th className="text-right py-2 px-3">予約率</th>
                                                <th className="text-right py-2 px-3">口コミ</th>
                                                <th className="text-right py-2 px-3">お気に入り</th>
                                                <th className="text-right py-2 px-3">ブログPV</th>
                                                <th className="text-right py-2 px-3">クーポン</th>
                                                <th className="text-center py-2 px-3">操作</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {[...monthlyData].reverse().map((m) => {
                                                const rate = m.pageViews > 0 ? (m.bookings / m.pageViews * 100) : 0;
                                                const rateColor = rate >= settings.avgBookingRate ? 'text-green-600' : 'text-red-500';
                                                const pvColor = m.pageViews >= settings.avgViews ? 'text-green-600' : 'text-red-500';
                                                return (
                                                    <tr key={m.yearMonth} className="border-b dark:border-gray-700 table-row-hover">
                                                        <td className="py-2 px-3 font-medium">{m.yearMonth}</td>
                                                        <td className={`text-right py-2 px-3 font-mono ${pvColor}`}>{m.pageViews?.toLocaleString()}</td>
                                                        <td className="text-right py-2 px-3 font-mono">{m.bookings?.toLocaleString()}</td>
                                                        <td className={`text-right py-2 px-3 font-mono ${rateColor}`}>{rate.toFixed(1)}%</td>
                                                        <td className="text-right py-2 px-3 font-mono">{m.reviews || 0}</td>
                                                        <td className="text-right py-2 px-3 font-mono">{m.favorites || 0}</td>
                                                        <td className="text-right py-2 px-3 font-mono">{m.blogViews || 0}</td>
                                                        <td className="text-right py-2 px-3 font-mono">{m.coupons || 0}</td>
                                                        <td className="text-center py-2 px-3">
                                                            <div className="flex gap-1 justify-center">
                                                                <button onClick={() => startEdit(m)} className="p-1 text-vivie-600 hover:bg-vivie-50 rounded dark:hover:bg-gray-700" title="編集">
                                                                    <Icon name="pencil" size={14} />
                                                                </button>
                                                                <button onClick={() => { if (confirm(`${m.yearMonth}のデータを削除しますか？`)) deleteHpbMonth(m.yearMonth); }}
                                                                    className="p-1 text-red-500 hover:bg-red-50 rounded dark:hover:bg-gray-700" title="削除">
                                                                    <Icon name="trash-2" size={14} />
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>

                                {/* 最適化提案 */}
                                {latestMonth && (
                                    <div className="mt-4 p-4 bg-vivie-50 dark:bg-gray-800 rounded-lg">
                                        <h4 className="font-semibold text-sm mb-2 flex items-center gap-1">
                                            <Icon name="lightbulb" size={14} /> 最適化提案
                                        </h4>
                                        <ul className="text-sm space-y-1 text-gray-700 dark:text-gray-300">
                                            {bookingRate < settings.avgBookingRate && (
                                                <li>• 予約率が平均を下回っています → メニュー・クーポン構成の見直し、写真の品質向上を検討</li>
                                            )}
                                            {latestMonth.pageViews < settings.avgViews && (
                                                <li>• PV数が平均を下回っています → ブログ更新頻度UP、口コミ返信の充実を検討</li>
                                            )}
                                            {(latestMonth.reviews || 0) < 3 && (
                                                <li>• 口コミ数が少なめです → 来店後の口コミ依頼フローを強化しましょう</li>
                                            )}
                                            {bookingRate >= settings.avgBookingRate && latestMonth.pageViews >= settings.avgViews && (
                                                <li>• 良好なパフォーマンスです！現在の施策を継続しつつ、単価UPメニューの検討を</li>
                                            )}
                                        </ul>
                                    </div>
                                )}
                            </Card>
                        )}
                    </div>
                );
            };

            // ====== Meta広告セクション ======
            const renderMetaSection = () => {
                if (!metaConfig.configured) {
                    return (
                        <Card>
                            <div className="text-center py-8">
                                <Icon name="alert-circle" size={48} className="mx-auto text-gray-400 mb-4" />
                                <h3 className="text-lg font-semibold mb-2">Meta広告APIが未設定です</h3>
                                <p className="text-sm text-gray-500 mb-4">
                                    Vercelの環境変数に以下を設定してください:
                                </p>
                                <div className="bg-gray-100 dark:bg-gray-800 rounded p-3 inline-block text-left text-sm font-mono">
                                    <div>META_ACCESS_TOKEN=xxxxx</div>
                                    <div>META_AD_ACCOUNT_ID=xxxxx</div>
                                </div>
                            </div>
                        </Card>
                    );
                }

                const insights = metaData.insights;
                const spend = insights ? parseFloat(insights.spend || 0) : 0;
                const impressions = insights ? parseInt(insights.impressions || 0) : 0;
                const clicks = insights ? parseInt(insights.clicks || 0) : 0;
                const ctr = insights ? parseFloat(insights.ctr || 0) : 0;
                const conversions = insights?.actions?.find(a => a.action_type === 'offsite_conversion.fb_pixel_purchase' || a.action_type === 'lead')?.value || 0;
                const cpa = conversions > 0 ? spend / conversions : 0;
                const roas = insights?.actions?.find(a => a.action_type === 'offsite_conversion.fb_pixel_purchase')?.value
                    ? (parseFloat(insights.actions.find(a => a.action_type === 'offsite_conversion.fb_pixel_purchase').value) / spend * 100)
                    : 0;

                return (
                    <div className="space-y-6">
                        {/* 期間選択 */}
                        <div className="flex items-center gap-3">
                            <select value={metaDatePreset} onChange={(e) => { setMetaDatePreset(e.target.value); fetchMetaInsights(e.target.value); }}
                                className="px-3 py-1.5 border rounded text-sm dark:bg-gray-700 dark:border-gray-600">
                                <option value="today">今日</option>
                                <option value="yesterday">昨日</option>
                                <option value="last_7d">過去7日</option>
                                <option value="last_14d">過去14日</option>
                                <option value="last_30d">過去30日</option>
                                <option value="this_month">今月</option>
                                <option value="last_month">先月</option>
                                <option value="last_90d">過去90日</option>
                            </select>
                            <button onClick={() => fetchMetaInsights(metaDatePreset)}
                                className="px-3 py-1.5 bg-vivie-600 text-white rounded text-sm hover:bg-vivie-700 transition-colors flex items-center gap-1"
                                disabled={metaData.loading}>
                                <Icon name="refresh-cw" size={14} className={metaData.loading ? 'animate-spin' : ''} />
                                更新
                            </button>
                        </div>

                        {metaData.error && (
                            <div className="bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-3 rounded text-sm">
                                {metaData.error}
                            </div>
                        )}

                        {metaData.loading ? (
                            <div className="text-center py-8 text-gray-500">
                                <Icon name="loader" size={24} className="animate-spin mx-auto mb-2" />
                                データ取得中...
                            </div>
                        ) : insights ? (
                            <>
                                {/* KPIカード */}
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <KpiCard title="広告費" value={`¥${Math.round(spend).toLocaleString()}`} icon="credit-card" subValue="合計費用" />
                                    <KpiCard title="インプレッション" value={impressions.toLocaleString()} icon="eye" subValue={`リーチ: ${parseInt(insights.reach || 0).toLocaleString()}`} />
                                    <KpiCard title="クリック数" value={clicks.toLocaleString()} icon="mouse-pointer-click" subValue={`CTR: ${ctr.toFixed(2)}%`} trend={ctr >= 1.0 ? 'up' : 'down'} />
                                    <KpiCard title="CPA" value={cpa > 0 ? `¥${Math.round(cpa).toLocaleString()}` : '-'} icon="target" subValue={`CV数: ${conversions}`} />
                                </div>

                                {/* 詳細メトリクス */}
                                <Card>
                                    <SectionHeader icon="bar-chart-3" title="詳細指標" subtitle="Meta広告パフォーマンス" />
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 text-sm">
                                        <div className="p-3 bg-gray-50 dark:bg-gray-800 rounded">
                                            <div className="text-gray-500 text-xs">CPC (クリック単価)</div>
                                            <div className="text-lg font-bold">¥{Math.round(parseFloat(insights.cpc || 0)).toLocaleString()}</div>
                                        </div>
                                        <div className="p-3 bg-gray-50 dark:bg-gray-800 rounded">
                                            <div className="text-gray-500 text-xs">CPM (千回表示単価)</div>
                                            <div className="text-lg font-bold">¥{Math.round(parseFloat(insights.cpm || 0)).toLocaleString()}</div>
                                        </div>
                                        <div className="p-3 bg-gray-50 dark:bg-gray-800 rounded">
                                            <div className="text-gray-500 text-xs">フリクエンシー</div>
                                            <div className="text-lg font-bold">{parseFloat(insights.frequency || 0).toFixed(1)}</div>
                                        </div>
                                    </div>
                                </Card>

                                {/* キャンペーン別パフォーマンス */}
                                {metaData.campaignInsights && metaData.campaignInsights.length > 0 && (
                                    <Card>
                                        <SectionHeader icon="layers" title="キャンペーン別パフォーマンス" />
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm">
                                                <thead>

                let promptText = `あなたは高級エステサロン「vivie」の経験豊富で知識豊かなプロのエステティシャンです。\nお客様のレポートを作成するために、以下の情報と特記事項を元に2つの文章を作成してください。\n# 本日行った施術\n${todayMenuStr}\n# 出力構成と内容\n1. 「フィードバック」\n   - 【重要】「本日はご来店ありがとうございます」などの挨拶や枕詞は一切不要です。直ちに分析内容から始めてください。\n   - 測定スコアに基づいた現状の分析を簡潔に行ってください。\n   - 分析結果に基づき、次回受けるべき「vivieの提供メニュー」や「オプション」を具体的に提案し、その理由を一言添えてください。\n   - 文字数：150文字程度で簡潔に。\n2. 「ホームケア・アドバイス」\n   - 肌や骨格のプロとして、お客様が自宅で今日から実行できる具体的で簡単なケアを1つか2つに絞ってアドバイスしてください。\n   - 文字数：100文字程度で短くまとめてください。\n# vivieのメニューリスト\n${menuListText}\n# 条件\n- 語り口調：簡潔な「です・ます調」。\n- 記号：絵文字は使用禁止。\n# お客様データ\n名前: ${customerName}\nレポートタイプ: ${reportType === 'both' ? '肌診断と小顔矯正' : (reportType === 'skin' ? '肌診断' : '小顔矯正')}\n特記事項: ${aiPromptNote || 'なし'}`;

                    const response = await fetch(gasUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ prompt: promptText }) });
                    const data = await response.json();
                    if (data.status === "error") throw new Error(data.message);
                    let rawText = data.text.replace(/```json/g, '').replace(/```/g, '').trim();
                    const result = JSON.parse(rawText);
                    setFeedbackText(result.feedback);

        const ConceptFormView = ({ counselingHook, activeStoreId, memberData }) => {
            const { customers, selectedCustomer, loading, fetchCustomerDetail, searchCustomers, fetchCustomerList, counselingStore, setCounselingStore } = counselingHook;
            const [searchInput, setSearchInput] = useState('');
            const [concerns, setConcerns] = useState({});
            const [feedbacks, setFeedbacks] = useState({});
            const [showConcept, setShowConcept] = useState(false);
            const [recMode, setRecMode] = useState('auto');
            const [activeLines, setActiveLines] = useState({});
            const [completedStep, setCompletedStep] = useState(0);
            const [recPlan, setRecPlan] = useState(null); // { matsu, take, ume }
            const [currentRecFreq, setCurrentRecFreq] = useState(0);
            const [currentRecPlanId, setCurrentRecPlanId] = useState('');
            const [manualOverride, setManualOverride] = useState(null); // セラピスト手動選択: CF_PLAN_CATALOG item or null

            // serverStoresが非同期でロードされるため、ロード後にカウンセリング店舗を再検証
            useEffect(() => {
                if (!currentAccess || !memberData.stores || memberData.stores.length === 0) return;
                const allowed = getAllowedCounselingStores();
                if (allowed.length > 0 && allowed.length < COUNSELING_STORES.length && !allowed.find(s => s.id === counselingStore)) {
                    setCounselingStore(allowed[0].id);
                }
            }, [memberData.stores]);
            const graphRef = React.useRef(null);
            const graphInitRef = React.useRef(false);

            // サブスク契約QR・リンク発行
            const [qrTarget, setQrTarget] = useState(null); // { planName, freq, price }
            const [qrPlans, setQrPlans] = useState([]);
            const [qrFetchingPlans, setQrFetchingPlans] = useState(false);
            const [qrSelectedPlanId, setQrSelectedPlanId] = useState('');
            const [qrLoading, setQrLoading] = useState(false);
            const [qrLink, setQrLink] = useState(null);
            const [qrDataUrl, setQrDataUrl] = useState(null);
            const [qrError, setQrError] = useState(null);
            const [qrCopied, setQrCopied] = useState(false);

            // QR発行パネルを開く
            const openQrPanel = async (planName, freq, price) => {
                setQrTarget({ planName, freq, price });
                setQrLink(null);
                setQrDataUrl(null);
                setQrError(null);
                setQrSelectedPlanId('');
                setQrCopied(false);

                // Square プラン一覧を取得
                setQrFetchingPlans(true);
                try {
                    const headers = { 'Content-Type': 'application/json' };
                    { const sid = resolveStoreId(activeStoreId); if (sid) headers['X-Store-Id'] = sid; }
                    const res = await fetch(`${SQUARE_PROXY_BASE}/catalog/list`, {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({ types: ['SUBSCRIPTION_PLAN'] })
                    });
                    if (!res.ok) throw new Error('プラン取得に失敗しました');
                    const data = await res.json();
                    const objects = data.objects || [];
                    const planList = [];
                    objects.forEach(obj => {
                        if (obj.type === 'SUBSCRIPTION_PLAN' && obj.subscription_plan_data) {
                            const planData = obj.subscription_plan_data;
                            const variations = planData.subscription_plan_variations || [];
                            if (variations.length > 0) {
                                variations.forEach(v => {
                                    const varData = v.subscription_plan_variation_data;
                                    const phases = varData?.phases || [];
                                    let vPrice = 0;
                                    let vCurrency = 'JPY';
                                    let cadence = 'MONTHLY';
                                    if (phases.length > 0) {
                                        const paidPhase = phases.find(p => p.pricing?.price_money?.amount > 0) || phases[0];
                                        vPrice = paidPhase.pricing?.price_money?.amount || paidPhase.recurring_price_money?.amount || 0;
                                        vCurrency = paidPhase.pricing?.price_money?.currency || paidPhase.recurring_price_money?.currency || 'JPY';
                                        cadence = paidPhase.cadence || 'MONTHLY';
                                    }
                                    planList.push({
                                        id: v.id,
                                        name: `${planData.name} - ${varData?.name || 'デフォルト'}`,
                                        price: vPrice,
                                        currency: vCurrency,
                                        cadence,
                                    });
                                });
                            } else {
                                planList.push({
                                    id: obj.id,
                                    name: planData.name,
                                    price: 0,
                                    currency: 'JPY',
                                    cadence: 'MONTHLY',
                                });
                            }
                        }
                        if (obj.type === 'SUBSCRIPTION_PLAN_VARIATION' && obj.subscription_plan_variation_data) {
                            const varData = obj.subscription_plan_variation_data;
                            const phases = varData.phases || [];
                            let vPrice = 0;
                            let vCurrency = 'JPY';
                            let cadence = 'MONTHLY';
                            if (phases.length > 0) {
                                const paidPhase = phases.find(p => p.pricing?.price_money?.amount > 0) || phases[0];
                                vPrice = paidPhase.pricing?.price_money?.amount || paidPhase.recurring_price_money?.amount || 0;
                                vCurrency = paidPhase.pricing?.price_money?.currency || paidPhase.recurring_price_money?.currency || 'JPY';
                                cadence = paidPhase.cadence || 'MONTHLY';
                            }
                            planList.push({
                                id: obj.id,
                                name: varData.name || obj.id,
                                price: vPrice,
                                currency: vCurrency,
                                cadence,
                            });
                        }
                    });

                    // フォールバック: バリエーション無しのプランオブジェクト
                    if (planList.length === 0 && objects.length > 0) {
                        objects.forEach(obj => {
                            if (obj.subscription_plan_data) {
                                planList.push({
                                    id: obj.id,
                                    name: obj.subscription_plan_data.name || obj.id,
                                    price: 0,
                                    cadence: 'MONTHLY',
                                });
                            }
                        });
                    }

                    // フォールバック: memberDataからプランバリエーションIDを取得
                    if (planList.length === 0 && memberData && memberData.members) {
                        const planMap = new Map();
                        memberData.members.forEach(m => {
                            if (m.planVariationId && !planMap.has(m.planVariationId)) {
                                planMap.set(m.planVariationId, {
                                    id: m.planVariationId,
                                    name: m.planName || 'プラン',
                                    price: m.monthlyPrice || 0,
                                    cadence: m.cadence || 'MONTHLY',
                                });
                            }
                        });
                        planList.push(...planMap.values());
                    }

                    setQrPlans(planList);
                    // 名前と金額でマッチングを試みる
                    const matched = planList.find(p =>
                        p.name.toLowerCase().includes(planName.toLowerCase()) && p.price === price
                    ) || planList.find(p =>
                        p.name.toLowerCase().includes(planName.toLowerCase())
                    );
                    if (matched) setQrSelectedPlanId(matched.id);
                    else if (planList.length > 0) setQrSelectedPlanId(planList[0].id);
                } catch (e) {
                    setQrError(e.message);
                } finally {
                    setQrFetchingPlans(false);
                }
            };

            // QRリンク生成
            const generateQrLink = async () => {
                if (!qrSelectedPlanId) return;
                const selectedPlan = qrPlans.find(p => p.id === qrSelectedPlanId);
                if (!selectedPlan) return;
                setQrLoading(true);
                setQrError(null);
                setQrLink(null);
                setQrDataUrl(null);
                try {
                    const headers = { 'Content-Type': 'application/json' };
                    const sid = resolveStoreId(activeStoreId);
                    if (sid) headers['X-Store-Id'] = sid;

                    // location_idを取得
                    const store = serverStores.find(s => s.id === sid);
                    const locationId = store?.locationId || '';
                    if (!locationId) throw new Error('店舗のロケーションIDが設定されていません');

                    const body = {
                        idempotency_key: crypto.randomUUID(),
                        quick_pay: {
                            location_id: locationId,
                            name: selectedPlan.name,
                            price_money: {
                                amount: selectedPlan.price,
                                currency: selectedPlan.currency || 'JPY',
                            },
                        },
                        checkout_options: {
                            subscription_plan_id: qrSelectedPlanId,
                        },
                    };
                    const res = await fetch(`${SQUARE_PROXY_BASE}/online-checkout/payment-links`, {
                        method: 'POST',
                        headers,
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        const detail = errData.errors ? errData.errors.map(e => e.detail || e.code).join(', ') : JSON.stringify(errData);
                        throw new Error(detail);
                    }
                    const data = await res.json();
                    const link = data.payment_link;
                    if (!link || !link.url) throw new Error('リンクの生成に失敗しました');
                    setQrLink({ url: link.url, longUrl: link.long_url || link.url, id: link.id });
                    if (window.QRCode) {
                        const qrUrl = await window.QRCode.toDataURL(link.url, {
                            width: 280, margin: 2,
                            color: { dark: '#7a4d4c', light: '#ffffff' },
                            errorCorrectionLevel: 'M',
                        });
                        setQrDataUrl(qrUrl);
                    }
                    showToast('契約リンクを生成しました', 'success');
                } catch (e) {
                    setQrError(e.message);
                    showToast('リンク生成に失敗しました', 'error');
                } finally {
                    setQrLoading(false);
                }
            };

            const copyQrUrl = async () => {
                if (!qrLink) return;
                try {
                    await navigator.clipboard.writeText(qrLink.url);
                } catch (e) {
                    const ta = document.createElement('textarea');
                    ta.value = qrLink.url;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                }
                setQrCopied(true);
                setTimeout(() => setQrCopied(false), 2000);
            };

            // Googleフォームのお悩み箇所をチェック項目にマッピング
            const mapFormConcerns = useCallback((formConcerns) => {
                const newConcerns = {};

                const today = new Date();

                    const d = new Date(today.getFullYear(), today.getMonth() + o, 1);

                const X0=80, XE=860, MW=(XE-X0)/6, YB=390, YS=385, YG=100, YG2=225;

                const genWave = (vis, bl, amp) => {
                    const pts = [{ x: X0, y: YS }];
                    let sch = [];
                    vis.forEach(v => { for (let m = 0; m < v.months; m++) sch.push(v.freq); });
                    for (let m = 0; m < 6; m++) {

                    for (let i = 1; i < pts.length; i++) {
                        const p = pts[i - 1], c = pts[i], cx = (p.x + c.x) / 2;

                    { id:'l6', c:'#999999', w:2.5, gl:false, isRevert:true, recFreq:0 },

                return { dl, mx, X0, XE, MW, YB, YS, YG, YG2, lines, genWave };
