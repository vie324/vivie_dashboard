                                        status: inv.status,
                                        invoiceNumber: inv.invoice_number || '-'
                                    };
                                });

                            return {
                                id: sub.id,
                                customerId: sub.customer_id,
                                name: customer ? `${customer.family_name || ''}${customer.given_name || ''}`.trim() || '未登録' : '未登録',
                                email: customer?.email_address || '-',
                                phone: customer?.phone_number || '-',
                                status: sub.status,
                                startDate: sub.start_date,
                                canceledDate: sub.canceled_date || null,
                                createdAt: sub.created_at,
                                planName: planName,
                                planVariationId: sub.plan_variation_id,
                                monthlyPrice: monthlyPrice,
                                cadence: cadence,
                                paymentHistory: paymentHistory,
                                storeId: sub._storeId || 'default',
                                storeName: sub._storeName || '',
                            };
                        });

                        const activeSubscriptions = subscriptions.filter(s => s.status === 'ACTIVE');
                        const now = new Date();
                        const thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
                        const thisMonthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);

                        const canceledThisMonth = subscriptions.filter(s => {
                            if (s.status !== 'CANCELED' || !s.canceled_date) return false;
                            const cancelDate = new Date(s.canceled_date);
                            return cancelDate >= thisMonthStart && cancelDate <= thisMonthEnd;
                        });

                        const newThisMonth = subscriptions.filter(s => {
                            const startDate = new Date(s.start_date);
                            return startDate >= thisMonthStart && startDate <= thisMonthEnd;
                        });

                        const monthlyTrend = generateMonthlyTrendFromData(subscriptions);

                        const totalExpectedRevenue = membersList
                            .filter(m => m.status === 'ACTIVE')
                            .reduce((sum, m) => sum + m.monthlyPrice, 0);

                        return {
                            totalMembers: subscriptions.length,
                            activeMembers: activeSubscriptions.length,
                            newMembersThisMonth: newThisMonth.length,
                            churnedMembers: canceledThisMonth.length,
                            churnRate: activeSubscriptions.length > 0
                                ? (canceledThisMonth.length / activeSubscriptions.length * 100)
                                : 0,
                            expectedRevenue: totalExpectedRevenue,
                            members: membersList,
                            monthlyTrend: monthlyTrend,
                            stores: stores,
                            loading: false,
                            error: null
                        };
                    };

                    // ========================================
                    // Phase 1: subscription phasesのデータだけで即時表示
                    // （金額はsub.phasesから取得可能、プラン名はデフォルト）
                    // ========================================
                    const phase1Data = buildFinalData(catalogMap);
                    setMemberData(phase1Data);

                    // ========================================
                    // Phase 2: Catalog情報を非同期で取得し、プラン名を更新
                    // ========================================
                    fetchCatalogAsync(subscriptions, stores, targetStores).then(fullCatalogMap => {
                        if (Object.keys(fullCatalogMap).length > 0) {
                            Object.assign(catalogMap, fullCatalogMap);
                            const enrichedData = buildFinalData(catalogMap);
                            // キャッシュに保存（enriched版）
                            squareDataCache.data = enrichedData;
                            squareDataCache.storeKey = cacheKey;
                            squareDataCache.timestamp = Date.now();
                            setMemberData(enrichedData);
                        } else {
                            // catalogが空でもキャッシュに保存
                            squareDataCache.data = phase1Data;
                            squareDataCache.storeKey = cacheKey;
                            squareDataCache.timestamp = Date.now();
                        }
                    }).catch(e => console.warn('Catalog enrichment failed:', e));

                } catch (error) {
                    console.error('Square API Error:', error);
                    setMemberData(prev => ({
                        ...prev,
                        loading: false,
                        error: error.message
                    }));
                }
            }, [activeStoreId, allowedStoreIds]);

            useEffect(() => {
                fetchSquareData();
                // 5分ごとに更新
                const interval = setInterval(fetchSquareData, 5 * 60 * 1000);
                return () => clearInterval(interval);
            }, [fetchSquareData]);

            // 手動更新は常にキャッシュを無視
            const refreshSquareData = useCallback(() => fetchSquareData(true), [fetchSquareData]);

            return { memberData, refreshSquareData, operateSubscription };
        };

        // ========================================
        // Googleフォーム日報データ連携
        // ========================================

        const useDailyReportData = () => {
            const [reportData, setReportData] = useState({
                reports: [],
                loading: true,
                error: null,
                lastUpdated: null
            });

            const fetchReportData = useCallback(async () => {
                // APIが設定されていない場合は空データ
                if (!UNIFIED_GAS_URL || UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') {
                    setReportData({
                        reports: [],
                        loading: false,
                        error: '統合GAS URLが設定されていません。設定画面からURLを入力してください。',
                        lastUpdated: null
                    });
                    return;
                }

                try {
                    // 当月+先月のデータを取得（月間トレンド比較用）
                    const response = await fetch(UNIFIED_GAS_URL + '?type=report&months=2');
                    if (!response.ok) {
                        throw new Error('日報データの取得に失敗しました (HTTP ' + response.status + ')');
                    }
                    const data = await response.json();

                    if (data.error) {
                        throw new Error(data.error);
                    }

                    setReportData({
                        reports: data.reports || [],
                        loading: false,
                        error: null,
                        lastUpdated: new Date()
                    });
                } catch (error) {
                    console.error('Report fetch error:', error);
                    setReportData(prev => ({
                        ...prev,
                        loading: false,
                        error: error.message
                    }));
                }
            }, []);

            useEffect(() => {
                fetchReportData();
            }, [fetchReportData]);

            return { reportData, refreshReportData: fetchReportData };
        };

        // 実データから月間トレンドを生成（累積会員数付き）
        const generateMonthlyTrendFromData = (subscriptions) => {
            const trend = [];
            const now = new Date();

            // プラン変更検出: 同じcustomer_idで、キャンセルと新規開始が同月内（±14日以内）のペアを探す
            const planChangeMap = {}; // monthKey -> Set of customer_ids that are plan changes
            const customerSubs = {};
            subscriptions.forEach(s => {
                if (!s.customer_id) return;
                if (!customerSubs[s.customer_id]) customerSubs[s.customer_id] = [];
                customerSubs[s.customer_id].push(s);
            });

            // 同一顧客で複数サブスクがある場合、キャンセル→新規を「プラン変更」と判定
            const planChangeCancelIds = new Set(); // cancel側のsubscription id
            const planChangeNewIds = new Set(); // new側のsubscription id

            Object.values(customerSubs).forEach(subs => {
                if (subs.length < 2) return;
                const canceled = subs.filter(s => s.canceled_date);
                const started = subs.filter(s => s.start_date);
                canceled.forEach(c => {
                    const cancelDate = new Date(c.canceled_date);
                    started.forEach(n => {
                        if (n.id === c.id) return;
                        const startDate = new Date(n.start_date);
                        const diffDays = Math.abs((startDate - cancelDate) / (1000 * 60 * 60 * 24));
                        if (diffDays <= 14) {
                            planChangeCancelIds.add(c.id);
                            planChangeNewIds.add(n.id);
                        }
                    });
                });
            });

            for (let i = 11; i >= 0; i--) {
                const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
                const monthStart = new Date(date.getFullYear(), date.getMonth(), 1);
                const monthEnd = new Date(date.getFullYear(), date.getMonth() + 1, 0);

                const newThisMonth = subscriptions.filter(s => {
                    const startDate = new Date(s.start_date);
                    return startDate >= monthStart && startDate <= monthEnd;
                });

                const churnedThisMonth = subscriptions.filter(s => {
                    if (!s.canceled_date) return false;
                    const cancelDate = new Date(s.canceled_date);
                    return cancelDate >= monthStart && cancelDate <= monthEnd;
                });

                // プラン変更の数（キャンセル側でカウント）
                const planChangeCount = churnedThisMonth.filter(s => planChangeCancelIds.has(s.id)).length;

                // 純粋な新規（プラン変更を除く）
                const pureNewMembers = newThisMonth.filter(s => !planChangeNewIds.has(s.id)).length;
                // 純粋な退会（プラン変更を除く）
                const pureChurnedMembers = churnedThisMonth.filter(s => !planChangeCancelIds.has(s.id)).length;

                // 各月末時点のアクティブ会員数を計算
                const activeAtMonthEnd = subscriptions.filter(s => {
                    const startDate = new Date(s.start_date);
                    if (startDate > monthEnd) return false;
                    if (s.status === 'CANCELED' && s.canceled_date) {
                        const cancelDate = new Date(s.canceled_date);
                        return cancelDate > monthEnd;
                    }
                    return s.status === 'ACTIVE' || s.status === 'PENDING' || s.status === 'PAUSED'
                        || (s.status === 'CANCELED' && s.canceled_date && new Date(s.canceled_date) > monthEnd);
                }).length;

                trend.push({
                    month: date.toLocaleDateString('ja-JP', { year: 'numeric', month: 'short' }),
                    monthKey: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`,
                    newMembers: pureNewMembers,
                    churnedMembers: pureChurnedMembers,
                    planChanges: planChangeCount,
                    netGrowth: pureNewMembers - pureChurnedMembers,
                    activeMembers: activeAtMonthEnd
                });
            }

            return trend;
        };

        // ========================================
        // 会員利用回数管理（Google Sheets連携）
        // ========================================

        // 更新日計算ヘルパー
        // サブスク登録日から、ある月の更新日（課金日）を算出
        // 31日登録 → 2月は28日(29日)、4月は30日 に繰り上がる
        const getBillingDayForMonth = (registrationDay, year, month) => {
            // month: 0-indexed (0=Jan)
            // その月の最終日を取得
            const lastDay = new Date(year, month + 1, 0).getDate();
            return Math.min(registrationDay, lastDay);
        };

        // 会員の現在の請求期間（開始日・終了日・次回更新日）を計算
        const getCurrentBillingPeriod = (startDateStr) => {
            if (!startDateStr) return null;
            const startDate = new Date(startDateStr);
            const regDay = startDate.getDate(); // 登録日の「日」
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            // 今月の更新日
            const thisMonthBillingDay = getBillingDayForMonth(regDay, today.getFullYear(), today.getMonth());
            const thisMonthBillingDate = new Date(today.getFullYear(), today.getMonth(), thisMonthBillingDay);

            let periodStart, periodEnd, nextRenewal;

            if (today >= thisMonthBillingDate) {
                // 今月の更新日を過ぎている → 今期間は今月更新日〜来月更新日前日
                periodStart = thisMonthBillingDate;
                const nextMonth = today.getMonth() + 1;
                const nextYear = nextMonth > 11 ? today.getFullYear() + 1 : today.getFullYear();
                const nextM = nextMonth > 11 ? 0 : nextMonth;
                const nextDay = getBillingDayForMonth(regDay, nextYear, nextM);
                nextRenewal = new Date(nextYear, nextM, nextDay);
                periodEnd = new Date(nextRenewal);
                periodEnd.setDate(periodEnd.getDate() - 1);
            } else {
                // 今月の更新日はまだ → 前月更新日〜今月更新日前日
                nextRenewal = thisMonthBillingDate;
                periodEnd = new Date(thisMonthBillingDate);
                periodEnd.setDate(periodEnd.getDate() - 1);
                const prevMonth = today.getMonth() - 1;
                const prevYear = prevMonth < 0 ? today.getFullYear() - 1 : today.getFullYear();
                const prevM = prevMonth < 0 ? 11 : prevMonth;
                const prevDay = getBillingDayForMonth(regDay, prevYear, prevM);
                periodStart = new Date(prevYear, prevM, prevDay);
            }

            // 期間のユニークキー（YYYY-MM-DD形式）
            const periodKey = periodStart.toISOString().slice(0, 10);
            // 次回更新までの残日数
            const daysUntilRenewal = Math.ceil((nextRenewal - today) / (1000 * 60 * 60 * 24));
            // 期間の合計日数
            const totalDaysInPeriod = Math.ceil((nextRenewal - periodStart) / (1000 * 60 * 60 * 24));
            // 経過日数
            const daysElapsed = Math.ceil((today - periodStart) / (1000 * 60 * 60 * 24));

            return {
                regDay,
                periodStart,
                periodEnd,
                nextRenewal,
                periodKey,
                daysUntilRenewal,
                totalDaysInPeriod,
                daysElapsed,
                progressPct: totalDaysInPeriod > 0 ? Math.min(100, (daysElapsed / totalDaysInPeriod) * 100) : 0,
            };
        };

        // 日付フォーマットヘルパー
        const formatDateShort = (date) => {
            if (!date) return '-';
            const d = date instanceof Date ? date : new Date(date);
            return `${d.getMonth() + 1}/${d.getDate()}`;
        };

        const MEMBER_USAGE_GAS_URL = UNIFIED_GAS_URL;

        // プラン別の月間利用上限設定
        const PLAN_LIMITS_STORAGE_KEY = 'vivie_usage_plan_limits';
        const CARRYOVER_STORAGE_KEY = 'vivie_usage_carryover';

        const useMemberUsage = () => {
            const [usageData, setUsageData] = useState({});
            const [saving, setSaving] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);
            const [lastSynced, setLastSynced] = useState(null);
            // プラン別の月間上限（{ planName: maxSessions }）
            const [planLimits, setPlanLimits] = useState(() => {
                try { return JSON.parse(localStorage.getItem(PLAN_LIMITS_STORAGE_KEY) || '{}'); } catch(e) { return {}; }
            });
            // 繰越データ（{ memberId__periodKey: carryoverCount }）
            const [carryoverData, setCarryoverData] = useState(() => {
                try { return JSON.parse(localStorage.getItem(CARRYOVER_STORAGE_KEY) || '{}'); } catch(e) { return {}; }
            });

            const currentMonth = new Date().toISOString().slice(0, 7); // YYYY-MM

            // GASからプラン上限・繰越を初回取得
            useEffect(() => {
                (async () => {
                    const config = await fetchDashConfig();
                    if (config) {
                        if (config.planLimits) {
                            setPlanLimits(config.planLimits);
                            try { localStorage.setItem(PLAN_LIMITS_STORAGE_KEY, JSON.stringify(config.planLimits)); } catch(e) {}
                        }
                        if (config.carryoverData) {
                            setCarryoverData(config.carryoverData);
                            try { localStorage.setItem(CARRYOVER_STORAGE_KEY, JSON.stringify(config.carryoverData)); } catch(e) {}
                        }
                    }
                })();
            }, []);

            // プラン上限を設定
            const setPlanLimit = useCallback((planName, maxSessions) => {
                setPlanLimits(prev => {
                    const updated = { ...prev, [planName]: maxSessions };
                    try { localStorage.setItem(PLAN_LIMITS_STORAGE_KEY, JSON.stringify(updated)); } catch(e) {}
                    saveDashConfig('planLimits', updated);
                    return updated;
                });
            }, []);

            // 繰越を手動設定
            const setCarryover = useCallback((memberId, periodKey, count) => {
                const key = `${memberId}__${periodKey}`;
                setCarryoverData(prev => {
                    const updated = { ...prev, [key]: Math.max(0, count) };
                    try { localStorage.setItem(CARRYOVER_STORAGE_KEY, JSON.stringify(updated)); } catch(e) {}
                    saveDashConfig('carryoverData', updated);
                    return updated;
                });
            }, []);

            // 繰越数を取得
            const getCarryover = useCallback((memberId, periodKey) => {
                const key = `${memberId}__${periodKey}`;
                return carryoverData[key] || 0;
            }, [carryoverData]);

            // プラン上限を取得
            const getPlanLimit = useCallback((planName) => {
                return planLimits[planName] || 0;
            }, [planLimits]);

            // GASからデータを取得する関数
            const fetchFromGAS = useCallback(() => {
                if (MEMBER_USAGE_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                    return fetch(MEMBER_USAGE_GAS_URL + '?type=usage&month=' + currentMonth)
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.usage) {
                                setUsageData(prev => {
                                    const merged = { ...prev, ...data.usage };
                                    // ローカルにも反映
                                    try {
                                        const all = JSON.parse(localStorage.getItem('vivie_member_usage') || '{}');
                                        all[currentMonth] = merged;
                                        localStorage.setItem('vivie_member_usage', JSON.stringify(all));
                                    } catch (e) {}
                                    return merged;
                                });
                                setLastSynced(new Date());
                            }
                        })
                        .catch(() => {});
                }
                return Promise.resolve();
            }, [currentMonth]);

            // ローカルストレージからロード + GAS初回読み込み
            useEffect(() => {
                try {
                    const stored = JSON.parse(localStorage.getItem('vivie_member_usage') || '{}');
                    setUsageData(stored[currentMonth] || {});
                } catch (e) { setUsageData({}); }

                fetchFromGAS();
            }, [currentMonth, fetchFromGAS]);

            // 定期同期（60秒ごとにGASからデータ取得）
            useEffect(() => {
                if (MEMBER_USAGE_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                const interval = setInterval(() => {
                    fetchFromGAS();
                }, 60000);
                return () => clearInterval(interval);
            }, [fetchFromGAS]);

            // 利用回数を更新（期間キーに対応）+ GASへ即時同期
            const updateUsage = useCallback((memberId, count, periodKey) => {
                const key = periodKey ? `${memberId}__${periodKey}` : memberId;
                setUsageData(prev => {
                    const updated = { ...prev, [key]: Math.max(0, count) };
                    try {
                        const all = JSON.parse(localStorage.getItem('vivie_member_usage') || '{}');
                        all[currentMonth] = updated;
                        localStorage.setItem('vivie_member_usage', JSON.stringify(all));
                    } catch (e) {}
                    // GASへ即時同期（バックグラウンド）
                    if (MEMBER_USAGE_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                        fetch(MEMBER_USAGE_GAS_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({
                                type: 'usage', action: 'saveUsage',
                                data: [{ memberId, month: currentMonth, periodKey: periodKey || '', count: Math.max(0, count), updatedAt: new Date().toISOString() }]
                            })
                        }).catch(() => {});
                    }
                    return updated;
                });
            }, [currentMonth]);

            // Google Sheetsに保存
            const saveToSheet = useCallback(async (members) => {
                setSaving(true);
                try {
                    const all = JSON.parse(localStorage.getItem('vivie_member_usage') || '{}');
                    all[currentMonth] = usageData;
                    localStorage.setItem('vivie_member_usage', JSON.stringify(all));

                    if (MEMBER_USAGE_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                        const payload = Object.entries(usageData).map(([rawKey, count]) => {
                            const memberId = rawKey.includes('__') ? rawKey.split('__')[0] : rawKey;
                            const periodKey = rawKey.includes('__') ? rawKey.split('__')[1] : '';
                            const member = members.find(m => m.id === memberId);
                            return {
                                memberId,
                                memberName: member?.name || '不明',
                                storeName: member?.storeName || '',
                                planName: member?.planName || '',
                                month: currentMonth,
                                periodKey,
                                count,
                                updatedAt: new Date().toISOString()
                            };
                        });
                        await fetch(MEMBER_USAGE_GAS_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({ type: 'usage', action: 'saveUsage', data: payload })
                        });
                    }
                    setLastSaved(new Date());
                    showToast('利用回数を保存しました', 'success', 2000);
                } catch (e) {
                    console.error('Usage save error:', e);
                    showToast('利用回数の保存に失敗しました', 'error');
                } finally {
                    setSaving(false);
                }
            }, [usageData, currentMonth]);

            const getUsage = useCallback((memberId, periodKey) => {
                const key = periodKey ? `${memberId}__${periodKey}` : memberId;
                return usageData[key] || 0;
            }, [usageData]);

            // 手動同期ボタン用
            const syncFromGAS = useCallback(async () => {
                await fetchFromGAS();
            }, [fetchFromGAS]);

            return {
                usageData, updateUsage, saveToSheet, getUsage, saving, lastSaved, lastSynced, syncFromGAS, currentMonth,
                planLimits, setPlanLimit, getPlanLimit,
                carryoverData, setCarryover, getCarryover
            };
        };

        // ========================================
        // 回数券管理（Google Sheets連携）
        // ========================================

        const TICKET_GAS_URL = UNIFIED_GAS_URL;
        const TICKET_STORAGE_KEY = 'vivie_ticket_data';

        const useTicketManagement = () => {
            // 回数券プラン（種類）
            const [ticketPlans, setTicketPlans] = useState([]);
            // 顧客回数券（購入記録）
            const [customerTickets, setCustomerTickets] = useState([]);
            const [saving, setSaving] = useState(false);
            const [lastSaved, setLastSaved] = useState(null);
            const [lastSynced, setLastSynced] = useState(null);

            // GASからデータを取得する関数
            const fetchTicketsFromGAS = useCallback(() => {
                if (TICKET_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                    return fetch(TICKET_GAS_URL + '?type=ticket')
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.plans) {
                                setTicketPlans(data.plans);
                            }
                            if (data && data.tickets) {
                                setCustomerTickets(data.tickets);
                            }
                            if (data && (data.plans || data.tickets)) {
                                // ローカルにも反映
                                try {
                                    localStorage.setItem(TICKET_STORAGE_KEY, JSON.stringify({
                                        plans: data.plans || [],
                                        tickets: data.tickets || []
                                    }));
                                } catch (e) {}
                                setLastSynced(new Date());
                            }
                        })
                        .catch(() => {});
                }
                return Promise.resolve();
            }, []);

            // ローカルストレージから読み込み + GAS初回読み込み
            useEffect(() => {
                try {
                    const stored = JSON.parse(localStorage.getItem(TICKET_STORAGE_KEY) || '{}');
                    setTicketPlans(stored.plans || [
                        { id: 'plan_1', name: '5回券', sessions: 5, price: 45000, validityDays: 90, active: true },
                        { id: 'plan_2', name: '10回券', sessions: 10, price: 80000, validityDays: 180, active: true },
                        { id: 'plan_3', name: '20回券', sessions: 20, price: 140000, validityDays: 365, active: true },
                    ]);
                    setCustomerTickets(stored.tickets || []);
                } catch (e) { }

                fetchTicketsFromGAS();
            }, [fetchTicketsFromGAS]);

            // 定期同期（60秒ごとにGASからデータ取得）
            useEffect(() => {
                if (TICKET_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                const interval = setInterval(() => {
                    fetchTicketsFromGAS();
                }, 60000);
                return () => clearInterval(interval);
            }, [fetchTicketsFromGAS]);

            // ローカル保存
            const saveLocal = useCallback((plans, tickets) => {
                try {
                    localStorage.setItem(TICKET_STORAGE_KEY, JSON.stringify({ plans, tickets }));
                } catch (e) {}
            }, []);

            // 回数券プラン管理
            const addPlan = useCallback((plan) => {
                const newPlan = { ...plan, id: 'plan_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6) };
                setTicketPlans(prev => {
                    const updated = [...prev, newPlan];
                    saveLocal(updated, customerTickets);
                    return updated;
                });
                return newPlan;
            }, [customerTickets, saveLocal]);

            const updatePlan = useCallback((planId, updates) => {
                setTicketPlans(prev => {
                    const updated = prev.map(p => p.id === planId ? { ...p, ...updates } : p);
                    saveLocal(updated, customerTickets);
                    return updated;
                });
            }, [customerTickets, saveLocal]);

            const deletePlan = useCallback((planId) => {
                setTicketPlans(prev => {
                    const updated = prev.filter(p => p.id !== planId);
                    saveLocal(updated, customerTickets);
                    return updated;
                });
            }, [customerTickets, saveLocal]);

            // 顧客回数券管理
            const addCustomerTicket = useCallback((ticket) => {
                const plan = ticketPlans.find(p => p.id === ticket.planId);
                const purchaseDate = ticket.purchaseDate || new Date().toISOString().slice(0, 10);
                const expirationDate = ticket.expirationDate || (() => {
                    const d = new Date(purchaseDate);
                    d.setDate(d.getDate() + (plan?.validityDays || 180));
                    return d.toISOString().slice(0, 10);
                })();

                const newTicket = {
                    id: 'tkt_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                    customerName: ticket.customerName,
                    customerPhone: ticket.customerPhone || '',
                    planId: ticket.planId,
                    planName: plan?.name || ticket.planName || '',
                    totalSessions: plan?.sessions || ticket.totalSessions || 0,
                    remainingSessions: plan?.sessions || ticket.totalSessions || 0,
                    price: plan?.price || ticket.price || 0,
                    purchaseDate,
                    expirationDate,
                    storeName: ticket.storeName || '',
                    notes: ticket.notes || '',
                    usageHistory: [],
                    createdAt: new Date().toISOString(),
                };

                setCustomerTickets(prev => {
                    const updated = [newTicket, ...prev];
                    saveLocal(ticketPlans, updated);
                    return updated;
                });
                return newTicket;
            }, [ticketPlans, saveLocal]);

            const updateCustomerTicket = useCallback((ticketId, updates) => {
                setCustomerTickets(prev => {
                    const updated = prev.map(t => t.id === ticketId ? { ...t, ...updates } : t);
                    saveLocal(ticketPlans, updated);
                    return updated;
                });
            }, [ticketPlans, saveLocal]);

            const useSession = useCallback((ticketId) => {
                setCustomerTickets(prev => {
                    const updated = prev.map(t => {
                        if (t.id !== ticketId || t.remainingSessions <= 0) return t;
                        return {
                            ...t,
                            remainingSessions: t.remainingSessions - 1,
                            usageHistory: [...(t.usageHistory || []), { date: new Date().toISOString(), action: 'use' }],
                        };
                    });
                    saveLocal(ticketPlans, updated);
                    return updated;
                });
            }, [ticketPlans, saveLocal]);

            const undoSession = useCallback((ticketId) => {
                setCustomerTickets(prev => {
                    const updated = prev.map(t => {
                        if (t.id !== ticketId || t.remainingSessions >= t.totalSessions) return t;
                        return {
                            ...t,
                            remainingSessions: t.remainingSessions + 1,
                            usageHistory: [...(t.usageHistory || []), { date: new Date().toISOString(), action: 'undo' }],
                        };
                    });
                    saveLocal(ticketPlans, updated);
                    return updated;
                });
            }, [ticketPlans, saveLocal]);

            const deleteCustomerTicket = useCallback((ticketId) => {
                setCustomerTickets(prev => {
                    const updated = prev.filter(t => t.id !== ticketId);
                    saveLocal(ticketPlans, updated);
                    return updated;
                });
            }, [ticketPlans, saveLocal]);

            // Google Sheets に保存
            const saveToSheet = useCallback(async () => {
                setSaving(true);
                try {
                    saveLocal(ticketPlans, customerTickets);
                    if (TICKET_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                        await fetch(TICKET_GAS_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({ type: 'ticket', action: 'saveTickets', plans: ticketPlans, tickets: customerTickets })
                        });
                    }
                    setLastSaved(new Date());
                    showToast('回数券データを保存しました', 'success', 2000);
                } catch (e) {
                    console.error('Ticket save error:', e);
                    showToast('回数券データの保存に失敗しました', 'error');
                } finally {
                    setSaving(false);
                }
            }, [ticketPlans, customerTickets, saveLocal]);

            // 集計
            const stats = useMemo(() => {
                const now = new Date();
                const active = customerTickets.filter(t => {
                    return t.remainingSessions > 0 && new Date(t.expirationDate) >= now;
                });
                const expiringSoon = customerTickets.filter(t => {
                    const exp = new Date(t.expirationDate);
                    const diff = (exp - now) / (1000 * 60 * 60 * 24);
                    return t.remainingSessions > 0 && diff >= 0 && diff <= 30;
                });
                const expired = customerTickets.filter(t => {
                    return t.remainingSessions > 0 && new Date(t.expirationDate) < now;
                });
                const completed = customerTickets.filter(t => t.remainingSessions <= 0);
                const totalRevenue = customerTickets.reduce((sum, t) => sum + (t.price || 0), 0);
                const totalRemaining = active.reduce((sum, t) => sum + t.remainingSessions, 0);
                return { active: active.length, expiringSoon: expiringSoon.length, expired: expired.length, completed: completed.length, totalRevenue, totalRemaining, total: customerTickets.length };
            }, [customerTickets]);

            // 手動同期ボタン用
            const syncFromGAS = useCallback(async () => {
                await fetchTicketsFromGAS();
            }, [fetchTicketsFromGAS]);

            return {
                ticketPlans, customerTickets, stats,
                addPlan, updatePlan, deletePlan,
                addCustomerTicket, updateCustomerTicket, useSession, undoSession, deleteCustomerTicket,
                saveToSheet, saving, lastSaved, lastSynced, syncFromGAS
            };
        };

        // ========================================
        // QR・現金決済会員管理（手動会員管理）
        // ========================================

        const MANUAL_MEMBERS_STORAGE_KEY = 'vivie_manual_members';
        const MANUAL_MEMBERS_GAS_URL = UNIFIED_GAS_URL;

        const useManualMembers = () => {
            const [manualMembers, setManualMembers] = useState([]);
            const [saving, setSaving] = useState(false);
            const [lastSynced, setLastSynced] = useState(null);

            // GASから取得
            const fetchFromGAS = useCallback(() => {
                if (MANUAL_MEMBERS_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                    return fetch(MANUAL_MEMBERS_GAS_URL + '?type=members')
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.members) {
                                setManualMembers(data.members);
                                try { localStorage.setItem(MANUAL_MEMBERS_STORAGE_KEY, JSON.stringify(data.members)); } catch(e) {}
                                setLastSynced(new Date());
                            }
                        })
                        .catch(() => {});
                }
                return Promise.resolve();
            }, []);

            // 初回ロード
            useEffect(() => {
                try {
                    const stored = JSON.parse(localStorage.getItem(MANUAL_MEMBERS_STORAGE_KEY) || '[]');
                    setManualMembers(stored);
                } catch (e) {}
                fetchFromGAS();
            }, [fetchFromGAS]);

            // 定期同期（60秒ごと）
            useEffect(() => {
                if (MANUAL_MEMBERS_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                const interval = setInterval(fetchFromGAS, 60000);
                return () => clearInterval(interval);
            }, [fetchFromGAS]);

            const saveLocal = useCallback((members) => {
                try { localStorage.setItem(MANUAL_MEMBERS_STORAGE_KEY, JSON.stringify(members)); } catch (e) {}
            }, []);

            // GASに保存
            const saveToGAS = useCallback(async (members) => {
                if (MANUAL_MEMBERS_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                    setSaving(true);
                    try {
                        await fetch(MANUAL_MEMBERS_GAS_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({ type: 'members', action: 'saveManualMembers', members })
                        });
                        setLastSynced(new Date());
                        return true;
                    } catch (e) {
                        console.error('[会員管理] GAS保存エラー:', e);
                        return false;
                    } finally {
                        setSaving(false);
                    }
                }
                return false;
            }, []);

            // 会員追加（入会）
            const addMember = useCallback((member) => {
                const newMember = {
                    id: 'manual_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                    name: member.name,
                    phone: member.phone || '',
                    email: member.email || '',
                    paymentMethod: member.paymentMethod || 'QR', // 'QR' | 'CASH'
                    planName: member.planName || '',
                    monthlyPrice: member.monthlyPrice || 0,
                    storeName: member.storeName || '',
                    status: 'ACTIVE',
                    startDate: member.startDate || new Date().toISOString().slice(0, 10),
                    canceledDate: null,
                    notes: member.notes || '',
                    history: [{ date: new Date().toISOString(), action: 'join', note: '入会' }],
                    createdAt: new Date().toISOString(),
                };
                setManualMembers(prev => {
                    const updated = [newMember, ...prev];
                    saveLocal(updated);
                    saveToGAS(updated).then(ok => {
                        if (ok) showToast(newMember.name + 'さんを登録・スプシ保存しました', 'success');
                        else showToast(newMember.name + 'さんを登録しました（スプシ保存失敗）', 'error');
                    });
                    return updated;
                });
                return newMember;
            }, [saveLocal, saveToGAS]);

            // 退会処理
            const cancelMember = useCallback((memberId, note) => {
                setManualMembers(prev => {
                    const updated = prev.map(m => {
                        if (m.id !== memberId) return m;
                        return {
                            ...m,
                            status: 'CANCELED',
                            canceledDate: new Date().toISOString().slice(0, 10),
                            history: [...(m.history || []), { date: new Date().toISOString(), action: 'cancel', note: note || '退会' }]
                        };
                    });
                    saveLocal(updated);
                    saveToGAS(updated).then(ok => {
                        if (ok) showToast('退会処理をスプシに保存しました', 'success');
                    });
                    return updated;
                });
            }, [saveLocal, saveToGAS]);

            // 再入会
            const reactivateMember = useCallback((memberId) => {
                setManualMembers(prev => {
                    const updated = prev.map(m => {
                        if (m.id !== memberId) return m;
                        return {
                            ...m,
                            status: 'ACTIVE',
                            canceledDate: null,
                            history: [...(m.history || []), { date: new Date().toISOString(), action: 'rejoin', note: '再入会' }]
                        };
                    });
                    saveLocal(updated);
                    saveToGAS(updated).then(ok => {
                        if (ok) showToast('再入会をスプシに保存しました', 'success');
                    });
                    return updated;
                });
            }, [saveLocal, saveToGAS]);

            // プラン変更
            const changePlan = useCallback((memberId, newPlanName, newPrice) => {
                setManualMembers(prev => {
                    const updated = prev.map(m => {
                        if (m.id !== memberId) return m;
                        const oldPlan = m.planName;
                        return {
                            ...m,
                            planName: newPlanName,
                            monthlyPrice: newPrice != null ? newPrice : m.monthlyPrice,
                            history: [...(m.history || []), { date: new Date().toISOString(), action: 'plan_change', note: `${oldPlan} → ${newPlanName}` }]
                        };
                    });
                    saveLocal(updated);
                    saveToGAS(updated).then(ok => {
                        if (ok) showToast('プラン変更をスプシに保存しました', 'success');
                    });
                    return updated;
                });
            }, [saveLocal, saveToGAS]);

            // 会員情報更新
            const updateMember = useCallback((memberId, updates) => {
                setManualMembers(prev => {
                    const updated = prev.map(m => m.id === memberId ? { ...m, ...updates } : m);
                    saveLocal(updated);
                    saveToGAS(updated);
                    return updated;
                });
            }, [saveLocal, saveToGAS]);

            // 会員削除
            const deleteMember = useCallback((memberId) => {
                setManualMembers(prev => {
                    const updated = prev.filter(m => m.id !== memberId);
                    saveLocal(updated);
                    saveToGAS(updated).then(ok => {
                        if (ok) showToast('会員削除をスプシに保存しました', 'success');
                    });
                    return updated;
                });
            }, [saveLocal, saveToGAS]);

            const syncFromGAS = useCallback(async () => { await fetchFromGAS(); }, [fetchFromGAS]);

            // 支払記録を追加
            const addPayment = useCallback((memberId, payment) => {
                setManualMembers(prev => {
                    const updated = prev.map(m => {
                        if (m.id !== memberId) return m;
                        const newPayment = {
                            id: 'pay_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
                            date: payment.date || new Date().toISOString().slice(0, 10),
                            amount: payment.amount || m.monthlyPrice || 0,
                            method: payment.method || m.paymentMethod || 'CASH',
                            note: payment.note || '',
                            createdAt: new Date().toISOString()
                        };
                        return { ...m, payments: [...(m.payments || []), newPayment] };
                    });
                    saveLocal(updated);
                    saveToGAS(updated).then(ok => {
                        if (ok) showToast('入金記録をスプシに保存しました', 'success');
                    });
                    return updated;
                });
            }, [saveLocal, saveToGAS]);

            // 支払記録を削除
            const removePayment = useCallback((memberId, paymentId) => {
                setManualMembers(prev => {
                    const updated = prev.map(m => {
                        if (m.id !== memberId) return m;
                        return { ...m, payments: (m.payments || []).filter(p => p.id !== paymentId) };
                    });
                    saveLocal(updated);
                    saveToGAS(updated).then(ok => {
                        if (ok) showToast('入金削除をスプシに保存しました', 'success');
                    });
                    return updated;
                });
            }, [saveLocal, saveToGAS]);

            return {
                manualMembers, addMember, cancelMember, reactivateMember,
                changePlan, updateMember, deleteMember, addPayment, removePayment,
                syncFromGAS, saveToGAS, lastSynced, saving
            };
        };

        // ========================================
        // 出納帳（キャッシュブック）- スプレッドシートファースト
        // ========================================

        const CASHBOOK_CACHE_KEY = 'vivie_cashbook_cache';

        const useCashbook = () => {
            const [entries, setEntries] = useState([]);
            const [dailyCloses, setDailyCloses] = useState([]);
            const [auditLogs, setAuditLogs] = useState([]);
            const [saving, setSaving] = useState(false);
            const [loading, setLoading] = useState(true);
            const [lastSynced, setLastSynced] = useState(null);
            const [syncError, setSyncError] = useState(null);

            // スプレッドシートからフェッチ（メイン）、キャッシュはフォールバック
            const fetchFromGAS = useCallback(async (showLoading) => {
                if (UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') { setLoading(false); return; }
                if (showLoading) setLoading(true);
                setSyncError(null);
                try {
                    const res = await fetch(UNIFIED_GAS_URL + '?type=cashbook&includeLogs=true');
                    const data = await res.json();
                    if (data && data.entries) {
                        setEntries(data.entries);
                        setDailyCloses(data.dailyCloses || []);
                        setAuditLogs(data.logs || []);
                        setLastSynced(new Date());
                        try { localStorage.setItem(CASHBOOK_CACHE_KEY, JSON.stringify({ entries: data.entries, dailyCloses: data.dailyCloses || [], ts: Date.now() })); } catch(e) {}
                    }
                } catch (e) {
                    setSyncError('スプレッドシートとの同期に失敗しました');
                    // オフライン時はキャッシュから
                    try {
                        const cached = JSON.parse(localStorage.getItem(CASHBOOK_CACHE_KEY) || '{}');
                        if (cached.entries) { setEntries(cached.entries); setDailyCloses(cached.dailyCloses || []); }
                    } catch(e2) {}
                } finally {
                    setLoading(false);
                }
            }, []);

            // 初回ロード
            useEffect(() => {
                // まずキャッシュから即時表示
                try {
                    const cached = JSON.parse(localStorage.getItem(CASHBOOK_CACHE_KEY) || '{}');
                    if (cached.entries) { setEntries(cached.entries); setDailyCloses(cached.dailyCloses || []); }
                } catch(e) {}
                // スプレッドシートから最新取得
                fetchFromGAS(true);
            }, []);

            // 定期同期（60秒ごと）
            useEffect(() => {
                if (UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                const interval = setInterval(() => fetchFromGAS(false), 60000);
                return () => clearInterval(interval);
            }, [fetchFromGAS]);

            // 操作者名取得
            const getOperator = useCallback(() => {
                return currentAccess ? currentAccess.name : '不明';
            }, []);

            // 日次締めチェック
            const isDayClosed = useCallback((date, storeId) => {
                return dailyCloses.some(c => c.date === date && c.storeId === storeId && c.locked);
            }, [dailyCloses]);

            // エントリー追加（スプレッドシートファースト）
            const addEntry = useCallback(async (entry) => {
                if (isDayClosed(entry.date, entry.store)) {
                    showToast('この日は締め済みのため記帳できません', 'error');
                    return null;
                }
                const newEntry = {
                    id: 'cb_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
                    date: entry.date || new Date().toISOString().slice(0, 10),
                    type: entry.type || 'income',
                    category: entry.category || '施術売上',
                    description: entry.description || '',
                    amount: parseInt(entry.amount) || 0,
                    customerName: entry.customerName || '',
                    treatmentCount: parseInt(entry.treatmentCount) || 0,
                    paymentMethod: entry.paymentMethod || 'CASH',
                    cashType: entry.cashType || 'register',
                    memberId: entry.memberId || null,
                    store: entry.store || '',
                    recorder: entry.recorder || getOperator(),
                    notes: entry.notes || '',
                    createdAt: new Date().toISOString()
                };

                // 楽観的UI更新
                setEntries(prev => [newEntry, ...prev]);
                setSaving(true);

                try {
                    if (UNIFIED_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                        const res = await fetch(UNIFIED_GAS_URL, {
                            method: 'POST', headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({ type: 'cashbook', action: 'addEntry', entry: newEntry, operator: getOperator() })
                        });
                        const result = await res.json();
                        if (result.error) {
                            // ロールバック
                            setEntries(prev => prev.filter(e => e.id !== newEntry.id));
                            showToast(result.error, 'error');
                            return null;
                        }
                    }
                    // キャッシュ更新
                    try {
                        const cached = JSON.parse(localStorage.getItem(CASHBOOK_CACHE_KEY) || '{}');
                        cached.entries = [newEntry, ...(cached.entries || [])];
                        cached.ts = Date.now();
                        localStorage.setItem(CASHBOOK_CACHE_KEY, JSON.stringify(cached));
                    } catch(e) {}
                    return newEntry;
                } catch (e) {
                    showToast('保存に失敗しました（オフライン？）', 'error');
                    return newEntry; // ローカルには残す
                } finally {
                    setSaving(false);
                }
            }, [getOperator, isDayClosed]);

            // エントリー更新（スプレッドシートファースト）
            const updateEntry = useCallback(async (entryId, updates) => {
                const target = entries.find(e => e.id === entryId);
                if (target && isDayClosed(target.date, target.store)) {
                    showToast('この日は締め済みのため編集できません', 'error');
                    return false;
                }
                // 楽観的更新
                const oldEntries = [...entries];
                setEntries(prev => prev.map(e => e.id === entryId ? { ...e, ...updates, updatedAt: new Date().toISOString(), updatedBy: getOperator() } : e));
                setSaving(true);

                try {
                    if (UNIFIED_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                        const res = await fetch(UNIFIED_GAS_URL, {
                            method: 'POST', headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({ type: 'cashbook', action: 'updateEntry', entryId, updates, operator: getOperator() })
                        });
                        const result = await res.json();
                        if (result.error) {
                            setEntries(oldEntries); // ロールバック
                            showToast(result.error, 'error');
                            return false;
                        }
                    }
                    return true;
                } catch (e) {
                    showToast('更新に失敗しました', 'error');
                    return true; // ローカルには残す
                } finally {
                    setSaving(false);
                }
            }, [entries, getOperator, isDayClosed]);

            // エントリー削除（論理削除）
            const deleteEntry = useCallback(async (entryId) => {
                const target = entries.find(e => e.id === entryId);
                if (target && isDayClosed(target.date, target.store)) {
                    showToast('この日は締め済みのため削除できません', 'error');
                    return false;
                }
                const oldEntries = [...entries];
                setEntries(prev => prev.filter(e => e.id !== entryId));
                setSaving(true);

                try {
                    if (UNIFIED_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                        const res = await fetch(UNIFIED_GAS_URL, {
                            method: 'POST', headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({ type: 'cashbook', action: 'deleteEntry', entryId, operator: getOperator() })
                        });
                        const result = await res.json();
                        if (result.error) {
                            setEntries(oldEntries);
                            showToast(result.error, 'error');
                            return false;
                        }
                    }
                    return true;
                } catch (e) {
                    showToast('削除に失敗しました', 'error');
                    return true;
                } finally {
                    setSaving(false);
                }
            }, [entries, getOperator, isDayClosed]);

            // 日次締め
            const closeDailyBooks = useCallback(async (date, storeId, balances, notes) => {
                setSaving(true);
                try {
                    if (UNIFIED_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                        const res = await fetch(UNIFIED_GAS_URL, {
                            method: 'POST', headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({
                                type: 'cashbook', action: 'dailyClose',
                                date, storeId,
                                safeBalance: balances.safe || 0,
                                pettyCashBalance: balances.pettyCash || 0,
                                registerBalance: balances.register || 0,
                                closedBy: getOperator(),
                                notes: notes || ''
                            })
                        });
                        const result = await res.json();
                        if (result.error) {
                            showToast(result.error, 'error');
                            return false;
                        }
                        setDailyCloses(prev => [...prev, { date, storeId, safeBalance: balances.safe || 0, pettyCashBalance: balances.pettyCash || 0, registerBalance: balances.register || 0, closedBy: getOperator(), closedAt: new Date().toISOString(), locked: true }]);
                        showToast(date + ' の日次締めが完了しました', 'success');
                        return true;
                    }
                } catch (e) {
                    showToast('日次締めに失敗しました', 'error');
                    return false;
                } finally {
                    setSaving(false);
                }
            }, [getOperator]);

            // 手動リフレッシュ
            const refresh = useCallback(() => fetchFromGAS(true), [fetchFromGAS]);

            return {
                entries, dailyCloses, auditLogs, saving, loading, lastSynced, syncError,
                addEntry, updateEntry, deleteEntry, closeDailyBooks, isDayClosed, refresh
            };
        };

        // ========================================
        // カウンセリングデータ連携（5店舗対応）
        // ========================================
        const COUNSELING_GAS_URL = UNIFIED_GAS_URL;

        const COUNSELING_STORES = [
            { id: 'honatsugi', name: '本厚木店' },
            { id: 'yamato', name: '大和店' },
            { id: 'yokohama', name: '横浜店' },
            { id: 'machida', name: '町田店' },
            { id: 'kawaguchi', name: '川口店' }
        ];

        // スタッフ権限のSquare店舗IDからカウンセリング店舗を特定するヘルパー
        // currentAccess.storeIds（Square ID）→ serverStores（name）→ COUNSELING_STORES（id）
        const getAllowedCounselingStores = () => {
            if (!currentAccess || !currentAccess.storeIds || currentAccess.storeIds.length === 0) {
                return COUNSELING_STORES; // 管理者は全店舗
            }
            // serverStores未ロード時はマッピング不可のため全店舗を仮表示
            // （ConceptFormViewのuseEffectでロード後に再検証される）
            if (serverStores.length === 0) {
                return COUNSELING_STORES;
            }
            // Square IDから店舗名を取得し、カウンセリング店舗名と照合
            const allowedNames = currentAccess.storeIds.map(sid => {
                const s = serverStores.find(st => st.id === sid);
                return s ? s.name : sid;
            });
            const allowed = COUNSELING_STORES.filter(cs =>
                allowedNames.includes(cs.name)
            );
            // マッピング解決済みだが一致なし → アクセス権なしとして空配列を返さず最低1店舗は表示
            return allowed.length > 0 ? allowed : [];
        };

        const useCounselingData = () => {
            const [customers, setCustomers] = useState([]);
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            const [loading, setLoading] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [counselingStore, setCounselingStore] = useState(() => {
                const saved = localStorage.getItem('vivie_counseling_store') || 'honatsugi';
                // 権限のある店舗のみ許可（Square IDと名前ベースで照合）
                const allowed = getAllowedCounselingStores();
                if (allowed.length > 0 && allowed.length < COUNSELING_STORES.length) {
                    // 制限あり: 保存値が許可リストにあればそれを使う
                    if (allowed.find(s => s.id === saved)) return saved;
                    return allowed[0].id;
                }
                return saved;
            });

            const storeParam = '&store=' + counselingStore;

            const fetchCustomerList = useCallback(async () => {
                if (COUNSELING_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                setLoading(true);
                try {
                    const url = COUNSELING_GAS_URL + '?type=counseling&action=recent&limit=50' + storeParam;
                    console.log('[カウンセリング] 顧客一覧取得:', url);
                    const res = await fetch(url);
                    const data = await res.json();
                    console.log('[カウンセリング] 一覧レスポンス _debug:', JSON.stringify(data._debug || {}));
                    if (data && data.customers) {
                        setCustomers(data.customers);
                        // 最初の顧客のconcernsをログ
                        if (data.customers.length > 0) {
                            console.log('[カウンセリング] 最初の顧客concerns:', data.customers[0].concerns);
                        }
                    }
                    if (data && data.error) {
                        console.error('[カウンセリング] GASエラー:', data.error);
                    }
                } catch (e) {
                    console.error('カウンセリングデータ取得エラー:', e);
                } finally {
                    setLoading(false);
                }
            }, [storeParam]);

            const searchCustomers = useCallback(async (q) => {
                if (COUNSELING_GAS_URL === 'YOUR_UNIFIED_GAS_URL' || !q) return;
                setLoading(true);
                try {
                    const res = await fetch(COUNSELING_GAS_URL + '?type=counseling&action=search&q=' + encodeURIComponent(q) + storeParam);
                    const data = await res.json();
                    if (data && data.customers) {
                        setCustomers(data.customers);
                    }
                } catch (e) {
                    console.error('検索エラー:', e);
                } finally {
                    setLoading(false);
                }
            }, [storeParam]);

            const fetchCustomerDetail = useCallback(async (name, index) => {
                if (COUNSELING_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return null;
                setLoading(true);
                try {
                    let url = COUNSELING_GAS_URL + '?type=counseling&action=detail' + storeParam;
                    if (index !== undefined) url += '&index=' + index;
                    else if (name) url += '&name=' + encodeURIComponent(name);
                    console.log('[カウンセリング] detail URL:', url);
                    const res = await fetch(url);
                    const data = await res.json();
                    console.log('[カウンセリング] GASレスポンス:', JSON.stringify(data._debug || {}));
                    if (data && data.customer) {
                        // 免責事項テキストが treatmentExperience に混入している場合を除外
                        if (data.customer.treatmentExperience) {
                            data.customer.treatmentExperience = data.customer.treatmentExperience.filter(v =>
                                !v.includes('異議を申し立て') && !v.includes('上記の内容を理解') &&
                                !v.includes('同意します') && !v.includes('施術をうけ') && v.length < 30
                            );
                        }
                        setSelectedCustomer(data.customer);
                        return data.customer;
                    }
                    if (data && data.error) {
                        console.error('[カウンセリング] GASエラー:', data.error);
                    }
                } catch (e) {
                    console.error('顧客詳細取得エラー:', e);
                } finally {
                    setLoading(false);
                }
                return null;
            }, [storeParam]);

            // 店舗変更時にリロード
            useEffect(() => {
                localStorage.setItem('vivie_counseling_store', counselingStore);
                setCustomers([]);
                setSelectedCustomer(null);
                fetchCustomerList();
            }, [counselingStore, fetchCustomerList]);

            return {
                customers, selectedCustomer, setSelectedCustomer,
                loading, searchQuery, setSearchQuery,
                fetchCustomerList, searchCustomers, fetchCustomerDetail,
                counselingStore, setCounselingStore
            };
        };

        // ========================================
        // LINE チャット管理
        // ========================================

        const useLineChat = () => {
            const [lineConfig, setLineConfig] = useState({ configured: false, stores: [] });
            const [threads, setThreads] = useState([]);
            const [profiles, setProfiles] = useState({});
            const [messages, setMessages] = useState([]);
            const [selectedThread, setSelectedThread] = useState(null);
            const [lineStoreId, setLineStoreId] = useState('');
            const [loading, setLoading] = useState(false);
            const [sending, setSending] = useState(false);
            const [configError, setConfigError] = useState(null);
            const [gasStatus, setGasStatus] = useState('checking'); // 'checking' | 'connected' | 'error'
            const [gasError, setGasError] = useState(null);

            // LINE設定を取得
            useEffect(() => {
                fetch('/api/line/config')
                    .then(r => {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.json();
                    })
                    .then(data => {
                        console.log('[LINE] config:', data);
                        setLineConfig(data);
                        console.log('[LINE] stores:', data.stores, 'current lineStoreId:', lineStoreId);
                        if (data.stores && data.stores.length > 0 && !lineStoreId) {
                            console.log('[LINE] setting lineStoreId to:', data.stores[0].id);
                            setLineStoreId(data.stores[0].id);
                        }
                    })
                    .catch(e => {
                        console.error('[LINE] config取得エラー:', e);
                        setConfigError(e.message);
                    });
            }, []);

            // スレッド一覧を取得
            const fetchThreads = useCallback(async (storeId) => {
                const sid = storeId || lineStoreId;
                console.log('[LINE] fetchThreads called, sid:', sid, 'GAS_URL:', UNIFIED_GAS_URL.substring(0, 50) + '...');
                if (!sid || UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') {
                    console.warn('[LINE] fetchThreads skipped');
                    return;
                }
                setLoading(true);
                setGasStatus('checking');
                setGasError(null);
                try {
                    console.log('[LINE] fetching threads, store:', sid);
                    const [threadsRes, profilesRes] = await Promise.all([
                        fetchGAS('?type=lineMessages&store=' + sid),
                        fetchGAS('?type=lineProfiles&store=' + sid),
                    ]);
                    console.log('[LINE] threadsRes:', JSON.stringify(threadsRes).substring(0, 200));
                    console.log('[LINE] profilesRes:', JSON.stringify(profilesRes).substring(0, 200));
                    if (threadsRes.error || profilesRes.error) {
                        const errMsg = threadsRes.error || profilesRes.error;
                        setGasStatus('error');
                        setGasError(errMsg);
                        console.error('[LINE] GASエラー:', errMsg);
                    } else {
                        setGasStatus('connected');
                    }
                    if (threadsRes.threads) setThreads(threadsRes.threads);
                    if (profilesRes.profiles) {
                        const map = {};
                        profilesRes.profiles.forEach(p => { map[p.userId] = p; });
                        setProfiles(map);
                    }
                } catch (e) {
                    console.error('[LINE] スレッド取得エラー:', e);
                    setGasStatus('error');
                    setGasError(e.message || '接続エラー');
                } finally {
                    setLoading(false);
                }
            }, [lineStoreId]);

            // 店舗変更時にスレッド再取得
            useEffect(() => {
                console.log('[LINE] useEffect lineStoreId changed:', lineStoreId);
                if (lineStoreId) fetchThreads(lineStoreId);
            }, [lineStoreId]);

            // メッセージ取得
            const fetchMessages = useCallback(async (userId) => {
                if (!lineStoreId || !userId || UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                setLoading(true);
                try {
                    const data = await fetchGAS('?type=lineMessages&store=' + lineStoreId + '&userId=' + encodeURIComponent(userId) + '&limit=200');
                    if (data.messages) setMessages(data.messages);
                } catch (e) {
                    console.error('LINE メッセージ取得エラー:', e);
                } finally {
                    setLoading(false);
                }
            }, [lineStoreId]);

            // メッセージ送信
            const sendMessage = useCallback(async (userId, text) => {
                if (!lineStoreId || !userId || !text) return false;
                setSending(true);
                try {
                    // LINE APIでプッシュ送信
                    const pushRes = await fetch('/api/line/message/push', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Store-Id': lineStoreId },
                        body: JSON.stringify({
                            to: userId,
                            messages: [{ type: 'text', text }],
                        }),
                    });

                    if (!pushRes.ok) {
                        const err = await pushRes.json().catch(() => ({}));
                        console.error('LINE送信エラー:', err);
                        return false;
                    }

                    // GASに送信記録を保存
                    if (UNIFIED_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                        await fetch(UNIFIED_GAS_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({
                                type: 'lineSend',
                                storeId: lineStoreId,
                                userId,
                                messageText: text,
                            }),
                        }).catch(() => {});
                    }

                    // メッセージ一覧を更新
                    setMessages(prev => [...prev, {
                        timestamp: new Date().toISOString(),
                        storeId: lineStoreId,
                        userId,
                        direction: 'sent',
                        messageType: 'text',
                        messageText: text,
                        messageId: '',
                    }]);

                    return true;
                } catch (e) {
                    console.error('LINE送信エラー:', e);
                    return false;
                } finally {
                    setSending(false);
                }
            }, [lineStoreId]);

            // Flex Message送信（施術レポート用）
            const sendFlexMessage = useCallback(async (userId, flexMessage) => {
                if (!lineStoreId || !userId || !flexMessage) return false;
                setSending(true);
                try {
                    const pushRes = await fetch('/api/line/message/push', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Store-Id': lineStoreId },
                        body: JSON.stringify({
                            to: userId,
                            messages: [flexMessage],
                        }),
                    });

                    if (!pushRes.ok) {
                        const err = await pushRes.json().catch(() => ({}));
                        console.error('LINE Flex送信エラー:', err);
                        return false;
                    }

                    // GASに送信記録を保存
                    if (UNIFIED_GAS_URL !== 'YOUR_UNIFIED_GAS_URL') {
                        await fetch(UNIFIED_GAS_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({
                                type: 'lineSend',
                                storeId: lineStoreId,
                                userId,
                                messageText: '[施術レポート] ' + (flexMessage.altText || ''),
                            }),
                        }).catch(() => {});
                    }

                    return true;
                } catch (e) {
                    console.error('LINE Flex送信エラー:', e);
                    return false;
                } finally {
                    setSending(false);
                }
            }, [lineStoreId]);

            // スレッドを開く
            const openThread = useCallback((thread) => {
                setSelectedThread(thread);
                fetchMessages(thread.userId);
            }, [fetchMessages]);

            // === 一斉配信 ===
            const [broadcasts, setBroadcasts] = useState([]);
            const [broadcastSending, setBroadcastSending] = useState(false);

            const fetchBroadcasts = useCallback(async () => {
                if (!lineStoreId || UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                try {
                    const data = await fetchGAS('?type=lineBroadcasts&store=' + lineStoreId);
                    if (data.broadcasts) setBroadcasts(data.broadcasts);
                } catch (e) { console.error('[LINE] 配信履歴取得エラー:', e); }
            }, [lineStoreId]);

            const sendBroadcast = useCallback(async (messageText, userIds) => {
                if (!lineStoreId || !messageText) return false;
                setBroadcastSending(true);
                try {
                    const msgs = [{ type: 'text', text: messageText }];
                    const body = userIds && userIds.length > 0
                        ? { messages: msgs, userIds, type: 'multicast' }
                        : { messages: msgs, type: 'broadcast' };
                    const res = await fetch('/api/line/broadcast', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Store-Id': lineStoreId },
                        body: JSON.stringify(body),
                    });
                    if (!res.ok) { const err = await res.json().catch(() => ({})); console.error('配信エラー:', err); return false; }
                    await fetchBroadcasts();
                    return true;
                } catch (e) { console.error('配信エラー:', e); return false; }
                finally { setBroadcastSending(false); }
            }, [lineStoreId, fetchBroadcasts]);

            // === テンプレート ===
            const [templates, setTemplates] = useState([]);

            const fetchTemplates = useCallback(async () => {
                if (!lineStoreId || UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                try {
                    const data = await fetchGAS('?type=lineTemplates&store=' + lineStoreId);
                    if (data.templates) setTemplates(data.templates);
                } catch (e) { console.error('[LINE] テンプレート取得エラー:', e); }
            }, [lineStoreId]);

            const saveTemplate = useCallback(async (tmplData) => {
                if (UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return false;
                try {
                    await fetch(UNIFIED_GAS_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ type: 'lineTemplate', storeId: lineStoreId, ...tmplData }),
                    });
                    await fetchTemplates();
                    return true;
                } catch (e) { console.error('テンプレート保存エラー:', e); return false; }
            }, [lineStoreId, fetchTemplates]);

            // === 自動応答 ===
            const [autoReplies, setAutoReplies] = useState([]);

            const fetchAutoReplies = useCallback(async () => {
                if (!lineStoreId || UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                try {
                    const data = await fetchGAS('?type=lineAutoReplies&store=' + lineStoreId);
                    if (data.rules) setAutoReplies(data.rules);
                } catch (e) { console.error('[LINE] 自動応答取得エラー:', e); }
            }, [lineStoreId]);

            const saveAutoReply = useCallback(async (ruleData) => {
                if (UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return false;
                try {
                    await fetch(UNIFIED_GAS_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ type: 'lineAutoReply', storeId: lineStoreId, ...ruleData }),
                    });
                    await fetchAutoReplies();
                    return true;
                } catch (e) { console.error('自動応答保存エラー:', e); return false; }
            }, [lineStoreId, fetchAutoReplies]);

            // === タグ ===
            const [tags, setTags] = useState([]);
            const [userTags, setUserTags] = useState([]);

            const fetchTags = useCallback(async () => {
                if (!lineStoreId || UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return;
                try {
                    const [tagsRes, utRes] = await Promise.all([
                        fetchGAS('?type=lineTags&store=' + lineStoreId),
                        fetchGAS('?type=lineUserTags&store=' + lineStoreId),
                    ]);
                    if (tagsRes.tags) setTags(tagsRes.tags);
                    if (utRes.userTags) setUserTags(utRes.userTags);
                } catch (e) { console.error('[LINE] タグ取得エラー:', e); }
            }, [lineStoreId]);

            const saveTag = useCallback(async (tagData) => {
                if (UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return false;
                try {
                    await fetch(UNIFIED_GAS_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ type: 'lineTag', storeId: lineStoreId, ...tagData }),
                    });
                    await fetchTags();
                    return true;
                } catch (e) { console.error('タグ保存エラー:', e); return false; }
            }, [lineStoreId, fetchTags]);

            const saveUserTag = useCallback(async (utData) => {
                if (UNIFIED_GAS_URL === 'YOUR_UNIFIED_GAS_URL') return false;
                try {
                    await fetch(UNIFIED_GAS_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ type: 'lineUserTag', storeId: lineStoreId, ...utData }),
                    });
