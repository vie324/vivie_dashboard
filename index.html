                                    zero: 'border-amber-200 bg-amber-50/20',
                                    low: 'border-slate-200 bg-white/40',
                                    mid: 'border-vivie-200 bg-vivie-50/20',
                                    high: 'border-emerald-200 bg-emerald-50/20',
                                }[usageLevel];

                            return (
                                <div key={member.id} className={`glass-card !rounded-2xl p-4 ${cardBorder} hover:!transform-none`}>
                                    {/* ヘッダー: 名前 + 更新日 */}
                                    <div className="flex items-center mb-3">
                                        <Avatar name={member.name} size={38} />
                                        <div className="ml-3 flex-1 min-w-0">
                                            <p className="font-bold text-slate-800 text-sm truncate">{member.name}</p>
                                            <p className="text-[11px] text-slate-400 truncate">{member.planName}{member.storeName ? ` / ${member.storeName}` : ''}</p>
                                        </div>
                                    </div>

                                    {/* 請求期間バー */}
                                    {billing && (
                                        <div className="bg-slate-50/80 rounded-xl p-2.5 mb-3">
                                            <div className="flex items-center justify-between mb-1.5">
                                                <span className="text-[10px] text-slate-400 font-medium">
                                                    請求期間: {formatDateShort(billing.periodStart)} 〜 {formatDateShort(billing.periodEnd)}
                                                </span>
                                                <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${
                                                    billing.daysUntilRenewal <= 3 ? 'bg-red-100 text-red-600'
                                                    : billing.daysUntilRenewal <= 7 ? 'bg-blue-100 text-blue-600'
                                                    : 'bg-slate-100 text-slate-500'
                                                }`}>
                                                    あと{billing.daysUntilRenewal}日
                                                </span>
                                            </div>
                                            <div className="w-full bg-slate-200 rounded-full h-1.5">
                                                <div
                                                    className="h-1.5 rounded-full transition-all duration-700"
                                                    style={{
                                                        width: `${billing.progressPct}%`,
                                                        background: billing.daysUntilRenewal <= 3 ? '#ef4444'
                                                            : billing.daysUntilRenewal <= 7 ? '#3b82f6'
                                                            : '#DCA9A8'
                                                    }}
                                                ></div>
                                            </div>
                                            <div className="flex items-center justify-between mt-1.5">
                                                <span className="text-[10px] text-slate-400">
                                                    更新日: 毎月<span className="font-bold text-slate-600">{billing.regDay}</span>日
                                                </span>
                                                <span className="text-[10px] text-slate-400">
                                                    次回: <span className="font-bold text-slate-600">{formatDateShort(billing.nextRenewal)}</span>
                                                </span>
                                            </div>
                                        </div>
                                    )}

                                    {/* 残回数表示（上限設定がある場合） */}
                                    {member.remaining !== null && (
                                        <div className="bg-gradient-to-r from-violet-50 to-blue-50 rounded-xl p-2.5 mb-3 border border-violet-100">
                                            <div className="flex items-center justify-between mb-1">
                                                <span className="text-[10px] text-violet-600 font-semibold">残回数</span>
                                                <span className="text-[10px] text-slate-400">
                                                    上限: {member.planLimit}回{member.carryover > 0 ? ` + 繰越${member.carryover}回` : ''}
                                                </span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="flex-1">
                                                    <div className="w-full bg-violet-200/50 rounded-full h-2">
                                                        <div className="h-2 rounded-full transition-all duration-500"
                                                            style={{
                                                                width: `${member.totalAllowed > 0 ? Math.min(100, (count / member.totalAllowed) * 100) : 0}%`,
                                                                background: member.remaining <= 0 ? '#ef4444' : member.remaining <= 2 ? '#f59e0b' : '#8b5cf6'
                                                            }}
                                                        ></div>
                                                    </div>
                                                </div>
                                                <span className={`text-lg font-extrabold tabular-nums ${member.remaining <= 0 ? 'text-red-500' : member.remaining <= 2 ? 'text-amber-500' : 'text-violet-600'}`}>
                                                    {member.remaining}
                                                </span>
                                                <span className="text-[10px] text-slate-400">回</span>
                                            </div>
                                        </div>
                                    )}

                                    {/* 利用回数入力 */}
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <button
                                                onClick={() => updateUsage(member.id, count - 1, periodKey)}
                                                disabled={count <= 0}
                                                className="w-10 h-10 rounded-xl bg-white/80 border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-all disabled:opacity-30 active:scale-95"
                                            >
                                                <Icon name="minus" size={18} />
                                            </button>
                                            {editingUsageCount === member.id ? (
                                                <input type="number" min="0" autoFocus
                                                    defaultValue={count}
                                                    onBlur={(e) => { updateUsage(member.id, parseInt(e.target.value) || 0, periodKey); setEditingUsageCount(null); }}
                                                    onKeyDown={(e) => { if (e.key === 'Enter') { updateUsage(member.id, parseInt(e.target.value) || 0, periodKey); setEditingUsageCount(null); } }}
                                                    className="w-16 text-center text-2xl font-extrabold text-slate-800 border-2 border-vivie-400 rounded-lg py-1 outline-none" />
                                            ) : (
                                                <div className="w-16 text-center cursor-pointer" onClick={() => setEditingUsageCount(member.id)} title="クリックで直接入力">
                                                    <span className="text-3xl font-extrabold text-slate-800 tabular-nums">{count}</span>
                                                    <p className="text-[9px] text-slate-400 -mt-0.5">回（タップで編集）</p>
                                                </div>
                                            )}
                                            <button
                                                onClick={() => updateUsage(member.id, count + 1, periodKey)}
                                                className="w-10 h-10 rounded-xl bg-white/80 border border-slate-200 flex items-center justify-center text-slate-500 hover:bg-vivie-50 hover:text-vivie-600 hover:border-vivie-200 transition-all active:scale-95"
                                            >
                                                <Icon name="plus" size={18} />
                                            </button>
                                        </div>
                                        <div className="flex flex-col items-end gap-1">
                                            {member.remaining !== null && member.remaining <= 0 && count > 0 && (
                                                <span className="text-[10px] font-semibold text-red-600 bg-red-100 px-2 py-0.5 rounded-lg">上限到達</span>
                                            )}
                                            {count === 0 && (
                                                <span className="text-[10px] font-semibold text-amber-600 bg-amber-100 px-2 py-0.5 rounded-lg">未利用</span>
                                            )}
                                            {count > 0 && (member.remaining === null || member.remaining > 0) && count <= 2 && (
                                                <span className="text-[10px] font-semibold text-blue-600 bg-blue-100 px-2 py-0.5 rounded-lg">少なめ</span>
                                            )}
                                            {count > 2 && count <= 5 && (member.remaining === null || member.remaining > 0) && (
                                                <span className="text-[10px] font-semibold text-vivie-600 bg-vivie-100 px-2 py-0.5 rounded-lg">通常</span>
                                            )}
                                            {count > 5 && (member.remaining === null || member.remaining > 0) && (
                                                <span className="text-[10px] font-semibold text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded-lg">多い</span>
                                            )}
                                            {isRenewingSoon && (
                                                <span className="text-[10px] font-semibold text-blue-600 bg-blue-100 px-2 py-0.5 rounded-lg flex items-center">
                                                    <Icon name="clock" size={10} className="mr-0.5" />更新間近
                                                </span>
                                            )}
                                        </div>
                                    </div>

                                    {/* 繰越設定 */}
                                    <div className="mt-2 flex items-center justify-between">
                                        {editingCarryover === member.id ? (
                                            <div className="flex items-center gap-2 animate-scale-in">
                                                <span className="text-[10px] text-violet-600 font-medium">繰越回数:</span>
                                                <input type="number" min="0" autoFocus defaultValue={member.carryover}
                                                    onBlur={(e) => { setCarryover(member.id, periodKey, parseInt(e.target.value) || 0); setEditingCarryover(null); }}
                                                    onKeyDown={(e) => { if (e.key === 'Enter') { setCarryover(member.id, periodKey, parseInt(e.target.value) || 0); setEditingCarryover(null); } }}
                                                    className="w-14 px-2 py-1 border border-violet-300 rounded-lg text-sm text-center outline-none" />
                                                <span className="text-[10px] text-slate-400">回</span>
                                            </div>
                                        ) : (
                                            <button onClick={() => setEditingCarryover(member.id)}
                                                className="text-[10px] text-violet-500 hover:text-violet-700 font-medium flex items-center transition-colors">
                                                <Icon name="arrow-right-left" size={10} className="mr-0.5" />
                                                繰越: {member.carryover > 0 ? `${member.carryover}回` : '設定'}
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {activeMembers.length === 0 && (
                        <div className="text-center py-12 text-slate-400">
                            <div className="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-3">
                                <Icon name="clipboard-x" size={28} className="text-slate-300" />
                            </div>
                            <p className="font-medium">アクティブ会員がいません</p>
                        </div>
                    )}

                    {/* 保存情報 */}
                    <Card className="!bg-slate-50/60">
                        <div className="flex items-start">
                            <Icon name="info" size={18} className="text-vivie-500 mr-3 mt-0.5 flex-shrink-0" />
                            <div className="text-sm text-slate-600">
                                <p className="font-semibold text-slate-700 mb-1">利用回数の記録について</p>
                                <p>各会員の利用回数はサブスク更新日ごとの請求期間で管理されます。更新日を迎えると自動的に新しい期間にリセットされます。</p>
                                <p className="mt-1.5">例: 15日登録の会員 → 毎月15日〜翌月14日が1期間</p>
                                <p className="mt-1">31日登録の会員 → 2月は28日(29日)、4月は30日が更新日になります</p>
                                <p className="mt-1.5 text-vivie-600 font-medium">データは30秒ごとに自動同期されます。どのデバイスから操作しても即時反映されます。</p>
                                <div className="flex flex-wrap gap-3 mt-2">
                                    {lastSaved && (
                                        <p className="text-xs text-vivie-500">最終保存: {lastSaved.toLocaleString('ja-JP')}</p>
                                    )}
                                    {lastSynced && (
                                        <p className="text-xs text-blue-500">最終同期: {lastSynced.toLocaleString('ja-JP')}</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    </Card>
                </div>
            );
        };

        // ========================================
        // スタッフ管理セクション
        // ========================================

        const StaffManagementSection = () => {
            const [staffList, setStaffList] = useState([]);
            const [editingStaff, setEditingStaff] = useState(null);
            const [isAdding, setIsAdding] = useState(false);
            const [copiedId, setCopiedId] = useState(null);
            const [gasSyncing, setGasSyncing] = useState(false);
            const [gasConnected, setGasConnected] = useState(false);
            const [showInactive, setShowInactive] = useState(false);
            const [formData, setFormData] = useState({ name: '', role: 'staff', password: '', storeIds: [] });

            // GASからスタッフリストを初回取得（inactive含む）
            useEffect(() => {
                (async () => {
                    const gasStaff = await fetchStaffFromGas(true);
                    if (gasStaff) {
                        setStaffList(gasStaff);
                        saveStaffListLocal(gasStaff);
                        setGasConnected(true);
                    } else {
                        setStaffList(loadStaffList());
                    }
                })();
            }, []);

            const activeStaff = staffList.filter(s => s.status !== 'inactive');
            const inactiveStaff = staffList.filter(s => s.status === 'inactive');

            const handleSave = async () => {
                if (!formData.name.trim()) return;
                let updated;
                if (editingStaff) {
                    // 編集: 個別更新
                    const changes = { name: formData.name, role: formData.role, password: formData.password, storeIds: formData.storeIds };
                    updated = staffList.map(s => s.id === editingStaff.id ? { ...s, ...changes } : s);
                    setStaffList(updated);
                    saveStaffListLocal(updated);
                    setGasSyncing(true);
                    await updateStaffGas(editingStaff.id, changes);
                    setGasSyncing(false);
                    // 名前・店舗・役割が変わった場合、URLも変わるので注意喚起
                    const nameChanged = editingStaff.name !== formData.name;
                    const storeChanged = JSON.stringify(editingStaff.storeIds || []) !== JSON.stringify(formData.storeIds);
                    const roleChanged = editingStaff.role !== formData.role;
                    if (nameChanged || storeChanged || roleChanged) {
                        showToast(`「${formData.name}」を更新しました。URLが変更されたため、再度コピーしてください`, 'info', 5000);
                    } else {
                        showToast(`「${formData.name}」を更新しました`, 'success', 2000);
                    }
                } else {
                    // 新規追加
                    const newStaff = { ...formData, id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), createdAt: new Date().toISOString().slice(0, 10), status: 'active' };
                    updated = [...staffList, newStaff];
                    setStaffList(updated);
                    saveStaffListLocal(updated);
                    setGasSyncing(true);
                    await saveStaffToGas(updated);
                    setGasSyncing(false);
                    showToast(`「${formData.name}」を追加しました`, 'success', 2000);
                }
                setEditingStaff(null);
                setIsAdding(false);
                setFormData({ name: '', role: 'staff', password: '', storeIds: [] });
            };

            const handleSoftDelete = async (id) => {
                if (!confirm('このスタッフを無効にしますか？（データは保持されます）')) return;
                const staff = staffList.find(s => s.id === id);
                setStaffList(prev => {
                    const updated = prev.map(s => s.id === id ? { ...s, status: 'inactive' } : s);
                    saveStaffListLocal(updated);
                    return updated;
                });
                setGasSyncing(true);
                await softDeleteStaffGas(id);
                setGasSyncing(false);
                showToast(`「${staff?.name || ''}」を無効にしました`, 'success', 2000);
            };

            const handleRestore = async (id) => {
                const staff = staffList.find(s => s.id === id);
                setStaffList(prev => {
                    const updated = prev.map(s => s.id === id ? { ...s, status: 'active' } : s);
                    saveStaffListLocal(updated);
                    return updated;
                });
                setGasSyncing(true);
                await restoreStaffGas(id);
                setGasSyncing(false);
                showToast(`「${staff?.name || ''}」を復元しました`, 'success', 2000);
            };

            const handleEdit = (staff) => {
                setFormData({ name: staff.name, role: staff.role, password: staff.password || '', storeIds: staff.storeIds || [] });
                setEditingStaff(staff);
                setIsAdding(true);
            };

            const handleCopyUrl = (staff) => {
                const url = generateStaffUrl(staff);
                navigator.clipboard.writeText(url).then(() => {
                    setCopiedId(staff.id);
                    setTimeout(() => setCopiedId(null), 2000);
                });
            };

            const toggleStoreId = (storeId) => {
                setFormData(prev => ({
                    ...prev,
                    storeIds: prev.storeIds.includes(storeId)
                        ? prev.storeIds.filter(id => id !== storeId)
                        : [...prev.storeIds, storeId]
                }));
            };

            const StaffRow = ({ staff, inactive }) => (
                <div className={`p-4 rounded-xl border transition-all ${inactive ? 'bg-slate-50/50 border-slate-200 opacity-60' : 'bg-white border-slate-200 hover:border-vivie-200'}`}>
                    <div className="flex items-start justify-between">
                        <div className="flex items-center">
                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${inactive ? 'bg-slate-100 text-slate-400' : staff.role === 'headquarter' ? 'bg-violet-50 text-violet-600' : staff.role === 'manager' ? 'bg-amber-50 text-amber-600' : 'bg-vivie-50 text-vivie-600'}`}>
                                <Icon name={staff.role === 'headquarter' ? 'building' : staff.role === 'manager' ? 'shield' : 'user'} size={20} />
                            </div>
                            <div className="ml-3">
                                <p className={`font-semibold ${inactive ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{staff.name}</p>
                                <div className="flex items-center gap-2 mt-0.5 flex-wrap">
                                    <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${inactive ? 'bg-slate-100 text-slate-400' : staff.role === 'headquarter' ? 'bg-violet-100 text-violet-700' : staff.role === 'manager' ? 'bg-amber-100 text-amber-700' : 'bg-vivie-100 text-vivie-700'}`}>
                                        {staff.role === 'headquarter' ? '本部' : staff.role === 'manager' ? '店舗責任者' : 'スタッフ'}
                                    </span>
                                    {inactive && <span className="text-xs px-2 py-0.5 rounded-full bg-red-50 text-red-500 font-medium">無効</span>}
                                    {!inactive && staff.password && (
                                        <span className="text-xs px-2 py-0.5 rounded-full bg-blue-50 text-blue-600 font-medium">
                                            <Icon name="lock" size={10} className="inline mr-0.5" />PW設定済
                                        </span>
                                    )}
                                    <span className="text-xs text-slate-400">
                                        {(staff.storeIds || []).map(sid => {
                                            const store = serverStores.find(s => s.id === sid);
                                            return store ? store.name : `店舗${sid}`;
                                        }).join(', ')}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-1">
                            {inactive ? (
                                <button
                                    onClick={() => handleRestore(staff.id)}
                                    className="flex items-center px-2.5 py-1.5 rounded-lg text-xs font-medium bg-vivie-50 hover:bg-vivie-100 text-vivie-600 transition-all"
                                    title="復元"
                                >
                                    <Icon name="rotate-ccw" size={14} className="mr-1" />復元
                                </button>
                            ) : (
                                <>
                                    <button
                                        onClick={() => handleEdit(staff)}
                                        className="flex items-center px-2.5 py-1.5 rounded-lg text-xs font-medium bg-slate-100 hover:bg-amber-50 text-slate-600 hover:text-amber-700 transition-all"
                                        title="名前・店舗・パスワードを編集"
                                    >
                                        <Icon name="pencil" size={14} className="mr-1" />編集
                                    </button>
                                    <button
                                        onClick={() => handleCopyUrl(staff)}
                                        className={`flex items-center px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all ${copiedId === staff.id ? 'bg-green-100 text-green-700' : 'bg-slate-100 hover:bg-vivie-50 text-slate-600 hover:text-vivie-600'}`}
                                        title="URLをコピー"
                                    >
                                        <Icon name={copiedId === staff.id ? 'check' : 'link'} size={14} className="mr-1" />
                                        {copiedId === staff.id ? 'コピー済' : 'URL'}
                                    </button>
                                    <button
                                        onClick={() => handleSoftDelete(staff.id)}
                                        className="p-1.5 rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-500 transition-colors"
                                        title="無効にする"
                                    >
                                        <Icon name="user-minus" size={14} />
                                    </button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );

            return (
                <Card>
                    <div className="flex items-center justify-between mb-4">
                        <div>
                            <h3 className="text-lg font-semibold text-slate-900">スタッフ管理</h3>
                            <p className="text-xs text-vivie-500 tracking-wide mt-0.5">STAFF ACCESS MANAGEMENT</p>
                        </div>
                        {!isAdding && (
                            <button
                                onClick={() => { setIsAdding(true); setEditingStaff(null); setFormData({ name: '', role: 'staff', password: '', storeIds: [] }); }}
                                className="flex items-center px-3 py-2 bg-vivie-500 hover:bg-vivie-600 text-white rounded-xl text-sm font-medium shadow-lg shadow-vivie-500/25 transition-all"
                            >
                                <Icon name="user-plus" size={16} className="mr-1.5" />
                                スタッフを追加
                            </button>
                        )}
                    </div>

                    {/* 追加・編集フォーム */}
                    {isAdding && (
                        <div className="mb-6 p-4 bg-vivie-50/50 rounded-xl border border-vivie-200 animate-scale-in">
                            <h4 className="font-semibold text-slate-800 mb-3">
                                {editingStaff ? 'スタッフ編集' : '新規スタッフ追加'}
                            </h4>
                            {editingStaff && (
                                <div className="mb-3 px-3 py-2 bg-amber-50 rounded-lg border border-amber-200 text-xs text-amber-700">
                                    <Icon name="alert-triangle" size={12} className="inline mr-1" />
                                    名前・役割・店舗を変更すると共有URLが変わります。更新後はURLを再コピーしてください。
                                </div>
                            )}
                            <div className="space-y-3">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">名前</label>
                                    <input
                                        type="text"
                                        value={formData.name}
                                        onChange={(e) => setFormData(prev => ({ ...prev, name: e.target.value }))}
                                        placeholder="例: 田中太郎"
                                        className="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:border-vivie-400 focus:ring-1 focus:ring-vivie-400/30 outline-none"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">役割</label>
                                    <div className="flex gap-2 flex-wrap">
                                        <label className={`flex items-center px-4 py-2.5 rounded-xl border cursor-pointer transition-all ${formData.role === 'staff' ? 'bg-vivie-50 border-vivie-300 text-vivie-700' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}>
                                            <input type="radio" name="role" value="staff" checked={formData.role === 'staff'} onChange={() => setFormData(prev => ({ ...prev, role: 'staff' }))} className="sr-only" />
                                            <Icon name="user" size={16} className="mr-2" />
                                            <div>
                                                <p className="text-sm font-medium">スタッフ</p>
                                                <p className="text-[10px] text-slate-400">自店舗のみ閲覧</p>
                                            </div>
                                        </label>
                                        <label className={`flex items-center px-4 py-2.5 rounded-xl border cursor-pointer transition-all ${formData.role === 'manager' ? 'bg-vivie-50 border-vivie-300 text-vivie-700' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}>
                                            <input type="radio" name="role" value="manager" checked={formData.role === 'manager'} onChange={() => setFormData(prev => ({ ...prev, role: 'manager' }))} className="sr-only" />
                                            <Icon name="shield" size={16} className="mr-2" />
                                            <div>
                                                <p className="text-sm font-medium">店舗責任者</p>
                                                <p className="text-[10px] text-slate-400">複数店舗閲覧可</p>
                                            </div>
                                        </label>
                                        <label className={`flex items-center px-4 py-2.5 rounded-xl border cursor-pointer transition-all ${formData.role === 'headquarter' ? 'bg-violet-50 border-violet-300 text-violet-700' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}`}>
                                            <input type="radio" name="role" value="headquarter" checked={formData.role === 'headquarter'} onChange={() => setFormData(prev => ({ ...prev, role: 'headquarter', storeIds: serverStores.map(s => s.id) }))} className="sr-only" />
                                            <Icon name="building" size={16} className="mr-2" />
                                            <div>
                                                <p className="text-sm font-medium">本部</p>
                                                <p className="text-[10px] text-slate-400">全店舗アクセス</p>
                                            </div>
                                        </label>

        // ========================================
        // 店舗管理セクション

        const StoreManagementSection = () => {

            useEffect(() => {

            const handleSave = async () => {
                if (!formData.name.trim()) return;
                if (editingStore) {
                    // 編集
                    setStoreList(prev => prev.map(s => s.id === editingStore.id ? { ...s, name: formData.name, memo: formData.memo } : s));
                    setGasSyncing(true);
                    await updateStoreInGas({ id: editingStore.id, name: formData.name, memo: formData.memo });
                    setGasSyncing(false);
                } else {
                    // 新規追加
                    const storeId = formData.id.trim() || Date.now().toString(36);
                    if (storeList.find(s => s.id === storeId)) { alert('このIDは既に使われています'); return; }
                    const newStore = { id: storeId, name: formData.name, status: 'active', memo: formData.memo, createdAt: new Date().toISOString().slice(0, 10) };
                    setStoreList(prev => [...prev, newStore]);
                    setGasSyncing(true);
                    await addStoreToGas(newStore);
                    setGasSyncing(false);
                }
                setEditingStore(null);
                setIsAdding(false);
                setFormData({ id: '', name: '', memo: '' });

                if (!confirm('この店舗を無効にしますか？（データは保持されます）')) return;
                setStoreList(prev => prev.map(s => s.id === id ? { ...s, status: 'inactive' } : s));
                setGasSyncing(true);
                await softDeleteStoreGas(id);
                setGasSyncing(false);
            };

                setStoreList(prev => prev.map(s => s.id === id ? { ...s, status: 'active' } : s));

                await restoreStoreGas(id);
                setGasSyncing(false);

                                店舗を追加
                            </button>
                        )}
                    </div>

                    {/* 追加・編集フォーム */}
                    {isAdding && (
                        <div className="mb-6 p-4 bg-vivie-50/50 rounded-xl border border-vivie-200 animate-scale-in">
                            <h4 className="font-semibold text-slate-800 mb-3">
                                {editingStore ? '店舗編集' : '新規店舗追加'}
                            </h4>
                            <div className="space-y-3">
                                {!editingStore && (
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">
                                            店舗ID
                                            <span className="text-xs text-slate-400 ml-1">（空欄なら自動生成）</span>
                                        </label>
                                        <input
                                            type="text"
                                            value={formData.id}
                                            onChange={(e) => setFormData(prev => ({ ...prev, id: e.target.value }))}

                                            className="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:border-vivie-400 focus:ring-1 focus:ring-vivie-400/30 outline-none"
                                        />

                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">店舗名</label>
                                    <input
                                        type="text"
                                        value={formData.name}
                                        onChange={(e) => setFormData(prev => ({ ...prev, name: e.target.value }))}

                                        className="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:border-vivie-400 focus:ring-1 focus:ring-vivie-400/30 outline-none"

                    {/* Square連携店舗（読み取り専用） */}

                    {/* GAS管理店舗 */}

                                <div key={store.id} className="flex items-center px-4 py-3 bg-white rounded-xl border border-slate-200 hover:border-vivie-200 transition-colors">

                                        <p className="font-semibold text-slate-800 text-sm">{store.name}</p>

                                        </div>
                                    </div>
                                    <div className="flex items-center gap-1">
                                        <button onClick={() => handleEdit(store)} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-colors" title="編集">
                                            <Icon name="pencil" size={14} />
                                        </button>
                                        <button onClick={() => handleSoftDelete(store.id)} className="p-1.5 rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-500 transition-colors" title="無効にする">
                                            <Icon name="archive" size={14} />
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        !isAdding && serverStores.length === 0 && (
                            <div className="text-center py-8">
                                <div className="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-3">
                                    <Icon name="map-pin" size={28} className="text-slate-300" />
                                </div>
                                <p className="text-slate-500 text-sm">店舗が登録されていません</p>
                                <p className="text-slate-400 text-xs mt-1">「店舗を追加」から登録してください</p>

                    {/* 無効店舗（折りたたみ） */}

                                        <div key={store.id} className="flex items-center px-4 py-3 bg-slate-50/50 rounded-xl border border-slate-200 opacity-60">

                            店舗を無効にしてもデータは「店舗管理」シートに残ります。いつでも復元可能です。<br />
                            Square API連携店舗は環境変数で管理されるため、ここでは追加・削除できません。
                        </p>
                    </div>
                </Card>
            );

        // ========================================
        // マーケティングデータ連携
        // ========================================

        // HPBデータのlocalStorage管理
        const HPB_STORAGE_KEY = 'vivie_hpb_data';

        const useMarketingData = () => {
            const [metaConfig, setMetaConfig] = useState({ configured: false, loading: true });
            const [tiktokConfig, setTiktokConfig] = useState({ configured: false, loading: true });
            const [metaData, setMetaData] = useState({ campaigns: [], insights: null, loading: false, error: null });
            const [tiktokData, setTiktokData] = useState({ campaigns: [], insights: null, loading: false, error: null });
            const [hpbData, setHpbData] = useState(() => {
                try {
                    const saved = localStorage.getItem(HPB_STORAGE_KEY);
                    return saved ? JSON.parse(saved) : { monthly: [], settings: { avgViews: 300, avgBookingRate: 2.5 } };
                } catch { return { monthly: [], settings: { avgViews: 300, avgBookingRate: 2.5 } }; }
            });

            // GASからHPBデータを初回取得
            useEffect(() => {
                (async () => {
                    // HPB月次データ
                    const gasMonthly = await fetchHpbFromGas();
                    if (gasMonthly) {
                        setHpbData(prev => {
                            const updated = { ...prev, monthly: gasMonthly };
                            localStorage.setItem(HPB_STORAGE_KEY, JSON.stringify(updated));
                            return updated;
                        });
                    }
                    // HPB設定
                    const gasSettings = await fetchDashConfig('hpbSettings');
                    if (gasSettings) {
                        setHpbData(prev => {
                            const updated = { ...prev, settings: { ...prev.settings, ...gasSettings } };
                            localStorage.setItem(HPB_STORAGE_KEY, JSON.stringify(updated));
                            return updated;
                        });
                    }
                })();
            }, []);

            // HPBデータの保存
            const saveHpbData = useCallback((data) => {
                setHpbData(data);
                localStorage.setItem(HPB_STORAGE_KEY, JSON.stringify(data));
                saveHpbAllGas(data.monthly || []);
                if (data.settings) saveDashConfig('hpbSettings', data.settings);
            }, []);

            // HPB月次データ追加/更新
            const upsertHpbMonth = useCallback((entry) => {
                setHpbData(prev => {
                    const existing = prev.monthly.findIndex(m => m.yearMonth === entry.yearMonth);
                    const updated = { ...prev };
                    if (existing >= 0) {
                        updated.monthly = [...prev.monthly];
                        updated.monthly[existing] = { ...prev.monthly[existing], ...entry };
                    } else {
                        updated.monthly = [...prev.monthly, entry].sort((a, b) => a.yearMonth.localeCompare(b.yearMonth));
                    }
                    localStorage.setItem(HPB_STORAGE_KEY, JSON.stringify(updated));
                    upsertHpbMonthGas(entry);
                    return updated;
                });
            }, []);

            // HPB設定更新
            const updateHpbSettings = useCallback((settings) => {
                setHpbData(prev => {
                    const updated = { ...prev, settings: { ...prev.settings, ...settings } };
                    localStorage.setItem(HPB_STORAGE_KEY, JSON.stringify(updated));
                    saveDashConfig('hpbSettings', updated.settings);
                    return updated;
                });
            }, []);

            // HPBデータ削除
            const deleteHpbMonth = useCallback((yearMonth) => {
                setHpbData(prev => {
                    const updated = { ...prev, monthly: prev.monthly.filter(m => m.yearMonth !== yearMonth) };
                    localStorage.setItem(HPB_STORAGE_KEY, JSON.stringify(updated));
                    deleteHpbMonthGas(yearMonth);
                    return updated;
                });
            }, []);

            // Meta / TikTok設定取得
            useEffect(() => {
                (async () => {
                    try {
                        const res = await fetch(`${META_PROXY_BASE}/config`);
                        if (res.ok) setMetaConfig({ ...(await res.json()), loading: false });
                        else setMetaConfig({ configured: false, loading: false });
                    } catch { setMetaConfig({ configured: false, loading: false }); }
                })();
                (async () => {
                    try {
                        const res = await fetch(`${TIKTOK_PROXY_BASE}/config`);
                        if (res.ok) setTiktokConfig({ ...(await res.json()), loading: false });
                        else setTiktokConfig({ configured: false, loading: false });
                    } catch { setTiktokConfig({ configured: false, loading: false }); }
                })();
            }, []);

            // Meta広告データ取得
            const fetchMetaInsights = useCallback(async (datePreset = 'last_30d') => {
                if (!metaConfig.configured) return;
                setMetaData(prev => ({ ...prev, loading: true, error: null }));
                try {
                    // キャンペーン一覧
                    const campRes = await fetch(`${META_PROXY_BASE}/campaigns?fields=name,status,objective,daily_budget,lifetime_budget&limit=50`);
                    const campData = await campRes.json();
                    if (campData.error) {
                        const errMsg = campData.error.message || JSON.stringify(campData.error);
                        const isBlocked = errMsg.toLowerCase().includes('blocked') || errMsg.toLowerCase().includes('expired') || (campData.error.code === 190);
                        const hint = isBlocked
                            ? '\n\n【対処法】Meta Business Suite → 設定 → アクセストークン で新しいトークンを発行し、Vercel環境変数の META_ACCESS_TOKEN を更新してください。トークンの有効期限が切れている可能性があります。'
                            : '';
                        setMetaData(prev => ({ ...prev, loading: false, error: `キャンペーン取得エラー: ${errMsg}${hint}` }));
                        return;
                    }

                    // インサイト取得
                    const insightRes = await fetch(
                        `${META_PROXY_BASE}/insights?fields=impressions,clicks,ctr,spend,actions,cost_per_action_type,cpc,cpm,reach,frequency&date_preset=${datePreset}&level=account`
                    );
                    const insightData = await insightRes.json();
                    if (insightData.error) {
                        setMetaData(prev => ({ ...prev, loading: false, error: `インサイト取得エラー: ${insightData.error.message || JSON.stringify(insightData.error)}` }));
                        return;
                    }

                    // キャンペーン別インサイト
                    const campInsightRes = await fetch(
                        `${META_PROXY_BASE}/insights?fields=campaign_name,impressions,clicks,ctr,spend,actions,cost_per_action_type&date_preset=${datePreset}&level=campaign&limit=50`
                    );
                    const campInsightData = await campInsightRes.json();

                    setMetaData({
                        campaigns: campData.data || [],
                        insights: (insightData.data || [])[0] || null,
                        campaignInsights: campInsightData.data || [],
                        loading: false,
                        error: (campData.data || []).length === 0 && !(insightData.data || [])[0]
                            ? 'データが見つかりません。広告アカウントID（META_AD_ACCOUNT_ID）が正しいか確認してください。広告マネージャーのURL内「act=XXXXX」の数字部分です。'
                            : null
                    });
                } catch (error) {
                    setMetaData(prev => ({ ...prev, loading: false, error: 'API通信エラー: ' + error.message }));
                }
            }, [metaConfig.configured]);

            // TikTok広告データ取得
            const fetchTiktokInsights = useCallback(async (startDate, endDate) => {
                if (!tiktokConfig.configured) return;
                setTiktokData(prev => ({ ...prev, loading: true, error: null }));
                try {
                    const now = new Date();
                    const start = startDate || new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                    const end = endDate || now.toISOString().split('T')[0];

                    // キャンペーン一覧
                    const campRes = await fetch(`${TIKTOK_PROXY_BASE}/campaign/get`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ page_size: 100 })
                    });
                    const campData = campRes.ok ? await campRes.json() : { data: { list: [] } };

                    // レポート取得
                    const reportRes = await fetch(`${TIKTOK_PROXY_BASE}/report/integrated/get`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            report_type: 'BASIC',
                            data_level: 'AUCTION_ADVERTISER',
                            dimensions: ['stat_time_day'],
                            metrics: ['spend', 'impressions', 'clicks', 'ctr', 'cpc', 'cpm', 'reach', 'conversion', 'cost_per_conversion', 'video_play_actions', 'video_watched_2s', 'video_watched_6s'],
                            start_date: start,
                            end_date: end
                        })
                    });
                    const reportData = reportRes.ok ? await reportRes.json() : { data: { list: [] } };

                    setTiktokData({
                        campaigns: campData.data?.list || [],
                        insights: reportData.data?.list || [],
                        loading: false,
                        error: null
                    });
                } catch (error) {
                    setTiktokData(prev => ({ ...prev, loading: false, error: error.message }));
                }
            }, [tiktokConfig.configured]);

            return {
                metaConfig, tiktokConfig,
                metaData, tiktokData, hpbData,
                fetchMetaInsights, fetchTiktokInsights,
                upsertHpbMonth, updateHpbSettings, deleteHpbMonth, saveHpbData
            };
        };

        // ========================================
        // 出納帳ビュー
        // ========================================

        const CashbookView = ({ cashbookHook, memberData, manualMembersHook, activeStoreId, squareData }) => {
            const { entries: rawEntries, addEntry: rawAddEntry, updateEntry, deleteEntry, saving, loading,
                    dailyCloses, auditLogs, lastSynced, syncError, closeDailyBooks, isDayClosed, refresh } = cashbookHook;
            const stores = memberData?.stores || [];
            const activeStores = stores.filter(s => s.status !== 'inactive');

            // 店舗フィルタ
            const [filterStore, setFilterStore] = useState('all');
            // タブ: overview / entries / audit / reconcile
            const [cashTab, setCashTab] = useState('overview');

            // 権限のある店舗のみ表示
            const entries = useMemo(() => {
                let filtered = rawEntries || [];
                if (currentAccess) {
                    filtered = filtered.filter(e => !e.store || currentAccess.storeIds.includes(e.store));
                }
                if (filterStore !== 'all') {
                    filtered = filtered.filter(e => e.store === filterStore);
                }
                return filtered;
            }, [rawEntries, filterStore]);

            // 新規エントリーに店舗IDを自動付与
            const addEntry = useCallback((entry) => {
                return rawAddEntry({
                    ...entry,
                    store: entry.store || activeStoreId || (currentAccess && currentAccess.storeIds.length === 1 ? currentAccess.storeIds[0] : 'all')
                });
            }, [rawAddEntry, activeStoreId]);

            const [showForm, setShowForm] = useState(false);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().slice(0, 10));
            const [viewMonth, setViewMonth] = useState(new Date().toISOString().slice(0, 7));
            const [editingId, setEditingId] = useState(null);
            const [showCashCheck, setShowCashCheck] = useState(false);
            const [cashCheckAmount, setCashCheckAmount] = useState('');
            const [cashCheckStore, setCashCheckStore] = useState('');
            const [showDailyClose, setShowDailyClose] = useState(false);
            const [dailyCloseData, setDailyCloseData] = useState({ safe: '', pettyCash: '', register: '', notes: '' });

            const [formData, setFormData] = useState({
                date: new Date().toISOString().slice(0, 10),
                type: 'income',
                category: '施術売上',
                description: '',
                amount: '',
                customerName: '',
                treatmentCount: '1',
                paymentMethod: 'CASH',
                cashType: 'register',
                store: activeStoreId || '',
                recorder: '',
                notes: ''
            });

            const incomeCategories = ['施術売上', 'サブスク月額', '回数券販売', '物販', 'その他収入'];
            const expenseCategories = ['家賃', '水道光熱費', '消耗品', '広告費', '人件費', '設備', '交通費', 'その他経費'];
            const cashTypeLabels = { register: 'レジ', safe: '金庫', pettyCash: '小口現金' };

            // 月別フィルタ
            const monthEntries = useMemo(() => {
                return (entries || [])
                    .filter(e => e.date && e.date.startsWith(viewMonth))
                    .sort((a, b) => b.date.localeCompare(a.date) || (b.createdAt || '').localeCompare(a.createdAt || ''));
            }, [entries, viewMonth]);

            // 日別グループ
            const dailyGroups = useMemo(() => {
                const groups = {};
                monthEntries.forEach(e => {
                    if (!groups[e.date]) groups[e.date] = [];
                    groups[e.date].push(e);
                });
                return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
            }, [monthEntries]);

            // 現金残高計算（全期間・店舗別・現金区分別）
            const cashBalance = useMemo(() => {
                const all = (rawEntries || []).filter(e => {
                    if (currentAccess && e.store && !currentAccess.storeIds.includes(e.store)) return false;
                    return true;
                });
                const calcBalance = (items) => {
                    const cashItems = items.filter(e => e.paymentMethod === 'CASH');
                    const totalIn = cashItems.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
                    const totalOut = cashItems.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
                    // 現金区分別
                    const byCashType = {};
                    ['register', 'safe', 'pettyCash'].forEach(ct => {
                        const ctItems = cashItems.filter(e => (e.cashType || 'register') === ct);
                        const ctIn = ctItems.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
                        const ctOut = ctItems.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
                        byCashType[ct] = { balance: ctIn - ctOut, income: ctIn, expense: ctOut };
                    });
                    return { balance: totalIn - totalOut, income: totalIn, expense: totalOut, byCashType };
                };
                const total = calcBalance(all);
                // 店舗別
                const byStore = {};
                activeStores.forEach(st => {
                    const stEntries = all.filter(e => e.store === st.id);
                    const stCalc = calcBalance(stEntries);
                    byStore[st.id] = { name: st.name, ...stCalc };
                });
                return { total: total.balance, income: total.income, expense: total.expense, byCashType: total.byCashType, byStore };
            }, [rawEntries, activeStores]);

            // 月間集計
            const monthSummary = useMemo(() => {
                const cashIn = monthEntries.filter(e => e.type === 'income' && e.paymentMethod === 'CASH').reduce((s, e) => s + e.amount, 0);
                const cashOut = monthEntries.filter(e => e.type === 'expense' && e.paymentMethod === 'CASH').reduce((s, e) => s + e.amount, 0);
                const income = monthEntries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
                const expense = monthEntries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
                const totalTreatments = monthEntries.reduce((s, e) => s + (e.treatmentCount || 0), 0);
                const byCategory = {};
                monthEntries.forEach(e => {
                    if (!byCategory[e.category]) byCategory[e.category] = 0;
                    byCategory[e.category] += e.amount;
                });
                return { income, expense, cashIn, cashOut, totalTreatments, byCategory };
            }, [monthEntries]);

            // 日別集計
            const getDailySummary = (dayEntries) => {
                const income = dayEntries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
                const expense = dayEntries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
                const treatments = dayEntries.reduce((s, e) => s + (e.treatmentCount || 0), 0);
                return { income, expense, treatments };
            };

            // 全メンバーリスト（会員名候補）
            const allMemberNames = useMemo(() => {
                const names = new Set();
                (memberData?.members || []).forEach(m => names.add(m.name));
                (manualMembersHook?.manualMembers || []).forEach(m => names.add(m.name));
                return [...names].filter(Boolean).sort((a, b) => a.localeCompare(b, 'ja'));
            }, [memberData?.members, manualMembersHook?.manualMembers]);

            // 店舗名取得ヘルパー
            const getStoreName = (storeId) => {
                if (!storeId || storeId === 'all') return '';
                const s = activeStores.find(st => st.id === storeId);
                return s ? s.name : storeId;
            };

            const resetForm = () => {
                setFormData({
                    date: selectedDate,
                    type: 'income',
                    category: '施術売上',
                    description: '',
                    amount: '',
                    customerName: '',
                    treatmentCount: '1',
                    paymentMethod: 'CASH',
                    cashType: 'register',
                    store: filterStore !== 'all' ? filterStore : (activeStoreId || ''),
                    recorder: currentAccess ? currentAccess.name : '',
                    notes: ''
                });
                setEditingId(null);
            };

            const handleSubmit = () => {
                if (!formData.amount || parseInt(formData.amount) <= 0) return;
                if (editingId) {
                    updateEntry(editingId, {
                        ...formData,
                        amount: parseInt(formData.amount),
                        treatmentCount: parseInt(formData.treatmentCount) || 0
                    });
                } else {
                    addEntry({
                        ...formData,
                        amount: parseInt(formData.amount),
                        treatmentCount: parseInt(formData.treatmentCount) || 0
                    });
                }
                resetForm();
                setShowForm(false);
            };

            const handleEdit = (entry) => {
                if (isDayClosed(entry.date, entry.store)) {
                    showToast('この日は締め済みのため編集できません', 'error');
                    return;
                }
                setFormData({
                    date: entry.date,
                    type: entry.type,
                    category: entry.category,
                    description: entry.description || '',
                    amount: String(entry.amount),
                    customerName: entry.customerName || '',
                    treatmentCount: String(entry.treatmentCount || 0),
                    paymentMethod: entry.paymentMethod || 'CASH',
                    cashType: entry.cashType || 'register',
                    store: entry.store || '',
                    recorder: entry.recorder || '',
                    notes: entry.notes || ''
                });
                setEditingId(entry.id);
                setShowForm(true);
            };

            const changeMonth = (delta) => {
                const d = new Date(viewMonth + '-01');
                d.setMonth(d.getMonth() + delta);
                setViewMonth(d.toISOString().slice(0, 7));
            };

            // レジ金チェック
            const handleCashCheck = () => {
                const actual = parseInt(cashCheckAmount) || 0;
                const storeId = cashCheckStore || filterStore;
                let expected = cashBalance.total;
                if (storeId && storeId !== 'all' && cashBalance.byStore[storeId]) {
                    expected = cashBalance.byStore[storeId].balance;
                }
                const diff = actual - expected;
                const storeName = getStoreName(storeId) || '全店舗';
                if (diff !== 0) {
                    addEntry({
                        date: new Date().toISOString().slice(0, 10),
                        type: diff > 0 ? 'income' : 'expense',
                        category: diff > 0 ? 'その他収入' : 'その他経費',
                        description: 'レジ金チェック差異（' + storeName + '）実残高:' + formatCurrency(actual) + ' / 理論:' + formatCurrency(expected),
                        amount: Math.abs(diff),
                        paymentMethod: 'CASH',
                        cashType: 'register',
                        store: storeId !== 'all' ? storeId : '',
                        recorder: currentAccess ? currentAccess.name : 'レジ金チェック'
                    });
                    showToast('差異 ' + (diff > 0 ? '+' : '') + formatCurrency(diff) + ' を記録しました（' + storeName + '）', diff === 0 ? 'success' : 'error');
                } else {
                    showToast(storeName + '：レジ金一致（' + formatCurrency(actual) + '）', 'success');
                }
                setShowCashCheck(false);
                setCashCheckAmount('');
            };

            // 日次締め処理
            const handleDailyClose = async () => {
                const storeId = filterStore !== 'all' ? filterStore : '';
                if (!storeId) { showToast('日次締めは店舗を選択してください', 'error'); return; }
                const today = new Date().toISOString().slice(0, 10);
                const result = await closeDailyBooks(today, storeId, {
                    safe: parseInt(dailyCloseData.safe) || 0,
                    pettyCash: parseInt(dailyCloseData.pettyCash) || 0,
                    register: parseInt(dailyCloseData.register) || 0
                }, dailyCloseData.notes);
                if (result) {
                    setShowDailyClose(false);
                    setDailyCloseData({ safe: '', pettyCash: '', register: '', notes: '' });
                }
            };

            // Square売上との突合
            const squareReconciliation = useMemo(() => {
                if (!squareData?.payments) return null;
                const today = new Date().toISOString().slice(0, 10);
                const todaySquare = (squareData.payments || []).filter(p => p.created_at && p.created_at.startsWith(today));
                const squareTotal = todaySquare.reduce((s, p) => s + (p.amount_money?.amount || 0) / 100, 0);
                const todayCashbook = entries.filter(e => e.date === today && e.type === 'income');
                const cashbookTotal = todayCashbook.reduce((s, e) => s + e.amount, 0);
                return { squareTotal, cashbookTotal, diff: cashbookTotal - squareTotal, count: todaySquare.length, date: today };
            }, [squareData, entries]);

            return (
                <div className="space-y-5 md:space-y-6 animate-fade-in">
                    <SectionHeader title="出納帳" subtitle="CASH MANAGEMENT" icon="book-open">
                        <div className="flex items-center gap-2">
                            {syncError && (
                                <span className="text-[11px] text-red-500 font-medium mr-1">
                                    <Icon name="alert-circle" size={12} className="inline mr-0.5" />オフライン
                                </span>
                            )}
                            <button onClick={refresh} disabled={loading}
                                className="flex items-center px-3 py-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-xl text-xs font-medium transition-all active:scale-95 disabled:opacity-50">
                                <Icon name="refresh-cw" size={14} className={`mr-1 ${loading ? 'animate-spin' : ''}`} />
                                {loading ? '同期中...' : '最新取得'}
                            </button>
                            <button
                                onClick={() => { resetForm(); setFormData(p => ({...p, date: selectedDate})); setShowForm(!showForm); }}
                                className="flex items-center px-4 py-2.5 btn-gradient rounded-xl font-medium text-sm transition-all active:scale-95"
                            >
                                <Icon name="plus" size={16} className="mr-1.5" />
                                記帳する
                            </button>
                        </div>
                    </SectionHeader>

                    {/* 同期状態表示 */}
                    <div className="flex items-center justify-between -mt-3">
                        <div className="flex items-center gap-2">
                            {lastSynced && (
                                <span className="text-[11px] text-slate-400 flex items-center">
                                    <Icon name="check-circle" size={11} className="mr-1 text-green-500" />
                                    スプシ同期: {lastSynced.toLocaleString('ja-JP')}
                                </span>
                            )}
                            {saving && <span className="text-[11px] text-amber-500 font-medium animate-pulse">保存中...</span>}
                        </div>
                        <span className="text-[10px] text-slate-300">自動同期: 60秒毎</span>
                    </div>

                    {/* タブ切り替え */}
                    <div className="flex items-center gap-1 bg-slate-100 rounded-xl p-1">
                        {[
                            { id: 'overview', label: '残高総覧', icon: 'wallet' },
                            { id: 'entries', label: '入出金記録', icon: 'list' },
                            { id: 'audit', label: '操作ログ', icon: 'shield' },
                            { id: 'reconcile', label: '売上突合', icon: 'git-merge' }
                        ].map(t => (
                            <button key={t.id} onClick={() => setCashTab(t.id)}
                                className={`flex-1 flex items-center justify-center gap-1 px-3 py-2 rounded-lg text-xs font-semibold transition-all ${cashTab === t.id ? 'bg-white text-vivie-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                <Icon name={t.icon} size={13} />{t.label}
                            </button>
                        ))}
                    </div>

                    {/* 店舗フィルタ */}
                    {activeStores.length > 1 && (
                        <div className="flex items-center gap-2 flex-wrap">
                            <span className="text-xs text-slate-400 font-medium">店舗:</span>
                            <button onClick={() => setFilterStore('all')}
                                className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${filterStore === 'all' ? 'bg-vivie-500 text-white shadow' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>全店舗</button>
                            {activeStores.map(s => (
                                <button key={s.id} onClick={() => setFilterStore(s.id)}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${filterStore === s.id ? 'bg-vivie-500 text-white shadow' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{s.name}</button>
                            ))}
                        </div>
                    )}

                    {/* ===== 残高総覧タブ ===== */}
                    {cashTab === 'overview' && (<>
                    {/* 全店舗残高カード（金庫・小口・レジ区分） */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                        {/* 全体残高 */}
                        <div className="glass-card !rounded-2xl p-4 border-2 border-vivie-200 bg-gradient-to-br from-vivie-50 to-white">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-xs font-semibold text-vivie-600 flex items-center"><Icon name="wallet" size={14} className="mr-1" /> 現金合計</span>
                                <button onClick={() => { setShowCashCheck(true); setCashCheckStore('all'); }}
                                    className="text-[11px] bg-vivie-100 text-vivie-700 px-2 py-1 rounded-lg font-semibold hover:bg-vivie-200 transition-colors">
                                    <Icon name="check-circle" size={12} className="inline mr-0.5 -mt-0.5" />チェック
                                </button>
                            </div>
                            <p className="text-2xl font-extrabold text-slate-800">{formatCurrency(cashBalance.total)}</p>
                            <div className="flex gap-3 mt-2 text-[11px]">
                                <span className="text-vivie-600">月入金: <strong>{formatCurrency(monthSummary.cashIn)}</strong></span>
                                <span className="text-red-500">月出金: <strong>{formatCurrency(monthSummary.cashOut)}</strong></span>
                            </div>
                        </div>
                        {/* 金庫 */}
                        <div className="glass-card !rounded-2xl p-4 border border-amber-200 bg-gradient-to-br from-amber-50 to-white">
                            <span className="text-xs font-semibold text-amber-600 flex items-center mb-2"><Icon name="lock" size={14} className="mr-1" /> 金庫</span>
                            <p className="text-xl font-extrabold text-slate-800">{formatCurrency(cashBalance.byCashType?.safe?.balance || 0)}</p>
                            <p className="text-[10px] text-slate-400 mt-1">本部管理</p>
                        </div>
                        {/* 小口現金 */}
                        <div className="glass-card !rounded-2xl p-4 border border-blue-200 bg-gradient-to-br from-blue-50 to-white">
                            <span className="text-xs font-semibold text-blue-600 flex items-center mb-2"><Icon name="credit-card" size={14} className="mr-1" /> 小口現金</span>
                            <p className="text-xl font-extrabold text-slate-800">{formatCurrency(cashBalance.byCashType?.pettyCash?.balance || 0)}</p>
                            <p className="text-[10px] text-slate-400 mt-1">日常経費用</p>
                        </div>
                        {/* レジ */}
                        <div className="glass-card !rounded-2xl p-4 border border-green-200 bg-gradient-to-br from-green-50 to-white">
                            <span className="text-xs font-semibold text-green-600 flex items-center mb-2"><Icon name="shopping-bag" size={14} className="mr-1" /> レジ</span>
                            <p className="text-xl font-extrabold text-slate-800">{formatCurrency(cashBalance.byCashType?.register?.balance || 0)}</p>
                            <p className="text-[10px] text-slate-400 mt-1">店舗売上</p>
                        </div>
                    </div>

                    {/* 店舗別残高カード */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                        {Object.entries(cashBalance.byStore).map(([storeId, data]) => {
                            const storeClose = dailyCloses.find(c => c.storeId === storeId && c.date === new Date().toISOString().slice(0, 10));
                            return (
                            <div key={storeId} className={`glass-card !rounded-2xl p-4 cursor-pointer transition-all ${filterStore === storeId ? 'border-2 border-vivie-400 bg-vivie-50/30' : 'border border-slate-200 hover:border-vivie-200'}`}
                                onClick={() => setFilterStore(filterStore === storeId ? 'all' : storeId)}>
                                <div className="flex items-center justify-between mb-2">

                const yesterday = new Date(now);
                yesterday.setDate(yesterday.getDate() - 1);
                if (d.toDateString() === yesterday.toDateString()) return '昨日 ' + d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
